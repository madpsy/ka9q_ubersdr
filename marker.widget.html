<!-- ═══════════════════════════════════════════════════════════
     UberSDR Current Marker Widget
     • Wide-screen only (hidden ≤1024px)
     • Shows the name of any marker (bookmark / CW spot / DX spot)
       sitting at the current dial frequency + mode, plus the
       neighbouring markers below (prev) and above (next) the dial
     • Prev/next are clickable — tapping tunes to that marker's
       freq + mode (same as the dial-wheel edge arrows)
     • Prev/next labels sit on a row ABOVE the current name so the
       text never overlaps, mirroring the dial-wheel overlay layout
     • Auto-hides itself only when there is NO current AND NO prev
       AND NO next marker; reappears as soon as any exists (unless
       the user closed it via ✕)
     • Reuses the host app's window.findMarkers() logic (same
       matcher as the dial-wheel overlay), with an inline fallback
       that mirrors it if the host hasn't exposed it
     • Shrinks/grows to fit the marker names; long names ellipsize
     • Drag widget to reposition
     ═══════════════════════════════════════════════════════════ -->

<style>
@media (max-width: 1024px) {
  #sdr-marker-widget { display: none !important; }
}

#sdr-marker-widget {
  position: fixed;
  left: 12px;
  top: 140px;
  z-index: 900;
  /* width:auto + only `left` set → shrink-to-fit the content */
  width: auto;
  max-width: 360px;
  background: rgba(30, 42, 56, 0.92);
  border: 1px solid rgba(127, 140, 141, 0.5);
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  font-family: inherit;
  color: #ecf0f1;
  user-select: none;
  cursor: grab;
}

#sdr-marker-widget.dragging {
  cursor: grabbing;
  box-shadow: 0 8px 28px rgba(0,0,0,0.7);
  opacity: 0.95;
}

/* ── Title bar ── */
#sdr-marker-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

#sdr-marker-title {
  font-size: 11px;
  color: #95a5a6;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

#sdr-marker-close-btn {
  background: none !important;
  border: none !important;
  color: #7f8c8d !important;
  font-size: 13px;
  cursor: pointer !important;
  padding: 0 0 0 6px;
  line-height: 1;
  font-weight: normal !important;
  transform: none !important;
  transition: color 0.15s !important;
}
#sdr-marker-close-btn:hover {
  color: #ecf0f1 !important;
  background: none !important;
  transform: none !important;
}

/* ── Prev/next neighbour row ──
   Sits ABOVE the current name so the neighbour labels never overlap the
   prominent current marker — mirroring the dial-wheel overlay, where the
   prev/next labels are offset from the centre marker. */
#sdr-marker-nav {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}

#sdr-marker-nav .sdr-marker-navbtn {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  max-width: 160px;
  background: none !important;
  border: none !important;
  padding: 0 !important;
  margin: 0 !important;
  color: #9fb3c8 !important;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.2;
  cursor: pointer !important;
  transform: none !important;
  box-shadow: none !important;
  transition: color 0.15s !important;
}
#sdr-marker-nav .sdr-marker-navbtn:hover {
  color: #ecf0f1 !important;
  background: none !important;
  transform: none !important;
}

/* Prev hugs the left, next hugs the right */
#sdr-marker-prev { text-align: left; }
#sdr-marker-next { text-align: right; margin-left: auto; }

.sdr-marker-nav-arrow {
  flex: none;
  font-size: 14px;
  line-height: 1;
  opacity: 0.85;
}

.sdr-marker-nav-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Marker name (current) ── */
#sdr-marker-name {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 340px;
  text-align: center;
}
</style>

<!-- Hidden until a current / prev / next marker exists for the dial freq + mode -->
<div id="sdr-marker-widget" style="display:none">
  <div id="sdr-marker-titlebar">
    <span id="sdr-marker-title">📍 Marker</span>
    <button id="sdr-marker-close-btn" title="Hide widget">✕</button>
  </div>
  <!-- Prev/next neighbour jump — tapping tunes to that marker's freq + mode.
       Sits above the current name so the labels never overlap it. -->
  <div id="sdr-marker-nav" style="display:none">
    <button type="button" id="sdr-marker-prev" class="sdr-marker-navbtn" style="display:none" title="Tune to previous marker">
      <span class="sdr-marker-nav-arrow">‹</span>
      <span id="sdr-marker-prev-text" class="sdr-marker-nav-text"></span>
    </button>
    <button type="button" id="sdr-marker-next" class="sdr-marker-navbtn" style="display:none" title="Tune to next marker">
      <span id="sdr-marker-next-text" class="sdr-marker-nav-text"></span>
      <span class="sdr-marker-nav-arrow">›</span>
    </button>
  </div>
  <div id="sdr-marker-name"></div>
</div>

<script>
(function () {
  'use strict';

  // Backstop poll — catches changes with no DOM hook to observe: mode switches
  // (window.currentMode is a plain variable) and newly-arrived spots/bookmarks.
  // Frequency changes are handled instantly by a MutationObserver below. The
  // matcher is a sub-millisecond scan, so polling at 4 Hz is effectively free.
  const POLL_MS = 250;

  const widget  = document.getElementById('sdr-marker-widget');
  const nameEl  = document.getElementById('sdr-marker-name');
  const navRow  = document.getElementById('sdr-marker-nav');
  const prevBtn = document.getElementById('sdr-marker-prev');
  const nextBtn = document.getElementById('sdr-marker-next');
  const prevText = document.getElementById('sdr-marker-prev-text');
  const nextText = document.getElementById('sdr-marker-next-text');

  let userClosed = false; // set once the user dismisses via ✕; stays hidden after

  // The prev/next neighbour markers currently shown, kept so the click
  // handlers know where to tune. { freq, mode, name } | null.
  let _prevMarker = null;
  let _nextMarker = null;

  // The current marker at the dial frequency — kept so the nameEl click handler
  // can read its type and name without re-running the matcher.
  let _currentMarker = null;

  // Marker types whose name is a callsign and should trigger a lookup on click.
  const CALLSIGN_TYPES = new Set(['cw', 'dx', 'voice']);

  // ── Marker matching ────────────────────────────────────────────────
  // Prefer the host app's exposed matcher (single source of truth, same
  // logic as the dial-wheel overlay — returns { current, prev, next }).
  // Fall back to an inline replica so the widget still works if the host
  // build hasn't exposed it.
  const MARKER_FREQ_TOLERANCE_HZ = 100;

  function modeFamily(m) {
    m = (m || '').toLowerCase();
    if (m === 'cw' || m === 'cwu' || m === 'cwl') return 'cw';
    if (m === 'am' || m === 'sam')                return 'am';
    if (m === 'fm' || m === 'nfm')                return 'fm';
    return m; // usb, lsb, drm, etc.
  }

  // The specific, tunable mode an extension applies when you jump to a marker
  // (cwl/cwu and lsb/usb below/above 10 MHz) — mirrors the host helpers.
  function cwModeForFreq(hz)    { return hz < 10000000 ? 'cwl' : 'cwu'; }
  function voiceModeForFreq(hz) { return hz < 10000000 ? 'lsb' : 'usb'; }

  function dxSpotMode(spot) {
    const comment = (spot.comment || '').toUpperCase();
    if (comment.includes('FT8') || comment.includes('FT4')) return 'usb';
    if (comment.includes('CW')) return cwModeForFreq(spot.frequency);
    return voiceModeForFreq(spot.frequency);
  }

  // Flatten every marker into { freq, mode, family, name, priority, type }. Spots
  // get priority 1, bookmarks 0, so spots win when two markers share a frequency.
  // `type` (cw/dx/voice/bookmark) drives the prev/next navTypes filter.
  function collectMarkers() {
    const out = [];
    const add = (list, freqOf, modeOf, famOf, nameOf, priority, type) => {
      for (const item of list) {
        const f = freqOf(item);
        if (typeof f !== 'number' || isNaN(f)) continue;
        out.push({ freq: f, mode: modeOf(item), family: famOf(item), name: nameOf(item), priority, type });
      }
    };
    const cwSpots = (window.cwSpotsExtensionInstance && window.cwSpotsExtensionInstance.spots) || [];
    const dxSpots = (window.dxClusterExtensionInstance && window.dxClusterExtensionInstance.spots) || [];
    const vaState = window.VoiceActivityService && window.VoiceActivityService.getLatest();
    const voiceActs = (vaState && vaState.enabled && typeof window.VoiceActivityService.getAllActivities === 'function')
      ? window.VoiceActivityService.getAllActivities() : [];
    const vaFreq = a => a.estimated_dial_freq || a.start_freq;
    const vaMode = a => (a.mode ? a.mode.toLowerCase() : voiceModeForFreq(vaFreq(a)));
    add(cwSpots, s => s.frequency, s => cwModeForFreq(s.frequency), () => 'cw',                s => s.dx_call, 1, 'cw');
    add(dxSpots, s => s.frequency, s => dxSpotMode(s), s => modeFamily(dxSpotMode(s)),          s => s.dx_call, 1, 'dx');
    add(voiceActs, vaFreq, vaMode, a => modeFamily(vaMode(a)), a => (a.dx_callsign || ('Voice' + (a.band ? ' ' + a.band : ''))), 1, 'voice');
    add(window.bookmarks || [], b => b.frequency, b => (b.mode || null), b => (b.mode ? modeFamily(b.mode) : null), b => b.name, 0, 'bookmark');
    return out;
  }

  // Locate the current / prev / next markers relative to the dial freq+mode.
  // Faithful replica of the host's findMarkers(). navTypes optionally restricts
  // which marker types may become the prev/next neighbours (null = all);
  // `current` is never filtered.
  function fallbackFindMarkers(dialHz, mode, navTypes) {
    const result = { current: null, prev: null, next: null };
    if (dialHz === null) return result;
    const fam = modeFamily(mode);
    const markers = collectMarkers();
    const navFilter = Array.isArray(navTypes) ? new Set(navTypes) : null;
    const navAllowed = m => !navFilter || navFilter.has(m.type);
    let current = null, currentDist = Infinity, prev = null, next = null;
    for (const m of markers) {
      const d = Math.abs(m.freq - dialHz);
      if (d <= MARKER_FREQ_TOLERANCE_HZ) {
        const modeMatch = (m.family === null || m.family === fam);
        if (modeMatch && (!current || m.priority > current.priority ||
            (m.priority === current.priority && d < currentDist))) {
          current = m;
          currentDist = d;
        }
      } else if (m.freq < dialHz) {
        if (navAllowed(m) && (!prev || m.freq > prev.freq || (m.freq === prev.freq && m.priority > prev.priority))) prev = m;
      } else {
        if (navAllowed(m) && (!next || m.freq < next.freq || (m.freq === next.freq && m.priority > next.priority))) next = m;
      }
    }
    const strip = m => m ? { freq: m.freq, mode: m.mode, name: m.name } : null;
    result.current = strip(current);
    result.prev    = strip(prev);
    result.next    = strip(next);
    return result;
  }

  function getDialHz() {
    const f = document.getElementById('frequency');
    if (!f) return null;
    const hz = parseInt(f.getAttribute('data-hz-value') || f.value);
    return isNaN(hz) ? null : hz;
  }

  function getMarkers() {
    const dialHz = getDialHz();
    const mode = window.currentMode;
    // Honour the host's prev/next marker-type preference (Audio Settings), so the
    // widget arrows step through the same markers as the dial wheel. null = all.
    const navTypes = Array.isArray(window.markerNavTypes) ? window.markerNavTypes : null;
    if (typeof window.findMarkers === 'function') {
      return window.findMarkers(dialHz, mode, navTypes);
    }
    return fallbackFindMarkers(dialHz, mode, navTypes);
  }

  // Tune to a { freq, mode } neighbour (prev/next tap), mirroring the dial-wheel
  // edge arrows: set frequency first, then the marker's own mode.
  function tuneToMarker(marker) {
    if (!marker || typeof marker.freq !== 'number') return;
    if (typeof window.setFrequency === 'function') window.setFrequency(marker.freq);
    if (marker.mode && typeof window.setMode === 'function') window.setMode(marker.mode, false);
    update();
  }

  // ── Render ─────────────────────────────────────────────────────────
  let _lastName = undefined;

  // Show/hide one neighbour button and label it. Returns true if shown.
  function updateNavButton(btn, textEl, marker) {
    if (!marker) {
      if (btn.style.display !== 'none') btn.style.display = 'none';
      return false;
    }
    if (textEl.textContent !== marker.name) {
      textEl.textContent = marker.name;
      btn.title = 'Tune to ' + marker.name;
    }
    if (btn.style.display === 'none') btn.style.display = '';
    return true;
  }

  function update() {
    if (userClosed) return;
    const { current, prev, next } = getMarkers();
    _prevMarker = prev;
    _nextMarker = next;
    _currentMarker = current;
    const name = current ? current.name : null;

    // Hide the widget only when there is NO current, prev AND next marker.
    if (!name && !prev && !next) {
      if (widget.style.display !== 'none') widget.style.display = 'none';
      _lastName = null;
      return;
    }

    if (widget.style.display === 'none') widget.style.display = '';

    // ── Prev/next neighbours (row above the current name) ──
    const hasPrev = updateNavButton(prevBtn, prevText, prev);
    const hasNext = updateNavButton(nextBtn, nextText, next);
    navRow.style.display = (hasPrev || hasNext) ? '' : 'none';

    // ── Current marker name ──
    if (!name) {
      if (nameEl.style.display !== 'none') nameEl.style.display = 'none';
      _lastName = null;
      nameEl.style.cursor = '';
      nameEl.title = '';
    } else {
      if (nameEl.style.display === 'none') nameEl.style.display = '';
      // Show a pointer cursor and tooltip when the marker is a callsign type
      // so the user knows it's clickable for a lookup.
      const isCallsign = current && CALLSIGN_TYPES.has(current.type);
      nameEl.style.cursor = isCallsign ? 'pointer' : '';
      nameEl.title = isCallsign ? 'Click to look up ' + name : name;
      if (name !== _lastName) {
        _lastName = name;
        nameEl.textContent = name;
      }
    }
  }

  // ── Prev/next click handlers ───────────────────────────────────────
  prevBtn.addEventListener('click', e => { e.stopPropagation(); tuneToMarker(_prevMarker); });
  nextBtn.addEventListener('click', e => { e.stopPropagation(); tuneToMarker(_nextMarker); });

  // ── Current marker name click → callsign lookup ────────────────────
  // When the current marker is a CW/DX/voice spot (i.e. its name is a
  // callsign), clicking the name triggers a lookup in any registered
  // lookup widget (e.g. qrz_lookup.widget.html) via window.lookupCallsign().
  nameEl.addEventListener('click', () => {
    if (!_currentMarker) return;
    if (!CALLSIGN_TYPES.has(_currentMarker.type)) return;
    const callsign = _currentMarker.name;
    if (!callsign) return;
    if (typeof window.lookupCallsign === 'function') {
      window.lookupCallsign(callsign);
    }
  });

  // ── Close button ───────────────────────────────────────────────────
  document.getElementById('sdr-marker-close-btn').addEventListener('click', () => {
    userClosed = true;
    widget.style.display = 'none';
  });

  // ── Drag to reposition ─────────────────────────────────────────────
  (function initDrag() {
    const LS_KEY = 'sdr-marker-widget-pos';
    let dragging = false, startX, startY, origLeft, origTop;

    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY));
      if (saved && typeof saved.left === 'number' && typeof saved.top === 'number') {
        const maxL = window.innerWidth  - widget.offsetWidth;
        const maxT = window.innerHeight - widget.offsetHeight;
        widget.style.left      = Math.max(0, Math.min(maxL, saved.left)) + 'px';
        widget.style.top       = Math.max(0, Math.min(maxT, saved.top))  + 'px';
        widget.style.right     = 'auto';
        widget.style.transform = 'none';
      }
    } catch (_) {}

    function resolvePosition() {
      const r = widget.getBoundingClientRect();
      widget.style.left      = r.left + 'px';
      widget.style.top       = r.top  + 'px';
      widget.style.right     = 'auto';
      widget.style.transform = 'none';
    }

    function savePosition() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          left: parseFloat(widget.style.left),
          top:  parseFloat(widget.style.top),
        }));
      } catch (_) {}
    }

    widget.addEventListener('pointerdown', e => {
      if (e.target.closest('button, a')) return;
      e.preventDefault();
      resolvePosition();
      dragging = true;
      startX   = e.clientX;
      startY   = e.clientY;
      origLeft = parseFloat(widget.style.left);
      origTop  = parseFloat(widget.style.top);
      widget.classList.add('dragging');
      widget.setPointerCapture(e.pointerId);
    });

    widget.addEventListener('pointermove', e => {
      if (!dragging) return;
      const maxL = window.innerWidth  - widget.offsetWidth;
      const maxT = window.innerHeight - widget.offsetHeight;
      widget.style.left = Math.max(0, Math.min(maxL, origLeft + (e.clientX - startX))) + 'px';
      widget.style.top  = Math.max(0, Math.min(maxT, origTop  + (e.clientY - startY))) + 'px';
    });

    widget.addEventListener('pointerup', () => {
      if (dragging) savePosition();
      dragging = false;
      widget.classList.remove('dragging');
    });
    widget.addEventListener('pointercancel', () => { dragging = false; widget.classList.remove('dragging'); });

    // Re-clamp on resize so the widget never ends up off-screen
    window.addEventListener('resize', () => {
      if (widget.style.left && widget.style.top && widget.style.transform === 'none') {
        const maxL = window.innerWidth  - widget.offsetWidth;
        const maxT = window.innerHeight - widget.offsetHeight;
        widget.style.left = Math.max(0, Math.min(maxL, parseFloat(widget.style.left))) + 'px';
        widget.style.top  = Math.max(0, Math.min(maxT, parseFloat(widget.style.top)))  + 'px';
      }
    });
  })();

  // ── Boot ───────────────────────────────────────────────────────────
  update();

  // Instant response to tuning: the host rewrites #frequency's data-hz-value
  // on every dial change, so observing that attribute updates us with no lag.
  const freqInput = document.getElementById('frequency');
  if (freqInput && 'MutationObserver' in window) {
    new MutationObserver(update).observe(freqInput, {
      attributes: true,
      attributeFilter: ['data-hz-value', 'value'],
    });
  }

  setInterval(update, POLL_MS);

})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     UberSDR Current Marker Widget
     • Wide-screen only (hidden ≤1024px)
     • Shows the name of any marker (bookmark / CW spot / DX spot)
       sitting at the current dial frequency + mode, plus the
       neighbouring markers below (prev) and above (next) the dial
     • Prev/next are clickable — tapping tunes to that marker's
       freq + mode (same as the dial-wheel edge arrows)
     • Prev/next labels sit on a row ABOVE the current name so the
       text never overlaps, mirroring the dial-wheel overlay layout
     • Auto-hides itself only when there is NO current AND NO prev
       AND NO next marker; reappears as soon as any exists (unless
       the user closed it via ✕)
     • Reuses the host app's window.findMarkers() logic (same
       matcher as the dial-wheel overlay), with an inline fallback
       that mirrors it if the host hasn't exposed it
     • Shrinks/grows to fit the marker names; long names ellipsize
     • Drag widget to reposition
     ═══════════════════════════════════════════════════════════ -->

<style>
@media (max-width: 1024px) {
  #sdr-marker-widget { display: none !important; }
}

#sdr-marker-widget {
  position: fixed;
  left: 12px;
  top: 140px;
  z-index: 900;
  /* width:auto + only `left` set → shrink-to-fit the content */
  width: auto;
  max-width: 360px;
  background: rgba(30, 42, 56, 0.92);
  border: 1px solid rgba(127, 140, 141, 0.5);
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  font-family: inherit;
  color: #ecf0f1;
  user-select: none;
  cursor: grab;
}

#sdr-marker-widget.dragging {
  cursor: grabbing;
  box-shadow: 0 8px 28px rgba(0,0,0,0.7);
  opacity: 0.95;
}

/* ── Title bar ── */
#sdr-marker-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

#sdr-marker-title {
  font-size: 11px;
  color: #95a5a6;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

#sdr-marker-close-btn {
  background: none !important;
  border: none !important;
  color: #7f8c8d !important;
  font-size: 13px;
  cursor: pointer !important;
  padding: 0 0 0 6px;
  line-height: 1;
  font-weight: normal !important;
  transform: none !important;
  transition: color 0.15s !important;
}
#sdr-marker-close-btn:hover {
  color: #ecf0f1 !important;
  background: none !important;
  transform: none !important;
}

/* ── Prev/next neighbour row ──
   Sits ABOVE the current name so the neighbour labels never overlap the
   prominent current marker — mirroring the dial-wheel overlay, where the
   prev/next labels are offset from the centre marker. */
#sdr-marker-nav {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}

#sdr-marker-nav .sdr-marker-navbtn {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  max-width: 160px;
  background: none !important;
  border: none !important;
  padding: 0 !important;
  margin: 0 !important;
  color: #9fb3c8 !important;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.2;
  cursor: pointer !important;
  transform: none !important;
  box-shadow: none !important;
  transition: color 0.15s !important;
}
#sdr-marker-nav .sdr-marker-navbtn:hover {
  color: #ecf0f1 !important;
  background: none !important;
  transform: none !important;
}

/* Prev hugs the left, next hugs the right */
#sdr-marker-prev { text-align: left; }
#sdr-marker-next { text-align: right; margin-left: auto; }

.sdr-marker-nav-arrow {
  flex: none;
  font-size: 14px;
  line-height: 1;
  opacity: 0.85;
}

.sdr-marker-nav-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Marker name (current) ── */
#sdr-marker-name {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 340px;
  text-align: center;
}

/* ── Callsign lookup info (name + country, shown below the callsign) ── */
#sdr-marker-info {
  margin-top: 4px;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.3;
  color: #9fb3c8;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 340px;
}
/* ── Callsign hover tooltip ── */
#sdr-marker-tooltip {
  position: fixed;
  z-index: 10100;
  pointer-events: none;
  background: rgba(20, 30, 42, 0.97);
  border: 1px solid rgba(127, 140, 141, 0.5);
  border-radius: 5px;
  padding: 6px 9px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  white-space: normal;
  box-shadow: 0 3px 12px rgba(0,0,0,0.7);
  display: none;
  line-height: 1.6;
  max-width: 240px;
  width: max-content;
}
#sdr-marker-tooltip.sdr-tt-visible { display: block; }
.sdr-tt-body  { display: flex; gap: 7px; align-items: flex-start; }
.sdr-tt-photo { flex: none; width: 56px; height: 56px; border-radius: 3px; object-fit: cover; border: 1px solid rgba(255,255,255,0.15); display: block; }
.sdr-tt-fields { display: flex; flex-direction: column; gap: 1px; }
.sdr-tt-value { color: #fff; font-weight: bold; white-space: normal; word-break: break-word; }
</style>

<div id="sdr-marker-tooltip"></div>

<!-- Hidden until a current / prev / next marker exists for the dial freq + mode -->
<div id="sdr-marker-widget" style="display:none">
  <div id="sdr-marker-titlebar">
    <span id="sdr-marker-title">📍 Marker</span>
    <button id="sdr-marker-close-btn" title="Hide widget">✕</button>
  </div>
  <!-- Prev/next neighbour jump — tapping tunes to that marker's freq + mode.
       Sits above the current name so the labels never overlap it. -->
  <div id="sdr-marker-nav" style="display:none">
    <button type="button" id="sdr-marker-prev" class="sdr-marker-navbtn" style="display:none" title="Tune to previous marker">
      <span class="sdr-marker-nav-arrow">‹</span>
      <span id="sdr-marker-prev-text" class="sdr-marker-nav-text"></span>
    </button>
    <button type="button" id="sdr-marker-next" class="sdr-marker-navbtn" style="display:none" title="Tune to next marker">
      <span id="sdr-marker-next-text" class="sdr-marker-nav-text"></span>
      <span class="sdr-marker-nav-arrow">›</span>
    </button>
  </div>
  <div id="sdr-marker-name"></div>
  <div id="sdr-marker-info" style="display:none"></div>
</div>

<script>
(function () {
  'use strict';

  // ── Text truncation helper ───────────────────────────────────────────────
  function truncate(str, max) {
    if (!str || str.length <= max) return str;
    return str.slice(0, max) + '…';
  }

  // ── Flag emoji helper ────────────────────────────────────────────────────
  function iso2ToFlag(code) {
    if (!code || code.length !== 2) return '';
    var c = code.toUpperCase();
    var base = 0x1F1E6 - 0x41;
    try { return String.fromCodePoint(base + c.charCodeAt(0), base + c.charCodeAt(1)); }
    catch (e) { return ''; }
  }

  // Backstop poll — catches changes with no DOM hook to observe: mode switches
  // (window.currentMode is a plain variable) and newly-arrived spots/bookmarks.
  // Frequency changes are handled instantly by a MutationObserver below. The
  // matcher is a sub-millisecond scan, so polling at 4 Hz is effectively free.
  const POLL_MS = 250;

  const widget    = document.getElementById('sdr-marker-widget');
  const nameEl    = document.getElementById('sdr-marker-name');
  const infoEl    = document.getElementById('sdr-marker-info');
  const tooltipEl = document.getElementById('sdr-marker-tooltip');
  const navRow  = document.getElementById('sdr-marker-nav');
  const prevBtn = document.getElementById('sdr-marker-prev');
  const nextBtn = document.getElementById('sdr-marker-next');
  const prevText = document.getElementById('sdr-marker-prev-text');
  const nextText = document.getElementById('sdr-marker-next-text');

  let userClosed = false; // set once the user dismisses via ✕; stays hidden after
  // Tracks which callsign the info panel is currently showing, to guard async updates.
  let _infoCallsign = '';

  // The prev/next neighbour markers currently shown, kept so the click
  // handlers know where to tune. { freq, mode, name } | null.
  let _prevMarker = null;
  let _nextMarker = null;

  // The current marker at the dial frequency — kept so the nameEl click handler
  // can read its type and name without re-running the matcher.
  let _currentMarker = null;

  // Marker types whose name is a callsign and should trigger a lookup on click.
  const CALLSIGN_TYPES = new Set(['cw', 'dx', 'voice']);

  // ── Marker matching ────────────────────────────────────────────────
  // Prefer the host app's exposed matcher (single source of truth, same
  // logic as the dial-wheel overlay — returns { current, prev, next }).
  // Fall back to an inline replica so the widget still works if the host
  // build hasn't exposed it.
  const MARKER_FREQ_TOLERANCE_HZ = 100;

  function modeFamily(m) {
    m = (m || '').toLowerCase();
    if (m === 'cw' || m === 'cwu' || m === 'cwl') return 'cw';
    if (m === 'am' || m === 'sam')                return 'am';
    if (m === 'fm' || m === 'nfm')                return 'fm';
    return m; // usb, lsb, drm, etc.
  }

  // The specific, tunable mode an extension applies when you jump to a marker
  // (cwl/cwu and lsb/usb below/above 10 MHz) — mirrors the host helpers.
  function cwModeForFreq(hz)    { return hz < 10000000 ? 'cwl' : 'cwu'; }
  function voiceModeForFreq(hz) { return hz < 10000000 ? 'lsb' : 'usb'; }

  function dxSpotMode(spot) {
    const comment = (spot.comment || '').toUpperCase();
    if (comment.includes('FT8') || comment.includes('FT4')) return 'usb';
    if (comment.includes('CW')) return cwModeForFreq(spot.frequency);
    return voiceModeForFreq(spot.frequency);
  }

  // Flatten every marker into { freq, mode, family, name, callsign, countryCode, priority, type }.
  // Spots get priority 1, bookmarks 0, so spots win when two markers share a frequency.
  // `type` (cw/dx/voice/bookmark) drives the prev/next navTypes filter.
  // `callsign` is the actual callsign string when the name IS a callsign, null otherwise
  // (e.g. voice activities without a dx_callsign get a placeholder name like 'Voice 60m').
  // `countryCode` is the ISO 3166-1 alpha-2 code for flag emoji display (may be null/empty).
  function collectMarkers() {
    const out = [];
    const add = (list, freqOf, modeOf, famOf, nameOf, callsignOf, countryCodeOf, priority, type) => {
      for (const item of list) {
        const f = freqOf(item);
        if (typeof f !== 'number' || isNaN(f)) continue;
        out.push({ freq: f, mode: modeOf(item), family: famOf(item), name: nameOf(item), callsign: callsignOf(item), countryCode: countryCodeOf(item) || '', priority, type });
      }
    };
    const cwSpots = (window.cwSpotsExtensionInstance && window.cwSpotsExtensionInstance.spots) || [];
    const dxSpots = (window.dxClusterExtensionInstance && window.dxClusterExtensionInstance.spots) || [];
    const vaState = window.VoiceActivityService && window.VoiceActivityService.getLatest();
    const voiceActs = (vaState && vaState.enabled && typeof window.VoiceActivityService.getAllActivities === 'function')
      ? window.VoiceActivityService.getAllActivities() : [];
    const vaFreq = a => a.estimated_dial_freq || a.start_freq;
    const vaMode = a => (a.mode ? a.mode.toLowerCase() : voiceModeForFreq(vaFreq(a)));
    // CW and DX spots: name IS always the callsign.
    add(cwSpots, s => s.frequency, s => cwModeForFreq(s.frequency), () => 'cw',               s => s.dx_call,   s => s.dx_call,   s => s.country_code || '',               1, 'cw');
    add(dxSpots, s => s.frequency, s => dxSpotMode(s), s => modeFamily(dxSpotMode(s)),         s => s.dx_call,   s => s.dx_call,   s => s.country_code || '',               1, 'dx');
    // Voice: only set callsign when dx_callsign is present (not a placeholder like 'Voice 60m').
    add(voiceActs, vaFreq, vaMode, a => modeFamily(vaMode(a)),
        a => (a.dx_callsign || ('Voice' + (a.band ? ' ' + a.band : ''))),
        a => a.dx_callsign || null,
        a => a.dx_country_code || '',                                                                                                          1, 'voice');
    add(window.bookmarks || [], b => b.frequency, b => (b.mode || null), b => (b.mode ? modeFamily(b.mode) : null), b => b.name, () => null, () => '', 0, 'bookmark');
    return out;
  }

  // Locate the current / prev / next markers relative to the dial freq+mode.
  // Faithful replica of the host's findMarkers(). navTypes optionally restricts
  // which marker types may become the prev/next neighbours (null = all);
  // `current` is never filtered.
  function fallbackFindMarkers(dialHz, mode, navTypes) {
    const result = { current: null, prev: null, next: null };
    if (dialHz === null) return result;
    const fam = modeFamily(mode);
    const markers = collectMarkers();
    const navFilter = Array.isArray(navTypes) ? new Set(navTypes) : null;
    const navAllowed = m => !navFilter || navFilter.has(m.type);
    let current = null, currentDist = Infinity, prev = null, next = null;
    for (const m of markers) {
      const d = Math.abs(m.freq - dialHz);
      if (d <= MARKER_FREQ_TOLERANCE_HZ) {
        const modeMatch = (m.family === null || m.family === fam);
        if (modeMatch && (!current || m.priority > current.priority ||
            (m.priority === current.priority && d < currentDist))) {
          current = m;
          currentDist = d;
        }
      } else if (m.freq < dialHz) {
        if (navAllowed(m) && (!prev || m.freq > prev.freq || (m.freq === prev.freq && m.priority > prev.priority))) prev = m;
      } else {
        if (navAllowed(m) && (!next || m.freq < next.freq || (m.freq === next.freq && m.priority > next.priority))) next = m;
      }
    }
    const strip = m => m ? { freq: m.freq, mode: m.mode, name: m.name, type: m.type, callsign: m.callsign, countryCode: m.countryCode || '' } : null;
    result.current = strip(current);
    result.prev    = strip(prev);
    result.next    = strip(next);
    return result;
  }

  function getDialHz() {
    const f = document.getElementById('frequency');
    if (!f) return null;
    const hz = parseInt(f.getAttribute('data-hz-value') || f.value);
    return isNaN(hz) ? null : hz;
  }

  function getMarkers() {
    const dialHz = getDialHz();
    const mode = window.currentMode;
    // Honour the host's prev/next marker-type preference (Audio Settings), so the
    // widget arrows step through the same markers as the dial wheel. null = all.
    const navTypes = Array.isArray(window.markerNavTypes) ? window.markerNavTypes : null;
    if (typeof window.findMarkers === 'function') {
      return window.findMarkers(dialHz, mode, navTypes);
    }
    return fallbackFindMarkers(dialHz, mode, navTypes);
  }

  // Tune to a { freq, mode } neighbour (prev/next tap), mirroring the dial-wheel
  // edge arrows: set mode first, then frequency (so autoTune fires with the right
  // mode), then pan the spectrum to follow — same sequence as the bookmark dropdown.
  function tuneToMarker(marker) {
    if (!marker || typeof marker.freq !== 'number') return;
    if (marker.mode && typeof window.setMode === 'function') window.setMode(marker.mode, false);
    if (typeof window.setFrequency === 'function') window.setFrequency(marker.freq);

    // Pan the spectrum to centre on the new frequency, same as the bookmark dropdown.
    var spectrum = window.spectrumDisplay;
    if (spectrum && spectrum.connected && spectrum.ws) {
      spectrum.skipEdgeDetectionTemporary = true;
      setTimeout(function () {
        if (spectrum) spectrum.skipEdgeDetectionTemporary = false;
      }, 2000);
      spectrum.ws.send(JSON.stringify({ type: 'pan', frequency: marker.freq }));
    }

    update();
    // Notify lookup widgets if the callsign result is already cached.
    // _fetchCallsignForMediaSession returns early on a cache hit and won't fire
    // 'callsign_lookup_complete', so we do it explicitly here.
    if (typeof window._notifyLookupWidgetIfCached === 'function') {
      window._notifyLookupWidgetIfCached(marker);
    }
  }

  // ── Callsign hover tooltip ─────────────────────────────────────────
  var _ttCallsign = '';
  var _lastTTEvent = null;

  function escMT(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function buildMarkerTooltipHTML(callsign, fname, country, grid, imageUrl, countryCode) {
    var flag = (countryCode && countryCode.length === 2) ? iso2ToFlag(countryCode) : '';
    var values = [];
    if (callsign) values.push(escMT(flag ? flag + '\u00A0' + callsign : callsign));
    if (fname)    values.push(escMT(fname));
    if (country)  values.push(escMT(country));
    if (grid)     values.push(escMT(grid));
    var fieldsHTML = values.map(function (v) {
      return '<div class="sdr-tt-value">' + v + '</div>';
    }).join('');
    if (imageUrl) {
      var imgHTML = '<img class="sdr-tt-photo" src="' + escMT(imageUrl) + '" alt="' + escMT(callsign) + '" ' +
                   'onerror="this.style.display=\'none\'" />';
      return '<div class="sdr-tt-body">' + imgHTML + '<div class="sdr-tt-fields">' + fieldsHTML + '</div></div>';
    }
    return '<div class="sdr-tt-body"><div class="sdr-tt-fields">' + fieldsHTML + '</div></div>';
  }

  function positionMarkerTooltip(e) {
    _lastTTEvent = e;
    var ttW = tooltipEl.offsetWidth;
    var ttH = tooltipEl.offsetHeight;
    var x = e.clientX + 14;
    var y = e.clientY - ttH / 2;
    if (x + ttW > window.innerWidth  - 8) x = e.clientX - ttW - 10;
    if (y < 4)                            y = 4;
    if (y + ttH > window.innerHeight - 4) y = window.innerHeight - ttH - 4;
    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top  = y + 'px';
  }

  function showMarkerTooltip(callsign, e) {
    if (!callsign) return;
    _ttCallsign = callsign;

    // Get country code from current marker for flag emoji
    var countryCode = (_currentMarker && _currentMarker.countryCode) ? _currentMarker.countryCode : '';

    // Immediate render from cache
    var fname = '', country = '', grid = '', imageUrl = '';
    var cache = window._callsignLookupCache;
    if (cache) {
      var cached = cache.get(callsign);
      if (cached && cached.data) {
        var d = cached.data;
        fname    = truncate(d.name_fmt || [d.fname, d.nickname ? '"' + d.nickname + '"' : '', d.name].filter(Boolean).join(' '), 30);
        country  = d.country || d.land || '';
        grid     = d.grid || '';
        imageUrl = cached.imageUrl || d.image || '';
      }
    }
    tooltipEl.innerHTML = buildMarkerTooltipHTML(callsign, fname, country, grid, imageUrl, countryCode);
    tooltipEl.classList.add('sdr-tt-visible');
    positionMarkerTooltip(e);

    // Background fetch if not yet cached
    if (!fname && window.instanceDescription && window.instanceDescription.lookup_service === true) {
      if (typeof window._fetchCallsignForMediaSession === 'function') {
        var fetchFor = callsign;
        window._fetchCallsignForMediaSession(callsign).then(function () {
          if (_ttCallsign !== fetchFor) return;
          if (!tooltipEl.classList.contains('sdr-tt-visible')) return;
          var c2 = window._callsignLookupCache;
          var result = c2 && c2.get(fetchFor);
          if (result && result.data) {
            var d2 = result.data;
            var fn = truncate(d2.name_fmt || [d2.fname, d2.nickname ? '"' + d2.nickname + '"' : '', d2.name].filter(Boolean).join(' '), 30);
            var co = d2.country || d2.land || '';
            var gr = d2.grid || '';
            var iu = result.imageUrl || d2.image || '';
            tooltipEl.innerHTML = buildMarkerTooltipHTML(fetchFor, fn, co, gr, iu, countryCode);
            positionMarkerTooltip(_lastTTEvent || e);
          }
        }).catch(function () {});
      }
    }
  }

  function hideMarkerTooltip() {
    tooltipEl.classList.remove('sdr-tt-visible');
    _ttCallsign = '';
    _lastTTEvent = null;
  }

  // ── Callsign info panel ────────────────────────────────────────────
  // Shows name + country below the large callsign when lookup service is available.
  function setInfoPanel(lines) {
    if (!lines || lines.length === 0) {
      infoEl.style.display = 'none';
      infoEl.innerHTML = '';
    } else {
      infoEl.innerHTML = lines.map(function (l) {
        return '<div>' + l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
      }).join('');
      infoEl.style.display = '';
    }
  }

  // Tracks whether a background fetch is already in-flight for a callsign,
  // so the 4 Hz poll doesn't fire duplicate requests.
  let _infoFetchPending = '';

  function updateInfoPanel(callsign) {
    if (!callsign) { setInfoPanel(null); _infoCallsign = ''; _infoFetchPending = ''; return; }

    // Check cache first — show immediately if available
    const cache = window._callsignLookupCache;
    if (cache) {
      const cached = cache.get(callsign);
      if (cached && cached.data) {
        const d = cached.data;
        const fname = truncate(d.name_fmt || [d.fname, d.nickname ? '"' + d.nickname + '"' : '', d.name].filter(Boolean).join(' '), 30);
        const country = d.country || d.land || '';
        const parts = [fname, country].filter(Boolean);
        _infoCallsign = callsign;
        _infoFetchPending = '';
        setInfoPanel(parts);
        return; // already have data
      }
    }

    // No cached data yet — initiate a background fetch if not already pending
    _infoCallsign = callsign;
    if (_infoFetchPending === callsign) return; // fetch already in-flight
    setInfoPanel(null);

    if (window.instanceDescription && window.instanceDescription.lookup_service === true) {
      if (typeof window._fetchCallsignForMediaSession === 'function') {
        _infoFetchPending = callsign;
        const fetchFor = callsign;
        window._fetchCallsignForMediaSession(callsign).then(function () {
          if (_infoCallsign !== fetchFor) return; // stale
          _infoFetchPending = '';
          const c2 = window._callsignLookupCache;
          const result = c2 && c2.get(fetchFor);
          if (result && result.data) {
            const d2 = result.data;
            const fn = truncate(d2.name_fmt || [d2.fname, d2.nickname ? '"' + d2.nickname + '"' : '', d2.name].filter(Boolean).join(' '), 30);
            const co = d2.country || d2.land || '';
            setInfoPanel([fn, co].filter(Boolean));
          }
        }).catch(function () { _infoFetchPending = ''; });
      }
    }
  }

  // ── Render ─────────────────────────────────────────────────────────
  let _lastName = undefined;
  let _lastCountryCode = undefined;

  // Show/hide one neighbour button and label it. Returns true if shown.
  // flagSide: 'left' = flag before name (prev), 'right' = flag after name (next).
  function updateNavButton(btn, textEl, marker, flagSide) {
    if (!marker) {
      if (btn.style.display !== 'none') btn.style.display = 'none';
      return false;
    }
    const flag = (marker.countryCode && marker.countryCode.length === 2) ? iso2ToFlag(marker.countryCode) : '';
    let displayName;
    if (!flag) {
      displayName = marker.name;
    } else if (flagSide === 'right') {
      displayName = marker.name + '\u00A0' + flag;
    } else {
      displayName = flag + '\u00A0' + marker.name;
    }
    if (textEl.textContent !== displayName) {
      textEl.textContent = displayName;
      btn.title = 'Tune to ' + marker.name;
    }
    if (btn.style.display === 'none') btn.style.display = '';
    return true;
  }

  function update() {
    if (userClosed) return;
    const { current, prev, next } = getMarkers();
    _prevMarker = prev;
    _nextMarker = next;
    _currentMarker = current;
    const name = current ? current.name : null;

    // Hide the widget only when there is NO current, prev AND next marker.
    if (!name && !prev && !next) {
      if (widget.style.display !== 'none') widget.style.display = 'none';
      _lastName = null;
      return;
    }

    if (widget.style.display === 'none') widget.style.display = '';

    // ── Prev/next neighbours (row above the current name) ──
    const hasPrev = updateNavButton(prevBtn, prevText, prev, 'left');
    const hasNext = updateNavButton(nextBtn, nextText, next, 'right');
    navRow.style.display = (hasPrev || hasNext) ? '' : 'none';

    // ── Current marker name ──
    if (!name) {
      if (nameEl.style.display !== 'none') nameEl.style.display = 'none';
      _lastName = null;
      nameEl.style.cursor = '';
      nameEl.title = '';
      hideMarkerTooltip();
      updateInfoPanel(null);
    } else {
      if (nameEl.style.display === 'none') nameEl.style.display = '';
      // CW/DX spots are always callsigns; voice only when dx_callsign is set.
      // Use current.callsign when set, otherwise fall back to name for cw/dx types.
      const lookupCallsign = current.callsign || (CALLSIGN_TYPES.has(current.type) && current.type !== 'voice' ? name : null);
      const isCallsign = !!lookupCallsign;
      // Store resolved callsign on _currentMarker so the click handler can use it.
      _currentMarker.lookupCallsign = lookupCallsign;
      nameEl.style.cursor = isCallsign ? 'pointer' : '';
      // Tooltip replaces the title for callsigns; keep title for non-callsign names.
      nameEl.title = isCallsign ? '' : name;
      const currentCountryCode = (isCallsign && current.countryCode) ? current.countryCode : '';
      if (name !== _lastName || currentCountryCode !== _lastCountryCode) {
        _lastName = name;
        _lastCountryCode = currentCountryCode;
        // Append flag emoji after callsign when country code is available
        const flag = currentCountryCode ? iso2ToFlag(currentCountryCode) : '';
        nameEl.textContent = flag ? name + '\u00A0' + flag : name;
        // Clear info panel immediately when callsign changes
        if (!isCallsign) updateInfoPanel(null);
        // Hide stale tooltip when marker changes
        hideMarkerTooltip();
      }
      // Always re-check info panel for callsign markers so it populates
      // as soon as the lookup cache is filled (handles initial load race).
      if (isCallsign) updateInfoPanel(lookupCallsign);
    }
  }

  // ── Prev/next click handlers ───────────────────────────────────────
  prevBtn.addEventListener('click', e => { e.stopPropagation(); tuneToMarker(_prevMarker); });
  nextBtn.addEventListener('click', e => { e.stopPropagation(); tuneToMarker(_nextMarker); });

  // ── Current marker name click → callsign lookup ────────────────────
  // When the current marker is a CW/DX/voice spot (i.e. its name is a
  // callsign), clicking the name triggers a lookup in any registered
  // lookup widget (e.g. qrz_lookup.widget.html) via window.lookupCallsign().
  nameEl.addEventListener('click', () => {
    if (!_currentMarker) return;
    const callsign = _currentMarker.lookupCallsign || _currentMarker.callsign;
    if (!callsign) return;
    if (typeof window.lookupCallsign === 'function') {
      window.lookupCallsign(callsign);
    }
  });

  // ── Callsign name hover → tooltip ─────────────────────────────────
  nameEl.addEventListener('mouseenter', e => {
    const callsign = _currentMarker && (_currentMarker.lookupCallsign || _currentMarker.callsign);
    if (callsign) showMarkerTooltip(callsign, e);
  });
  nameEl.addEventListener('mousemove', e => {
    if (tooltipEl.classList.contains('sdr-tt-visible')) positionMarkerTooltip(e);
  });
  nameEl.addEventListener('mouseleave', () => hideMarkerTooltip());

  // ── Close button ───────────────────────────────────────────────────
  document.getElementById('sdr-marker-close-btn').addEventListener('click', () => {
    userClosed = true;
    widget.style.display = 'none';
  });

  // ── Drag to reposition ─────────────────────────────────────────────
  (function initDrag() {
    const LS_KEY = 'sdr-marker-widget-pos';
    let dragging = false, startX, startY, origLeft, origTop;

    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY));
      if (saved && typeof saved.left === 'number' && typeof saved.top === 'number') {
        const maxL = window.innerWidth  - widget.offsetWidth;
        const maxT = window.innerHeight - widget.offsetHeight;
        widget.style.left      = Math.max(0, Math.min(maxL, saved.left)) + 'px';
        widget.style.top       = Math.max(0, Math.min(maxT, saved.top))  + 'px';
        widget.style.right     = 'auto';
        widget.style.transform = 'none';
      }
    } catch (_) {}

    function resolvePosition() {
      const r = widget.getBoundingClientRect();
      widget.style.left      = r.left + 'px';
      widget.style.top       = r.top  + 'px';
      widget.style.right     = 'auto';
      widget.style.transform = 'none';
    }

    function savePosition() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          left: parseFloat(widget.style.left),
          top:  parseFloat(widget.style.top),
        }));
      } catch (_) {}
    }

    widget.addEventListener('pointerdown', e => {
      if (e.target.closest('button, a, #sdr-marker-name, #sdr-marker-info')) return;
      e.preventDefault();
      resolvePosition();
      dragging = true;
      startX   = e.clientX;
      startY   = e.clientY;
      origLeft = parseFloat(widget.style.left);
      origTop  = parseFloat(widget.style.top);
      widget.classList.add('dragging');
      widget.setPointerCapture(e.pointerId);
    });

    widget.addEventListener('pointermove', e => {
      if (!dragging) return;
      const maxL = window.innerWidth  - widget.offsetWidth;
      const maxT = window.innerHeight - widget.offsetHeight;
      widget.style.left = Math.max(0, Math.min(maxL, origLeft + (e.clientX - startX))) + 'px';
      widget.style.top  = Math.max(0, Math.min(maxT, origTop  + (e.clientY - startY))) + 'px';
    });

    widget.addEventListener('pointerup', () => {
      if (dragging) savePosition();
      dragging = false;
      widget.classList.remove('dragging');
    });
    widget.addEventListener('pointercancel', () => { dragging = false; widget.classList.remove('dragging'); });

    // Re-clamp on resize so the widget never ends up off-screen
    window.addEventListener('resize', () => {
      if (widget.style.left && widget.style.top && widget.style.transform === 'none') {
        const maxL = window.innerWidth  - widget.offsetWidth;
        const maxT = window.innerHeight - widget.offsetHeight;
        widget.style.left = Math.max(0, Math.min(maxL, parseFloat(widget.style.left))) + 'px';
        widget.style.top  = Math.max(0, Math.min(maxT, parseFloat(widget.style.top)))  + 'px';
      }
    });
  })();

  // ── Boot ───────────────────────────────────────────────────────────
  update();

  // Instant response to tuning: the host rewrites #frequency's data-hz-value
  // on every dial change, so observing that attribute updates us with no lag.
  const freqInput = document.getElementById('frequency');
  if (freqInput && 'MutationObserver' in window) {
    new MutationObserver(update).observe(freqInput, {
      attributes: true,
      attributeFilter: ['data-hz-value', 'value'],
    });
  }

  setInterval(update, POLL_MS);

})();
</script>

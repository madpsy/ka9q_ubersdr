// ── Voice activity ticker ─────────────────────────────────────────────────────
let _vaTimer = null;

// Tracks when each activity fingerprint (freq|callsign) was first seen so we
// can highlight items that haven't appeared in the last 10 minutes.
const _VA_NEW_THRESHOLD_MS = 10 * 60 * 1000;
const _vaSeenMap = new Map(); // fingerprint → timestamp (ms) when last seen

async function _fetchVoiceActivity() {
    const resp = await fetch('/api/noisefloor/voice-activity/all');
    if (!resp.ok) throw new Error(`voice-activity HTTP ${resp.status}`);
    return resp.json();
}

let _tickerHadItems = false; // true once we've shown at least one item
let _tickerLastKey  = '';    // fingerprint of last rendered item list
let _tickerAnimStart = null; // performance.now() when current animation began
const _TICKER_PX_PER_S = 60; // scroll speed

function _renderVoiceTicker(data) {
    const tickerEl = document.getElementById('cond-ticker');
    const trackEl  = document.getElementById('cond-ticker-track');
    if (!tickerEl || !trackEl) return;

    // Flatten all activities across all bands into a sorted list
    const items = [];
    const bands = data?.bands || {};
    for (const [band, activities] of Object.entries(bands)) {
        for (const act of activities) {
            items.push({ band, ...act });
        }
    }

    // Sort by frequency ascending so the ticker reads low-to-high across bands
    items.sort((a, b) =>
        (a.estimated_dial_freq || a.center_freq || 0) -
        (b.estimated_dial_freq || b.center_freq || 0)
    );

    // If no items, keep whatever is already scrolling — don't hide or reset
    if (items.length === 0) {
        if (!_tickerHadItems) tickerEl.style.display = 'none';
        return;
    }
    _tickerHadItems = true;

    // Build a fingerprint — skip DOM rebuild if nothing changed
    const newKey = items.map(a =>
        `${a.estimated_dial_freq || a.center_freq}|${a.dx_callsign || ''}|${a.band}`
    ).join(',');
    if (newKey === _tickerLastKey) return;
    _tickerLastKey = newKey;

    // Prune stale entries from the seen-map so it doesn't grow unbounded
    const _now = Date.now();
    const _cutoff = _now - _VA_NEW_THRESHOLD_MS;
    for (const [fp, ts] of _vaSeenMap) {
        if (ts < _cutoff) _vaSeenMap.delete(fp);
    }

    // Build item element
    function makeItem(act) {
        const freqMHz = ((act.estimated_dial_freq || act.center_freq) / 1e6).toFixed(3);
        const band    = act.band.toUpperCase();
        const mode    = (act.mode || 'USB').toUpperCase();
        const call    = act.dx_callsign || '';
        const cc      = act.dx_country_code || '';
        const flag    = cc ? iso2ToFlag(cc) : '';

        // Fingerprint: frequency + callsign (band is redundant with freq range)
        const fp      = `${act.estimated_dial_freq || act.center_freq}|${call}`;
        const lastSeen = _vaSeenMap.get(fp);
        const isNew   = !lastSeen || (_now - lastSeen) > _VA_NEW_THRESHOLD_MS;
        // Always update the timestamp so continuous activity doesn't re-trigger
        _vaSeenMap.set(fp, _now);

        const el = document.createElement('span');
        el.className = 'cond-ticker-item' + (isNew ? ' cond-ticker-item--new' : '');
        el.innerHTML =
            (isNew ? `<span class="cond-ticker-new-star">★</span>` : '') +
            `<span class="cond-ticker-band">${_escHtml(band)}</span>` +
            `<span class="cond-ticker-freq">${_escHtml(freqMHz)} MHz ${_escHtml(mode)}</span>` +
            (call
                ? `<span class="cond-ticker-flag">${flag}</span><span class="cond-ticker-call">${_escHtml(call)}</span>`
                : `<span class="cond-ticker-call" style="color:#888">Voice</span>`);
        return el;
    }

    // Show ticker so layout is computable
    tickerEl.style.display = 'block';

    // Measure single-copy width using a hidden probe element
    const probe = document.createElement('span');
    probe.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;display:inline-flex;';
    for (const act of items) probe.appendChild(makeItem(act));
    tickerEl.appendChild(probe);
    let singleW = 0;
    for (let i = 0; i < probe.children.length; i++) singleW += probe.children[i].offsetWidth;
    tickerEl.removeChild(probe);

    if (singleW < 10) {
        // Can't measure yet — defer and retry
        setTimeout(() => _renderVoiceTicker(data), 120);
        return;
    }

    // How many copies to fill the viewport with at least one spare
    const viewportW = tickerEl.offsetWidth || 800;
    const copies    = Math.max(2, Math.ceil(viewportW / singleW) + 1);

    // How far through the current cycle are we?  Preserve this so the
    // animation restarts at the same visual position with no jump.
    // On first render _tickerAnimStart is null → start from 0.
    const elapsedMs  = _tickerAnimStart !== null ? (performance.now() - _tickerAnimStart) : 0;
    const elapsedPx  = (elapsedMs / 1000) * _TICKER_PX_PER_S;
    const offsetPx   = elapsedPx % singleW;           // position within one cycle
    const duration   = singleW / _TICKER_PX_PER_S;    // seconds for one full cycle
    const delayS     = -(offsetPx / _TICKER_PX_PER_S); // negative delay = start mid-cycle

    // Rebuild DOM
    trackEl.innerHTML = '';
    for (let c = 0; c < copies; c++) {
        for (const act of items) trackEl.appendChild(makeItem(act));
    }

    // Apply CSS animation.  We set all animation properties via inline style
    // so the keyframe can use --ticker-shift for the translate distance.
    // To force the browser to restart the animation (pick up the new delay),
    // we briefly set animation to 'none', force a reflow, then restore it.
    trackEl.style.setProperty('--ticker-shift', `-${singleW}px`);
    trackEl.style.animation = 'none';
    trackEl.offsetWidth; // force reflow — do NOT remove this line
    trackEl.style.animation = `ticker-scroll ${duration}s ${delayS}s linear infinite`;

    // Record when this animation cycle effectively started (adjusted for delay)
    _tickerAnimStart = performance.now() + delayS * 1000;
}

async function _refreshVoiceTicker() {
    try {

        // Adjust body padding in case bar height changed

}

// ── Flag emoji helper ─────────────────────────────────────────────────────────
function iso2ToFlag(code) {
    if (!code || code.length !== 2) return '';
    const c = code.toUpperCase();
    const base = 0x1F1E6 - 0x41;
    try {
        return String.fromCodePoint(base + c.charCodeAt(0), base + c.charCodeAt(1));
    } catch (e) {
        return '';
    }
}

// ── Hardware + session status fetch ──────────────────────────────────────────
async function _fetchHardwareStatus() {
    const results = await Promise.allSettled([
        _rotatorEnabled   ? fetch('/api/rotctl/status').then(r => r.ok ? r.json() : null)    : Promise.resolve(null),
        _antSwitchEnabled ? fetch('/api/ant-switch/status').then(r => r.ok ? r.json() : null) : Promise.resolve(null),
        fetch('/stats').then(r => r.ok ? r.json() : null)
    ]);
    return {
        rot:     results[0].status === 'fulfilled' ? results[0].value : null,
        ant:     results[1].status === 'fulfilled' ? results[1].value : null,
        session: results[2].status === 'fulfilled' ? results[2].value : null
    };
}

function _renderHardware(hw) {
    const el = document.getElementById('cond-hardware');
    if (!el) return;

    el.innerHTML = '';

    const rot     = hw?.rot;
    const ant     = hw?.ant;
    const session = hw?.session;

    // ── Session row (always shown) ──
    {
        const row = document.createElement('div');
        row.className = 'cond-hw-row';

        const label = document.createElement('span');
        label.className = 'cond-hw-label';
        label.textContent = 'Users';

        const count = session?.active_sessions ?? 0;
        const val = document.createElement('span');
        val.className = 'cond-hw-value';

        row.appendChild(label);
        row.appendChild(val);

        // Unique country flags
        if (session?.channels && session.channels.length > 0) {
            const codes = [...new Set(
                session.channels
                    .map(c => c.country_code)
                    .filter(Boolean)
            )];
            if (codes.length > 0) {
                const flagsEl = document.createElement('span');
                flagsEl.className = 'cond-hw-flags';
                flagsEl.textContent = codes.map(iso2ToFlag).join('');
                row.appendChild(flagsEl);
            }
        }

        el.appendChild(row);
    }

    // ── Rotator row ──
    if (_rotatorEnabled && rot) {
        const row = document.createElement('div');
        row.className = 'cond-hw-row';

        const label = document.createElement('span');
        label.className = 'cond-hw-label';
        label.textContent = 'Rotator';

        if (!rot.connected) {
            const badge = document.createElement('span');
            badge.className = 'cond-hw-badge stopped';
            badge.textContent = 'Offline';
            row.appendChild(label);
            row.appendChild(badge);
        } else {
            const az = typeof rot.position?.azimuth === 'number'
                ? rot.position.azimuth.toFixed(1) + '°'
                : '—';

            const badge = document.createElement('span');
            badge.className = `cond-hw-badge ${rot.moving ? 'moving' : 'stopped'}`;
            const arrow = _azimuthArrow(rot.position?.azimuth);
            badge.textContent = `${arrow} ${az}`;
            if (rot.moving) badge.title = 'Rotating…';

            row.appendChild(label);
            row.appendChild(badge);
        }
        el.appendChild(row);
    }

    // ── Ant-switch row ──
    if (_antSwitchEnabled && ant) {
        const row = document.createElement('div');
        row.className = 'cond-hw-row';

        const label = document.createElement('span');
        label.className = 'cond-hw-label';
        label.textContent = 'Antenna';

        const badge = document.createElement('span');

        if (ant.grounded) {
            badge.className = 'cond-hw-badge grounded';
            badge.textContent = '⚡ Grounded';
        } else {
            const selected = Array.isArray(ant.selected) ? ant.selected : [];
            const labels   = Array.isArray(ant.antenna_labels) ? ant.antenna_labels : [];
            if (selected.length === 0) {
                badge.className = 'cond-hw-badge stopped';
                badge.textContent = 'None';
            } else {
                const names = selected.map(n => labels[n - 1] || `Ant ${n}`);
                badge.className = 'cond-hw-badge active';
                badge.textContent = names.join(', ');
                badge.title = names.join(', ');
            }
        }

        row.appendChild(label);
        row.appendChild(badge);
        el.appendChild(row);
    }

    el.style.display = '';
}

// Returns a simple Unicode compass arrow for an azimuth in degrees
function _azimuthArrow(az) {
    if (az === null || az === undefined) return '↑';
    const dirs = ['↑','↗','→','↘','↓','↙','←','↖'];
    return dirs[Math.round(((az % 360) + 360) % 360 / 45) % 8];
}

async function _refreshHardware() {
    try {
        const hw = await _fetchHardwareStatus();
        _renderHardware(hw);
        // Adjust body padding in case the bar height changed
        const bar = document.getElementById('conditions-bar');
        if (bar && bar.style.display !== 'none') {
            requestAnimationFrame(() => {
                document.body.style.paddingBottom = bar.offsetHeight + 'px';
            });
        }
    } catch (err) {
        console.warn('[conditions] hardware refresh error:', err);
    }
}

function _startHardwareTimer() {
    if (_hwTimer !== null) return;
    _refreshHardware();                                   // immediate first fetch
    _hwTimer = setInterval(_refreshHardware, 5_000);     // every 5 s
}

function _escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

function _windDir(deg) {
    if (deg === null || deg === undefined) return '';
    return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];
}

function _renderConditions(bandStates, sw, wx) {
    const bar = document.getElementById('conditions-bar');
    if (!bar) return;

    // ── Band pills ──
    const bandsEl = document.getElementById('cond-bands');
    if (bandsEl) {
        bandsEl.innerHTML = '';
        const bands = allBands.length > 0 ? allBands : _COND_BANDS_FALLBACK;
        let anyBand = false;
        for (const band of bands) {
            const st = bandStates ? bandStates[band] : null;
            if (!st) continue;
            anyBand = true;
            const cls    = st.status;
            const snrTxt = st.snr !== null ? st.snr.toFixed(1) : '—';
            const pill   = document.createElement('div');
            pill.className = `cond-band-pill ${cls}`;
            pill.title = `${band.toUpperCase()} · FT8 SNR ${snrTxt} dB (10-min avg)`;
            pill.innerHTML =
                `<span class="cpill-name">${band.toUpperCase()}</span>` +
                `<span class="cpill-snr">${snrTxt}</span>`;
            bandsEl.appendChild(pill);
        }
        if (!anyBand) {
            bandsEl.innerHTML = '<span style="color:#555;font-size:0.8em">Band data unavailable</span>';
        }
    }

    // ── Local weather ──
    const wxEl = document.getElementById('cond-weather');
    if (wxEl) {
        if (wx && wx.weather && wx.weather.length > 0) {
            wxEl.style.display = '';
            wxEl.innerHTML = '';

            const iconCode  = wx.weather[0].icon;
            const desc      = wx.weather[0].description
                .split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            const tempC     = wx.main?.temp     !== undefined ? Math.round(wx.main.temp)       : null;
            const feelsLike = wx.main?.feels_like !== undefined ? Math.round(wx.main.feels_like) : null;
            const humidity  = wx.main?.humidity  !== undefined ? wx.main.humidity               : null;
            const pressure  = wx.main?.pressure  !== undefined ? wx.main.pressure               : null;
            const windMs    = wx.wind?.speed     !== undefined ? wx.wind.speed                  : null;
            const windKmh   = windMs !== null ? Math.round(windMs * 3.6) : null;
            const windDeg   = wx.wind?.deg       !== undefined ? wx.wind.deg                    : null;
            const gustMs    = wx.wind?.gust      !== undefined ? wx.wind.gust                   : null;
            const gustKmh   = gustMs !== null ? Math.round(gustMs * 3.6) : null;

            const img = document.createElement('img');
            img.className = 'cond-wx-icon';
            img.src = `/weather/${iconCode}_t.png`;
            img.alt = desc;
            img.onerror = () => img.style.display = 'none';
            wxEl.appendChild(img);

            const info = document.createElement('div');
            info.className = 'cond-wx-info';

            const descEl = document.createElement('div');
            descEl.className = 'cond-wx-desc';
            descEl.textContent = desc;
            info.appendChild(descEl);

            const chips = document.createElement('div');
            chips.className = 'cond-wx-chips';

            const addChip = (icon, val, title) => {
                if (val === null || val === undefined) return;
                const c = document.createElement('span');
                c.className = 'cond-wx-chip';
                c.title = title || '';
                c.innerHTML = `${icon} <strong>${val}</strong>`;
                chips.appendChild(c);
            };

            if (tempC !== null) {
                const tip = feelsLike !== null ? `Feels like ${feelsLike}°C` : 'Temperature';
                addChip('🌡️', `${tempC}°C`, tip);
            }
            if (humidity !== null) addChip('💧', `${humidity}%`, 'Relative humidity');
            if (pressure !== null) addChip('🔵', `${pressure} hPa`, 'Atmospheric pressure');
            if (windKmh !== null) {
                const dir = _windDir(windDeg);
                const gust = gustKmh !== null ? ` (gusts ${gustKmh})` : '';
                addChip('💨', `${windKmh} km/h${dir ? ' ' + dir : ''}${gust}`, 'Wind speed');
            }

            info.appendChild(chips);
            wxEl.appendChild(info);
        } else {
            wxEl.style.display = 'none';
        }
    }

    // ── Space weather ──
    const swEl = document.getElementById('cond-sw');
    if (swEl) {
        if (sw) {
            swEl.innerHTML = '';
            swEl.style.display = '';

            const solarFlux = sw.solar_flux      !== undefined ? Math.round(sw.solar_flux)   : null;
            const kIndex    = sw.k_index         !== undefined ? sw.k_index                  : null;
            const aIndex    = sw.a_index         !== undefined ? sw.a_index                  : null;
            const bz        = sw.solar_wind_bz   !== undefined ? sw.solar_wind_bz.toFixed(1) : null;
            const propQual  = sw.propagation_quality || null;
            const kStatus   = sw.k_index_status  || null;

            const rows = [
                { label: 'Solar Flux',    value: solarFlux !== null ? `${solarFlux} SFU` : '—' },
                { label: 'K-Index',       value: kIndex    !== null ? `${kIndex}${kStatus ? ' · ' + kStatus : ''}` : '—' },
                { label: 'A-Index',       value: aIndex    !== null ? `${aIndex}` : '—' },
                { label: 'Solar Wind Bz', value: bz        !== null ? `${bz} nT` : '—' },
            ];

            for (const row of rows) {
                const div = document.createElement('div');
                div.className = 'cond-sw-row';
                div.innerHTML = `<span class="cond-sw-label">${row.label}</span><span class="cond-sw-value">${row.value}</span>`;
                swEl.appendChild(div);
            }

            if (propQual) {
                const div = document.createElement('div');
                div.className = 'cond-sw-row';
                const cls = _swPropClass(propQual);
                div.innerHTML = `<span class="cond-sw-label">Propagation</span><span class="cond-sw-badge ${cls}">${_escHtml(propQual)}</span>`;
                swEl.appendChild(div);
            }
        } else {
            swEl.style.display = 'none';
        }
    }



    bar.style.display = '';
    // Adjust body bottom padding so the fixed bar never covers content
    requestAnimationFrame(() => {
        document.body.style.paddingBottom = bar.offsetHeight + 'px';
    });
}

async function _refreshConditions() {
    try {
        const [bandResult, swResult, wxResult] = await Promise.allSettled([
            _fetchBandConditions(),
            _fetchSpaceWeather(),
            _fetchWeather()
        ]);
        const bs     = bandResult.status === 'fulfilled' ? bandResult.value : null;
        const swData = swResult.status   === 'fulfilled' ? swResult.value   : null;
        const wxData = wxResult.status   === 'fulfilled' ? wxResult.value   : null;
        _renderConditions(bs, swData, wxData);
    } catch (err) {
        console.warn('[conditions] refresh error:', err);
    }
}

function _startConditionsTimer() {
    if (_condTimer !== null) return;
    _refreshConditions();                              // immediate first fetch
    _condTimer = setInterval(_refreshConditions, 5 * 60 * 1000); // every 5 min
}

function _startWatchdog() {
    if (_watchdogTimer !== null) return;
    _watchdogTimer = setInterval(() => {
        if (activeBands.size === 0) return;
        if (_lastEventTime === 0) return; // haven't connected yet
        if (Date.now() - _lastEventTime > _STALE_MS) {
            console.warn('[band-activity] stale SSE connection — reconnecting');
            _lastEventTime = 0;
            connectSSE();
        }
    }, 10_000); // check every 10 s
}

// ── Page-visibility reconnect ─────────────────────────────────────────────────
// When the tab becomes visible again after being hidden, reconnect immediately
// rather than waiting for the backoff timer.
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && activeBands.size > 0) {
        // Only reconnect if we're not already live
        if (!sse || sse.readyState === EventSource.CLOSED) {
            _sseRetryDelay = 2000; // reset backoff
            connectSSE();
        }
    }
});

// ── Initialisation ────────────────────────────────────────────────────────────
async function init() {
    setStatus('wait', 'Loading band config…');

    // Fetch receiver description (callsign / name / location / hardware flags) — best-effort, non-fatal
    try {
        const descResp = await fetch('/api/description');
        if (descResp.ok) {
            const desc = await descResp.json();
            const rx = desc.receiver || {};
            const callsign = (rx.callsign || '').trim();
            const name     = (rx.name     || '').trim();
            const location = (rx.location || '').trim();

            if (callsign) {
                document.getElementById('receiver-callsign').textContent = callsign;
                document.title = `Band Activity Monitor - ${callsign}`;
            }
            if (name) {
                document.getElementById('receiver-name').textContent = name;
            }
            if (location) {
                document.getElementById('receiver-location').textContent = location ? `· ${location}` : '';
            }

            // Detect hardware features for the conditions bar
            _rotatorEnabled   = !!(desc.rotator?.enabled);
            _antSwitchEnabled = !!(desc.ant_switch?.enabled);

            // Receiver local timezone offset (minutes east of UTC)
            const tzOffset = desc.receiver?.timezone_offset;
            if (typeof tzOffset === 'number') _localTzOffsetMin = tzOffset;
            _cwEnabled        = !!(desc.cw_skimmer);
        }
    } catch(_) { /* non-fatal — receiver info is cosmetic */ }

    let cfg;
    try {
        const resp = await fetch('/api/noisefloor/config');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        cfg = await resp.json();
    } catch(err) {
        setStatus('error', `Failed to load config: ${err.message}`);
        return;
    }

    if (!cfg.bands || cfg.bands.length === 0) {
        setStatus('error', 'No bands configured on server');
        return;
    }

    // Build metadata map and ordered list, sorted by start frequency (lowest first)
    allBands = [];
    for (const b of cfg.bands) {
        bandMeta[b.name] = b;
        allBands.push(b.name);
    }
    allBands.sort((a, b) => bandMeta[a].start - bandMeta[b].start);

    // Load saved preferences (which bands were active, dB range)
    loadPrefs();

    // Default: prefer the key HF ham bands; fall back to all bands if none exist
    if (activeBands.size === 0) {
        const preferred = ['80m', '40m', '20m', '15m', '10m'];
        for (const name of preferred) {
            if (bandMeta[name]) activeBands.add(name);
        }
        // If none of the preferred bands are configured, show everything
        if (activeBands.size === 0) {
            for (const name of allBands) activeBands.add(name);
        }
    }

    // Build band pills
    const pillsEl = document.getElementById('band-pills');
    for (const name of allBands) {
        const pill = document.createElement('button');
        pill.className = 'band-pill' + (activeBands.has(name) ? ' active' : '');
        pill.dataset.band = name;
        const meta = bandMeta[name];
        const bwKHz = Math.round(meta.bin_bandwidth * meta.bin_count / 1000);
        pill.textContent = name.toUpperCase();
        pill.title = `${(meta.start/1e6).toFixed(3)}–${(meta.end/1e6).toFixed(3)} MHz · ${meta.bin_count} bins · ${meta.bin_bandwidth} Hz/bin`;
        pill.addEventListener('click', () => toggleBand(name));
        pillsEl.appendChild(pill);
    }

    // All / None buttons
    document.getElementById('btn-all').addEventListener('click', () => {
        activeBands = new Set(allBands);
        updatePills();
        rebuildPanels();
        savePrefs();
    });
    document.getElementById('btn-none').addEventListener('click', () => {
        activeBands = new Set();
        updatePills();
        rebuildPanels();
        savePrefs();
    });

    // dB range controls
    document.getElementById('db-min').addEventListener('change', e => {
        dbMin = parseFloat(e.target.value) || -130;
        savePrefs();
        // Mark all panels dirty so they redraw with new range
        for (const p of Object.values(panels)) p.dirty = true;
    });
    document.getElementById('db-max').addEventListener('change', e => {
        dbMax = parseFloat(e.target.value) || -60;
        savePrefs();
        for (const p of Object.values(panels)) p.dirty = true;
    });

    // Palette selector
    document.getElementById('palette-select').addEventListener('change', e => {
        currentPalette = e.target.value;
        CMAP = buildCMAP(currentPalette);
        savePrefs();
        // Redraw all panels with the new colour map
        for (const p of Object.values(panels)) p.dirty = true;
    });

    // Build initial panels and connect SSE
    rebuildPanels();

    // Start stale-connection watchdog (checks every 10 s, fires after 45 s silence)
    _startWatchdog();
    // Start 1s status text timer (decoupled from data events so it never flickers)
    _startStatusTimer();
    // Start band conditions + space weather panel (refreshes every 5 min)
    _startConditionsTimer();
    // Start rotator / ant-switch status poll (refreshes every 5 s)
    _startHardwareTimer();
    // Start voice activity ticker (refreshes every 5 s)
    _startVoiceTickerTimer();
    // Start CW spots SSE stream (if CW skimmer is enabled)
    _startCWSpots();
}

init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Activity Monitor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

/* ── Top bar ── */
#topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #111118;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

#topbar h1 {
    font-size: 1.1em;
    font-weight: 600;
    color: #7ec8e3;
    white-space: nowrap;
    margin-right: 4px;
}

#receiver-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8em;
    white-space: nowrap;
    overflow: hidden;
}
#receiver-callsign {
    font-weight: 700;
    color: #a0d8a0;
}
#receiver-name {
    color: #aaa;
}
#receiver-location {
    color: #777;
}
#receiver-sep {
    color: #444;
}

#status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    flex-shrink: 0;
    transition: background 0.4s;
}
#status-dot.live   { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
#status-dot.error  { background: #f44336; }
#status-dot.wait   { background: #ff9800; }

#status-text {
    font-size: 0.82em;
    color: #888;
    white-space: nowrap;
}

/* band selector pills — always on their own row when the topbar wraps */
#band-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1 1 100%;   /* grow to fill, but also force a new row when topbar wraps */
    min-width: 0;
}

.band-pill {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1a24;
    color: #aaa;
    font-size: 0.78em;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
    white-space: nowrap;
}
.band-pill.active {
    border-color: #7ec8e3;
    background: #1a2a34;
    color: #7ec8e3;
}
.band-pill:hover { border-color: #555; }

#btn-all, #btn-none {
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a24;
    color: #aaa;
    font-size: 0.78em;
    cursor: pointer;
    white-space: nowrap;
}
#btn-all:hover, #btn-none:hover { border-color: #555; color: #ddd; }

/* dB range controls */
#range-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8em;
    color: #888;
    white-space: nowrap;
}
#range-controls input[type=number] {
    width: 56px;
    padding: 2px 5px;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 0.9em;
    text-align: center;
}

/* palette selector */
#palette-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8em;
    color: #888;
    white-space: nowrap;
}
#palette-select {
    padding: 2px 6px;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 0.9em;
    cursor: pointer;
    appearance: auto;
}
#palette-select:focus { outline: none; border-color: #555; }

/* ── Grid of band panels ── */
#grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
    padding: 10px;
}

/* ── Individual band panel ── */
.band-panel {
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.band-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    background: #16161f;
    border-bottom: 1px solid #1e1e2e;
    font-size: 0.82em;
}

.band-name {
    font-weight: 700;
    color: #7ec8e3;
    font-size: 1em;
}

.band-freq-range {
    color: #666;
    font-size: 0.85em;
}

.band-stats {
    display: flex;
    gap: 10px;
    font-size: 0.78em;
    color: #888;
}

.band-stats span { white-space: nowrap; }
.band-stats .val { color: #ccc; font-weight: 600; }

/* spectrum line canvas */
.spectrum-canvas {
    display: block;
    width: 100%;
    height: 80px;
    background: #0a0a0f;
    cursor: crosshair;
}

/* waterfall canvas */
.waterfall-canvas {
    display: block;
    width: 100%;
    height: 120px;
    background: #000;
    image-rendering: pixelated;
}

/* frequency axis */
.freq-axis {
    height: 16px;
    background: #0d0d14;
    position: relative;
    font-size: 0.65em;
    color: #555;
    border-top: 1px solid #1a1a24;
}

.freq-label {
    position: absolute;
    transform: translateX(-50%);
    top: 2px;
    white-space: nowrap;
    color: #ffffff;
}

/* waiting overlay */
.panel-waiting {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    color: #444;
    font-size: 0.85em;
}

/* ── Tooltip ── */
#tooltip {
    position: fixed;
    background: rgba(0,0,0,0.85);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.75em;
    color: #ddd;
    pointer-events: none;
    display: none;
    z-index: 100;
    white-space: nowrap;
}

/* ── No-data message ── */
#no-data {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: #555;
    font-size: 1em;
}
</style>
</head>
<body>

<div id="topbar">
    <h1>📡 Band Activity</h1>
    <div id="receiver-info">
        <span id="receiver-callsign"></span>
        <span id="receiver-sep" style="display:none">·</span>
        <span id="receiver-name"></span>
        <span id="receiver-location"></span>
    </div>
    <div id="status-dot" class="wait"></div>
    <span id="status-text">Connecting…</span>
    <div id="band-pills"></div>
    <button id="btn-all">All</button>
    <button id="btn-none">None</button>
    <div id="range-controls">
        <label>dB min <input type="number" id="db-min" value="-130" step="5"></label>
        <label>max <input type="number" id="db-max" value="-60" step="5"></label>
    </div>
    <div id="palette-controls">
        <label for="palette-select">Palette</label>
        <select id="palette-select">
            <option value="jet">Jet</option>
            <option value="turbo">Turbo</option>
            <option value="viridis">Viridis</option>
            <option value="plasma">Plasma</option>
            <option value="sonar-green">Sonar Green</option>
            <option value="sonar-orange">Sonar Orange</option>
            <option value="night-vision">Night Vision</option>
        </select>
    </div>
</div>

<div id="grid"></div>
<div id="no-data">No bands selected — use the pills above to choose bands.</div>
<div id="tooltip"></div>

<script>
'use strict';

// ── Waterfall colour map ──────────────────────────────────────────────────────
// Colour schemes ported from spectrum-display.js getColorScheme() / interpolateColors()
function _paletteGetColorScheme(name) {
    const schemes = {
        // Full 256-entry Turbo palette (Google AI / SDRPlusPlus)
        turbo: [
            [48,18,59],[50,21,67],[51,24,74],[52,27,81],[53,30,88],[54,33,95],[55,36,102],[56,39,109],
            [57,42,115],[58,45,121],[59,47,128],[60,50,134],[61,53,139],[62,56,145],[63,59,151],[63,62,156],
            [64,64,162],[65,67,167],[65,70,172],[66,73,177],[66,75,181],[67,78,186],[68,81,191],[68,84,195],
            [68,86,199],[69,89,203],[69,92,207],[69,94,211],[70,97,214],[70,100,218],[70,102,221],[70,105,224],
            [70,107,227],[71,110,230],[71,113,233],[71,115,235],[71,118,238],[71,120,240],[71,123,242],[70,125,244],
            [70,128,246],[70,130,248],[70,133,250],[70,135,251],[69,138,252],[69,140,253],[68,143,254],[67,145,254],
            [66,148,255],[65,150,255],[64,153,255],[62,155,254],[61,158,254],[59,160,253],[58,163,252],[56,165,251],
            [55,168,250],[53,171,248],[51,173,247],[49,175,245],[47,178,244],[46,180,242],[44,183,240],[42,185,238],
            [40,188,235],[39,190,233],[37,192,231],[35,195,228],[34,197,226],[32,199,223],[31,201,221],[30,203,218],
            [28,205,216],[27,208,213],[26,210,210],[26,212,208],[25,213,205],[24,215,202],[24,217,200],[24,219,197],
            [24,221,194],[24,222,192],[24,224,189],[25,226,187],[25,227,185],[26,228,182],[28,230,180],[29,231,178],
            [31,233,175],[32,234,172],[34,235,170],[37,236,167],[39,238,164],[42,239,161],[44,240,158],[47,241,155],
            [50,242,152],[53,243,148],[56,244,145],[60,245,142],[63,246,138],[67,247,135],[70,248,132],[74,248,128],
            [78,249,125],[82,250,122],[85,250,118],[89,251,115],[93,252,111],[97,252,108],[101,253,105],[105,253,102],
            [109,254,98],[113,254,95],[117,254,92],[121,254,89],[125,255,86],[128,255,83],[132,255,81],[136,255,78],
            [139,255,75],[143,255,73],[146,255,71],[150,254,68],[153,254,66],[156,254,64],[159,253,63],[161,253,61],
            [164,252,60],[167,252,58],[169,251,57],[172,251,56],[175,250,55],[177,249,54],[180,248,54],[183,247,53],
            [185,246,53],[188,245,52],[190,244,52],[193,243,52],[195,241,52],[198,240,52],[200,239,52],[203,237,52],
            [205,236,52],[208,234,52],[210,233,53],[212,231,53],[215,229,53],[217,228,54],[219,226,54],[221,224,55],
            [223,223,55],[225,221,55],[227,219,56],[229,217,56],[231,215,57],[233,213,57],[235,211,57],[236,209,58],
            [238,207,58],[239,205,58],[241,203,58],[242,201,58],[244,199,58],[245,197,58],[246,195,58],[247,193,58],
            [248,190,57],[249,188,57],[250,186,57],[251,184,56],[251,182,55],[252,179,54],[252,177,54],[253,174,53],
            [253,172,52],[254,169,51],[254,167,50],[254,164,49],[254,161,48],[254,158,47],[254,155,45],[254,153,44],
            [254,150,43],[254,147,42],[254,144,41],[253,141,39],[253,138,38],[252,135,37],[252,132,35],[251,129,34],
            [251,126,33],[250,123,31],[249,120,30],[249,117,29],[248,114,28],[247,111,26],[246,108,25],[245,105,24],
            [244,102,23],[243,99,21],[242,96,20],[241,93,19],[240,91,18],[239,88,17],[237,85,16],[236,83,15],
            [235,80,14],[234,78,13],[232,75,12],[231,73,12],[229,71,11],[228,69,10],[226,67,10],[225,65,9],
            [223,63,8],[221,61,8],[220,59,7],[218,57,7],[216,55,6],[214,53,6],[212,51,5],[210,49,5],
            [208,47,5],[206,45,4],[204,43,4],[202,42,4],[200,40,3],[197,38,3],[195,37,3],[193,35,2],
            [190,33,2],[188,32,2],[185,30,2],[183,29,2],[180,27,1],[178,26,1],[175,24,1],[172,23,1],
            [169,22,1],[167,20,1],[164,19,1],[161,18,1],[158,16,1],[155,15,1],[152,14,1],[149,13,1],
            [146,11,1],[142,10,1],[139,9,2],[136,8,2],[133,7,2],[129,6,2],[126,5,2],[122,4,3]
        ],
        viridis: [
            [68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]
        ],
        plasma: [
            [13,8,135],[126,3,168],[204,71,120],[248,149,64],[240,249,33]
        ],
        jet: [
            [0,0,143],[0,0,255],[0,255,255],[255,255,0],[255,0,0],[128,0,0]
        ],
        'sonar-green': [
            [0,0,0],[0,80,0],[0,180,0],[0,255,0],[160,255,160],[240,255,255]
        ],
        'sonar-orange': [
            [0,0,0],[100,30,0],[210,80,0],[255,150,30],[255,210,120],[255,248,220]
        ],
        'night-vision': [
            [0,0,0],[100,0,0],[210,10,10],[255,60,60],[255,160,160],[255,235,235]
        ]
    };
    return schemes[name] || schemes.jet;
}

function _paletteInterpolate(colors, t) {
    const segments = colors.length - 1;
    const segment  = Math.min(Math.floor(t * segments), segments - 1);
    const localT   = t * segments - segment;
    const c1 = colors[segment];
    const c2 = colors[segment + 1];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * localT);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * localT);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * localT);
    return [r, g, b];
}

function buildCMAP(paletteName) {
    const colors = _paletteGetColorScheme(paletteName);
    const c = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
        const [r, g, b] = _paletteInterpolate(colors, i / 255);
        c[i] = 0xFF000000 | (b << 16) | (g << 8) | r; // ABGR for ImageData
    }
    return c;
}

let CMAP = buildCMAP('jet'); // default palette

// ── Global state ──────────────────────────────────────────────────────────────
let bandMeta    = {};   // name → {start, end, center_frequency, bin_count, bin_bandwidth}
let allBands    = [];   // ordered list of band names
let activeBands = new Set(); // currently selected band names
let panels      = {};   // name → BandPanel instance
let sse         = null; // EventSource
let dbMin       = -130;
let dbMax       = -60;
let currentPalette = 'jet'; // active waterfall palette name

// ── Bandwidth tracking ────────────────────────────────────────────────────────
let _bpsAccum    = 0;       // bytes accumulated in current 1s window
let _bpsLastTime = 0;       // timestamp of last kbps update
let _bpsCurrent  = null;    // last computed kbps string (null = no data yet)

// ── BandPanel — one spectrum+waterfall per band ───────────────────────────────
class BandPanel {
    constructor(name, meta) {
        this.name = name;
        this.meta = meta;
        this.bins = null;          // Uint8Array — current decoded state
        this.waterfallRows = [];   // array of Uint8Array (ring buffer, max 120 rows)
        this.maxRows = 120;
        this.el = null;
        this.specCanvas = null;
        this.specCtx = null;
        this.wfCanvas = null;
        this.wfCtx = null;
        this.wfImageData = null;
        this.animFrame = null;
        this.dirty = false;        // true when new data arrived since last draw
        this._buildDOM();
        this._startRenderLoop();
    }

    _buildDOM() {
        const panel = document.createElement('div');
        panel.className = 'band-panel';
        panel.id = `panel-${this.name}`;

        const startMHz = (this.meta.start / 1e6).toFixed(3);
        const endMHz   = (this.meta.end   / 1e6).toFixed(3);

        panel.innerHTML = `
            <div class="band-header">
                <span class="band-name">${this.name.toUpperCase()}</span>
                <span class="band-freq-range">${startMHz}–${endMHz} MHz</span>
                <div class="band-stats">
                    <span>P5: <span class="val" id="stat-p5-${this.name}">--</span> dB</span>
                    <span>Peak: <span class="val" id="stat-peak-${this.name}">--</span> dB</span>
                </div>
            </div>
            <canvas class="spectrum-canvas" id="spec-${this.name}"></canvas>
            <canvas class="waterfall-canvas" id="wf-${this.name}"></canvas>
            <div class="freq-axis" id="axis-${this.name}"></div>
        `;

        this.el = panel;

        // Append to grid
        document.getElementById('grid').appendChild(panel);

        // Grab canvas refs after DOM insertion
        this.specCanvas = document.getElementById(`spec-${this.name}`);
        this.wfCanvas   = document.getElementById(`wf-${this.name}`);
        this.specCtx    = this.specCanvas.getContext('2d');
        this.wfCtx      = this.wfCanvas.getContext('2d');

        // Size canvases to their CSS pixel size
        this._resize();
        window.addEventListener('resize', () => this._resize());

        // Tooltip on spectrum hover
        this.specCanvas.addEventListener('mousemove', e => this._onSpecHover(e));
        this.specCanvas.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        // Tooltip on waterfall hover (shows frequency + dB at cursor X)
        this.wfCanvas.addEventListener('mousemove', e => this._onWfHover(e));
        this.wfCanvas.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        // Build frequency axis labels
        this._buildAxis();
    }

    _resize() {
        const w = this.specCanvas.offsetWidth;
        if (w === 0) return;
        this.specCanvas.width  = w;
        this.specCanvas.height = this.specCanvas.offsetHeight;
        this.wfCanvas.width    = w;
        this.wfCanvas.height   = this.wfCanvas.offsetHeight;
        this.wfImageData = this.wfCtx.createImageData(w, 1);
        this.dirty = true;
    }

    _buildAxis() {
        const axis = document.getElementById(`axis-${this.name}`);
        const startHz = this.meta.start;
        const endHz   = this.meta.end;
        const spanHz  = endHz - startHz;
        // Show ~5 labels
        const steps = 5;
        for (let i = 0; i <= steps; i++) {
            const frac = i / steps;
            const hz   = startHz + frac * spanHz;
            const mhz  = (hz / 1e6).toFixed(3);
            const lbl  = document.createElement('span');
            lbl.className = 'freq-label';
            lbl.style.left = `${frac * 100}%`;
            lbl.textContent = mhz;
            axis.appendChild(lbl);
        }
    }

    // Called by SSE decoder with new float32 dBFS array
    applyFrame(data, flags) {
        const binCount = this.meta.bin_count;

        if (flags === 0x03) {
            // Full uint8 frame
            if (data.length !== binCount) return;
            if (!this.bins || this.bins.length !== binCount) {
                this.bins = new Uint8Array(binCount);
            }
            this.bins.set(data);
        } else if (flags === 0x04) {
            // Delta uint8 frame
            if (!this.bins) return; // need full frame first
            // data is a Uint8Array of [idx_lo, idx_hi, val] triples
            const count = (data[0] | (data[1] << 8));
            for (let i = 0; i < count; i++) {
                const off = 2 + i * 3;
                const idx = data[off] | (data[off+1] << 8);
                const val = data[off+2];
                if (idx < this.bins.length) this.bins[idx] = val;
            }
        } else {
            return;
        }

        this.dirty = true;
    }

    _startRenderLoop() {
        const loop = () => {
            if (this.dirty) {
                this._draw();
                this.dirty = false;
            }
            this.animFrame = requestAnimationFrame(loop);
        };
        this.animFrame = requestAnimationFrame(loop);
    }

    _draw() {
        if (!this.bins) return;
        const w = this.specCanvas.width;
        const h = this.specCanvas.height;
        if (w === 0 || h === 0) return;

        const bins = this.bins;
        const n    = bins.length;
        const dMin = dbMin;
        const dMax = dbMax;
        const dRange = dMax - dMin;

        // ── Spectrum line graph ───────────────────────────────────────────────
        const sCtx = this.specCtx;
        sCtx.clearRect(0, 0, w, h);

        // Adaptive grid: target ~4 labelled lines regardless of dRange.
        // Pick the smallest "nice" step that gives ≤5 labels.
        const niceSteps = [5, 10, 20, 25, 50, 100];
        let labelStep = niceSteps[niceSteps.length - 1];
        for (const s of niceSteps) {
            if (dRange / s <= 5) { labelStep = s; break; }
        }
        // Minor grid at half the label step (but at least 5 dB)
        const minorStep = Math.max(5, labelStep / 2);

        sCtx.font = '10px monospace';
        sCtx.textAlign = 'left';
        sCtx.textBaseline = 'bottom';

        for (let db = Math.ceil(dMin / minorStep) * minorStep; db <= dMax; db += minorStep) {
            const y = h - ((db - dMin) / dRange) * h;
            const isMajor = (db % labelStep === 0);
            sCtx.strokeStyle = isMajor ? '#222233' : '#161622';
            sCtx.lineWidth = 1;
            sCtx.beginPath();
            sCtx.moveTo(0, y);
            sCtx.lineTo(w, y);
            sCtx.stroke();
            // Label only on major lines, skip very bottom to avoid clipping
            if (isMajor && y < h - 2) {
                const label = `${db}`;
                const tw = sCtx.measureText(label).width;
                sCtx.fillStyle = 'rgba(10,10,15,0.65)';
                sCtx.fillRect(2, y - 13, tw + 4, 12);
                sCtx.fillStyle = '#ffffff';
                sCtx.fillText(label, 4, y - 2);
            }
        }

        // Spectrum fill + line
        sCtx.beginPath();
        let p5sum = 0, peakVal = -999;
        const vals = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            vals[i] = bins[i] - 256; // uint8 → dBFS
        }

        // Compute P5 for stats
        const sorted = Float32Array.from(vals).sort();
        const p5 = sorted[Math.floor(n * 0.05)];
        const peak = sorted[n - 1];

        // Draw
        for (let i = 0; i < n; i++) {
            const x = (i / (n - 1)) * w;
            const db = Math.max(dMin, Math.min(dMax, vals[i]));
            const y  = h - ((db - dMin) / dRange) * h;
            if (i === 0) sCtx.moveTo(x, y);
            else         sCtx.lineTo(x, y);
        }

        // Fill under line
        sCtx.lineTo(w, h);
        sCtx.lineTo(0, h);
        sCtx.closePath();
        const grad = sCtx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0,   'rgba(126,200,227,0.35)');
        grad.addColorStop(1,   'rgba(126,200,227,0.02)');
        sCtx.fillStyle = grad;
        sCtx.fill();

        // Line on top
        sCtx.beginPath();
        for (let i = 0; i < n; i++) {
            const x = (i / (n - 1)) * w;
            const db = Math.max(dMin, Math.min(dMax, vals[i]));
            const y  = h - ((db - dMin) / dRange) * h;
            if (i === 0) sCtx.moveTo(x, y);
            else         sCtx.lineTo(x, y);
        }
        sCtx.strokeStyle = '#7ec8e3';
        sCtx.lineWidth = 1.2;
        sCtx.stroke();

        // Update stats
        document.getElementById(`stat-p5-${this.name}`).textContent  = p5.toFixed(1);
        document.getElementById(`stat-peak-${this.name}`).textContent = peak.toFixed(1);

        // ── Waterfall ─────────────────────────────────────────────────────────
        // Build one new row from current bins, scaled to canvas width
        const wfW = this.wfCanvas.width;
        const wfH = this.wfCanvas.height;
        if (wfW === 0 || wfH === 0) return;

        const rowData = new Uint8Array(wfW);
        for (let px = 0; px < wfW; px++) {
            const binIdx = Math.round((px / (wfW - 1)) * (n - 1));
            const db = vals[Math.min(binIdx, n-1)];
            const norm = Math.max(0, Math.min(1, (db - dMin) / dRange));
            rowData[px] = Math.round(norm * 255);
        }

        // Push row into ring buffer
        this.waterfallRows.push(rowData);
        if (this.waterfallRows.length > this.maxRows) {
            this.waterfallRows.shift();
        }

        // Redraw entire waterfall (scroll effect: newest row at top)
        const wfCtx = this.wfCtx;
        const rows  = this.waterfallRows;
        const nRows = rows.length;
        const rowH  = wfH / this.maxRows; // fractional row height

        // Use putImageData row by row for speed
        const imgData = wfCtx.createImageData(wfW, wfH);
        const buf32   = new Uint32Array(imgData.data.buffer);

        for (let r = 0; r < nRows; r++) {
            // Newest row at top (index nRows-1 → y=0)
            const srcRow = rows[nRows - 1 - r];
            const yStart = Math.round(r * wfH / this.maxRows);
            const yEnd   = Math.round((r + 1) * wfH / this.maxRows);
            for (let y = yStart; y < yEnd && y < wfH; y++) {
                const base = y * wfW;
                for (let x = 0; x < wfW; x++) {
                    buf32[base + x] = CMAP[srcRow[x]];
                }
            }
        }
        wfCtx.putImageData(imgData, 0, 0);
    }

    _onSpecHover(e) {
        if (!this.bins) return;
        const rect = this.specCanvas.getBoundingClientRect();
        const frac = (e.clientX - rect.left) / rect.width;
        const binIdx = Math.round(frac * (this.bins.length - 1));
        if (binIdx < 0 || binIdx >= this.bins.length) return;
        const hz  = this.meta.start + binIdx * this.meta.bin_bandwidth;
        const db  = this.bins[binIdx] - 256;
        const mhz = (hz / 1e6).toFixed(4);
        const tip = document.getElementById('tooltip');
        tip.textContent = `${mhz} MHz  ${db.toFixed(1)} dBFS`;
        tip.style.display = 'block';
        tip.style.left = `${e.clientX + 12}px`;
        tip.style.top  = `${e.clientY - 20}px`;
    }

    _onWfHover(e) {
        if (!this.bins) return;
        const rect = this.wfCanvas.getBoundingClientRect();
        const fracX = (e.clientX - rect.left) / rect.width;
        const fracY = (e.clientY - rect.top)  / rect.height;

        // X → frequency
        const binIdx = Math.round(fracX * (this.bins.length - 1));
        if (binIdx < 0 || binIdx >= this.bins.length) return;
        const hz  = this.meta.start + binIdx * this.meta.bin_bandwidth;
        const mhz = (hz / 1e6).toFixed(4);

        // Y → age: row 0 (top) = newest, row maxRows-1 (bottom) = oldest
        // Each row represents one SSE tick (~1 s).
        const rowIdx = Math.round(fracY * (this.maxRows - 1));
        const ageSec = rowIdx; // approx seconds ago
        const ageStr = ageSec === 0 ? 'now'
                     : ageSec === 1 ? '1 s ago'
                     : `${ageSec} s ago`;

        // dB from the stored waterfall row at that age (if available)
        const rows = this.waterfallRows;
        const nRows = rows.length;
        // waterfallRows[nRows-1] = newest (top), waterfallRows[0] = oldest
        const rowDataIdx = nRows - 1 - rowIdx;
        let dbStr = '--';
        if (rowDataIdx >= 0 && rowDataIdx < nRows) {
            const wfW = this.wfCanvas.width;
            const pxIdx = Math.round(fracX * (wfW - 1));
            const norm = rows[rowDataIdx][Math.min(pxIdx, wfW - 1)] / 255;
            const db = dbMin + norm * (dbMax - dbMin);
            dbStr = db.toFixed(1) + ' dBFS';
        }

        const tip = document.getElementById('tooltip');
        tip.textContent = `${mhz} MHz  ${dbStr}  (${ageStr})`;
        tip.style.display = 'block';
        tip.style.left = `${e.clientX + 12}px`;
        tip.style.top  = `${e.clientY - 20}px`;
    }

    destroy() {
        if (this.animFrame) cancelAnimationFrame(this.animFrame);
        if (this.el && this.el.parentNode) this.el.parentNode.removeChild(this.el);
    }
}

// ── SSE binary8 decoder ───────────────────────────────────────────────────────
function decodeSSEEvent(b64data) {
    // base64 → Uint8Array
    const bin = atob(b64data);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

    if (buf.length < 22) return null;
    const magic = String.fromCharCode(buf[0], buf[1], buf[2], buf[3]);
    if (magic !== 'SPEC') return null;

    const flags = buf[5];
    // payload starts at offset 22
    const payload = buf.subarray(22);
    return { flags, payload };
}

// ── SSE connection management ─────────────────────────────────────────────────
function buildSSEUrl() {
    const params = [...activeBands].map(b => `band=${encodeURIComponent(b)}`).join('&');
    return `/api/noisefloor/spectrum/stream${params ? '?' + params : ''}`;
}

function connectSSE() {
    if (sse) { sse.close(); sse = null; }
    // Reset bandwidth counters on each (re)connect so stale figures don't persist.
    _bpsAccum = 0; _bpsLastTime = 0; _bpsCurrent = null;
    if (activeBands.size === 0) {
        setStatus('wait', 'No bands selected');
        return;
    }

    setStatus('wait', 'Connecting…');
    sse = new EventSource(buildSSEUrl());

    sse.addEventListener('spectrum', e => {
        const band = e.lastEventId;
        const panel = panels[band];
        if (!panel) return;

        const decoded = decodeSSEEvent(e.data);
        if (!decoded) return;

        panel.applyFrame(decoded.payload, decoded.flags);

        // Accumulate bytes (base64 data length ≈ wire bytes before gzip)
        _bpsAccum += e.data.length;
        const now = performance.now();
        if (_bpsLastTime === 0) _bpsLastTime = now;
        const elapsed = now - _bpsLastTime;
        if (elapsed >= 1000) {
            const kbps = (_bpsAccum * 8 / elapsed).toFixed(1); // bits/ms = kbps
            _bpsCurrent = `${kbps} kbps`;
            _bpsAccum = 0;
            _bpsLastTime = now;
        }

        const kbpsStr = _bpsCurrent ? ` · ${_bpsCurrent}` : '';
        setStatus('live', `Live · ${new Date().toLocaleTimeString()}${kbpsStr}`);
    });

    sse.addEventListener('heartbeat', e => {
        setStatus('live', `Heartbeat · ${new Date().toLocaleTimeString()}`);
    });

    sse.onerror = () => {
        setStatus('error', 'Connection lost — retrying…');
    };
}

// ── Band selection ────────────────────────────────────────────────────────────
function rebuildPanels() {
    // Remove panels for deselected bands
    for (const name of Object.keys(panels)) {
        if (!activeBands.has(name)) {
            panels[name].destroy();
            delete panels[name];
        }
    }

    // Add panels for newly selected bands
    for (const name of allBands) {
        if (activeBands.has(name) && !panels[name]) {
            panels[name] = new BandPanel(name, bandMeta[name]);
        }
    }

    // Re-order DOM nodes in the grid to match allBands frequency order.
    // appendChild moves an existing node to the end, so iterating allBands
    // in order produces the correct final sequence regardless of prior order.
    const grid = document.getElementById('grid');
    for (const name of allBands) {
        if (panels[name] && panels[name].el) {
            grid.appendChild(panels[name].el);
        }
    }

    // Show/hide no-data message
    document.getElementById('no-data').style.display =
        activeBands.size === 0 ? 'block' : 'none';

    // Reconnect SSE with new band list
    connectSSE();
}

function toggleBand(name) {
    if (activeBands.has(name)) activeBands.delete(name);
    else                        activeBands.add(name);
    updatePills();
    rebuildPanels();
    savePrefs();
}

function updatePills() {
    document.querySelectorAll('.band-pill').forEach(pill => {
        const name = pill.dataset.band;
        pill.classList.toggle('active', activeBands.has(name));
    });
}

// ── Preferences (localStorage) ────────────────────────────────────────────────
function savePrefs() {
    try {
        localStorage.setItem('bandActivity_active', JSON.stringify([...activeBands]));
        localStorage.setItem('bandActivity_dbMin', dbMin);
        localStorage.setItem('bandActivity_dbMax', dbMax);
        localStorage.setItem('bandActivity_palette', currentPalette);
    } catch(e) {}
}

function loadPrefs() {
    try {
        const saved = localStorage.getItem('bandActivity_active');
        if (saved) {
            const arr = JSON.parse(saved);
            activeBands = new Set(arr.filter(n => bandMeta[n]));
        }
        const sMin = localStorage.getItem('bandActivity_dbMin');
        const sMax = localStorage.getItem('bandActivity_dbMax');
        if (sMin) { dbMin = parseFloat(sMin); document.getElementById('db-min').value = dbMin; }
        if (sMax) { dbMax = parseFloat(sMax); document.getElementById('db-max').value = dbMax; }

        const sPalette = localStorage.getItem('bandActivity_palette');
        if (sPalette) {
            currentPalette = sPalette;
            CMAP = buildCMAP(currentPalette);
            const sel = document.getElementById('palette-select');
            if (sel) sel.value = currentPalette;
        }
    } catch(e) {}
}

// ── Status indicator ──────────────────────────────────────────────────────────
function setStatus(state, text) {
    const dot  = document.getElementById('status-dot');
    const span = document.getElementById('status-text');
    dot.className = state;
    span.textContent = text;
}

// ── Initialisation ────────────────────────────────────────────────────────────
async function init() {
    setStatus('wait', 'Loading band config…');

    // Fetch receiver description (callsign / name / location) — best-effort, non-fatal
    try {
        const descResp = await fetch('/api/description');
        if (descResp.ok) {
            const desc = await descResp.json();
            const rx = desc.receiver || {};
            const callsign = (rx.callsign || '').trim();
            const name     = (rx.name     || '').trim();
            const location = (rx.location || '').trim();

            if (callsign) {
                document.getElementById('receiver-callsign').textContent = callsign;
            }
            if (name) {
                document.getElementById('receiver-name').textContent = name;
            }
            if (location) {
                document.getElementById('receiver-location').textContent = location ? `· ${location}` : '';
            }
            // Show separator only when there's something to separate
            if (callsign && (name || location)) {
                document.getElementById('receiver-sep').style.display = '';
            }
        }
    } catch(_) { /* non-fatal — receiver info is cosmetic */ }

    let cfg;
    try {
        const resp = await fetch('/api/noisefloor/config');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        cfg = await resp.json();
    } catch(err) {
        setStatus('error', `Failed to load config: ${err.message}`);
        return;
    }

    if (!cfg.bands || cfg.bands.length === 0) {
        setStatus('error', 'No bands configured on server');
        return;
    }

    // Build metadata map and ordered list, sorted by start frequency (lowest first)
    allBands = [];
    for (const b of cfg.bands) {
        bandMeta[b.name] = b;
        allBands.push(b.name);
    }
    allBands.sort((a, b) => bandMeta[a].start - bandMeta[b].start);

    // Load saved preferences (which bands were active, dB range)
    loadPrefs();

    // Default: all bands active if no saved prefs
    if (activeBands.size === 0) {
        for (const name of allBands) activeBands.add(name);
    }

    // Build band pills
    const pillsEl = document.getElementById('band-pills');
    for (const name of allBands) {
        const pill = document.createElement('button');
        pill.className = 'band-pill' + (activeBands.has(name) ? ' active' : '');
        pill.dataset.band = name;
        const meta = bandMeta[name];
        const bwKHz = Math.round(meta.bin_bandwidth * meta.bin_count / 1000);
        pill.textContent = name.toUpperCase();
        pill.title = `${(meta.start/1e6).toFixed(3)}–${(meta.end/1e6).toFixed(3)} MHz · ${meta.bin_count} bins · ${meta.bin_bandwidth} Hz/bin`;
        pill.addEventListener('click', () => toggleBand(name));
        pillsEl.appendChild(pill);
    }

    // All / None buttons
    document.getElementById('btn-all').addEventListener('click', () => {
        activeBands = new Set(allBands);
        updatePills();
        rebuildPanels();
        savePrefs();
    });
    document.getElementById('btn-none').addEventListener('click', () => {
        activeBands = new Set();
        updatePills();
        rebuildPanels();
        savePrefs();
    });

    // dB range controls
    document.getElementById('db-min').addEventListener('change', e => {
        dbMin = parseFloat(e.target.value) || -130;
        savePrefs();
        // Mark all panels dirty so they redraw with new range
        for (const p of Object.values(panels)) p.dirty = true;
    });
    document.getElementById('db-max').addEventListener('change', e => {
        dbMax = parseFloat(e.target.value) || -60;
        savePrefs();
        for (const p of Object.values(panels)) p.dirty = true;
    });

    // Palette selector
    document.getElementById('palette-select').addEventListener('change', e => {
        currentPalette = e.target.value;
        CMAP = buildCMAP(currentPalette);
        savePrefs();
        // Redraw all panels with the new colour map
        for (const p of Object.values(panels)) p.dirty = true;
    });

    // Build initial panels and connect SSE
    rebuildPanels();
}

init();
</script>

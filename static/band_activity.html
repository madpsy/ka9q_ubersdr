<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Activity Monitor</title>
<script src="opus-decoder.min.js"></script>
<script src="minimal-radio.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

/* ── Top bar ── */
#topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #111118;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

#topbar h1 {
    font-size: 1.1em;
    font-weight: 600;
    color: #7ec8e3;
    white-space: nowrap;
    margin-right: 4px;
}

#receiver-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8em;
    white-space: nowrap;
    overflow: hidden;
}
#receiver-callsign {
    font-weight: 700;
    color: #a0d8a0;
    font-size: 0.85em;   /* slightly smaller than the h1 title */
}
#receiver-name {
    color: #aaa;
}
#receiver-location {
    color: #777;
}

#status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    flex-shrink: 0;
    transition: background 0.4s;
}
#status-dot.live   { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
#status-dot.error  { background: #f44336; }
#status-dot.wait   { background: #ff9800; }

#status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;          /* fill remaining space on the first topbar row */
    min-width: 0;
}

#status-text {
    font-size: 0.82em;
    color: #888;
    white-space: nowrap;
}

#utc-clock {
    margin-left: auto;   /* push to far right of the status row */
    font-size: 1.05em;
    font-weight: 700;
    line-height: 1;      /* keep layout height the same as surrounding text */
    color: #7ec8e3;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    letter-spacing: 0.03em;
}

#local-clock {
    font-size: 1.05em;
    font-weight: 700;
    line-height: 1;
    color: #a0d8a0;      /* same greenish as receiver callsign */
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    letter-spacing: 0.03em;
}

/* band selector pills — always on their own row when the topbar wraps */
#band-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1 1 100%;   /* grow to fill, but also force a new row when topbar wraps */
    min-width: 0;
}

.band-pill {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1a24;
    color: #aaa;
    font-size: 0.78em;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
    white-space: nowrap;
}
.band-pill.active {
    border-color: #7ec8e3;
    background: #1a2a34;
    color: #7ec8e3;
}
.band-pill:hover { border-color: #555; }

#btn-all, #btn-none {
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a24;
    color: #aaa;
    font-size: 0.78em;
    cursor: pointer;
    white-space: nowrap;
}
#btn-all:hover, #btn-none:hover { border-color: #555; color: #ddd; }

/* dB range controls */
#range-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8em;
    color: #888;
    white-space: nowrap;
}
#range-controls input[type=number] {
    width: 56px;
    padding: 2px 5px;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 0.9em;
    text-align: center;
}

/* palette selector */
#palette-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8em;
    color: #888;
    white-space: nowrap;
}
#palette-select {
    padding: 2px 6px;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 0.9em;
    cursor: pointer;
    appearance: auto;
}
#palette-select:focus { outline: none; border-color: #555; }

@keyframes audio-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,115,115,0); }
    50%       { box-shadow: 0 0 6px 2px rgba(229,115,115,0.35); }
}

/* stop button on band header (shown while audio is playing) */
.band-stop-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 7px;
    border-radius: 10px;
    border: 1px solid #e57373;
    background: #2a1a1a;
    color: #e57373;
    font-size: 0.72em;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    margin-right: 6px;
    animation: audio-pulse 1.2s ease-in-out infinite;
    line-height: 1.4;
}
.band-stop-btn:hover { background: #3a1a1a; border-color: #ef9a9a; color: #ef9a9a; }

/* ── Grid of band panels ── */
#grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
    padding: 10px;
}

/* ── Individual band panel ── */
.band-panel {
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.band-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    background: #16161f;
    border-bottom: 1px solid #1e1e2e;
    font-size: 0.82em;
}

.band-name {
    font-weight: 700;
    color: #7ec8e3;
    font-size: 1em;
}

.band-freq-range {
    color: #666;
    font-size: 0.85em;
}

.band-stats {
    display: flex;
    gap: 10px;
    font-size: 0.78em;
    color: #888;
}

.band-stats span { white-space: nowrap; }
.band-stats .val {
    color: #ccc;
    font-weight: 600;
    display: inline-block;
    min-width: 4.5ch;        /* wide enough for "-102.5" */
    text-align: right;
    font-variant-numeric: tabular-nums;
}

/* spectrum line canvas */
.spectrum-canvas {
    display: block;
    width: 100%;
    height: 80px;
    background: #0a0a0f;
    cursor: crosshair;
}

/* waterfall canvas */
.waterfall-canvas {
    display: block;
    width: 100%;
    height: 120px;
    background: #000;
    image-rendering: pixelated;
}

/* zoom overlay canvas — sits on top of spec+wf, pointer-events only when dragging */
.zoom-overlay {
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

/* wrapper that holds spec+wf+overlay stacked */
.canvas-stack {
    position: relative;
    display: flex;
    flex-direction: column;
}

/* frequency axis */
.freq-axis {
    height: 18px;
    background: #0d0d14;
    position: relative;
    font-size: 0.65em;
    color: #555;
    border-top: 1px solid #1a1a24;
    overflow: visible;
}

.freq-label {
    position: absolute;
    transform: translateX(-50%);
    top: 4px;
    white-space: nowrap;
    color: #888;
    font-size: 0.9em;
}
/* tick mark above each label */
.freq-label::before {
    content: '';
    position: absolute;
    left: 50%;
    top: -4px;
    transform: translateX(-50%);
    width: 1px;
    height: 3px;
    background: #444;
}
/* first label: left-align so it doesn't clip */
.freq-label.first {
    transform: none;
}
.freq-label.first::before { left: 0; transform: none; }
/* last label: right-align so it doesn't clip */
.freq-label.last {
    transform: translateX(-100%);
}
.freq-label.last::before { left: 100%; transform: translateX(-100%); }

/* zoom indicator badge shown in top-right of spectrum when zoomed */
.zoom-badge {
    position: absolute;
    top: 4px;
    right: 6px;
    background: rgba(126,200,227,0.18);
    border: 1px solid rgba(126,200,227,0.4);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.68em;
    color: #7ec8e3;
    pointer-events: none;
    z-index: 11;
    display: none;
}

/* waiting overlay */
.panel-waiting {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    color: #444;
    font-size: 0.85em;
}

/* ── Tooltip ── */
#tooltip {
    position: fixed;
    background: rgba(0,0,0,0.85);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.75em;
    color: #ddd;
    pointer-events: none;
    display: none;
    z-index: 100;
    white-space: nowrap;
}

/* ── No-data message ── */
#no-data {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: #555;
    font-size: 1em;
}

/* ── Band Conditions bar — fixed to bottom of viewport ── */
#conditions-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: #111118;
    border-top: 1px solid #1e1e2e;
    overflow: hidden;
}


#conditions-bar .cond-body {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: flex-start;
}

/* ── Right panel: weather + space weather always side-by-side ── */
#conditions-bar .cond-right {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;   /* never stack on mobile */
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    align-items: flex-start;
}

/* ── Left column: band pills with CW spots filling the space below ── */
#conditions-bar .cond-left {
    flex: 1 1 auto;
    min-width: 0;
    align-self: stretch;   /* match the right panel's height so spots can fill the gap */
    display: flex;
    flex-direction: column;
}

/* ── Band SNR section ── */
#conditions-bar .cond-bands {
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: flex-start;
    min-width: 0;
}

.cond-band-pill {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 9px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-size: 0.72em;
    font-weight: 600;
    line-height: 1.3;
    white-space: nowrap;
    cursor: default;
    transition: opacity 0.2s;
}
.cond-band-pill .cpill-name { font-size: 1em; letter-spacing: 0.03em; }
.cond-band-pill .cpill-snr  { font-size: 0.82em; font-weight: 400; opacity: 0.8; font-variant-numeric: tabular-nums; }

/* status colours */
.cond-band-pill.excellent { background: rgba(76,175,80,0.18);  border-color: rgba(76,175,80,0.5);  color: #81c784; }
.cond-band-pill.good      { background: rgba(139,195,74,0.18); border-color: rgba(139,195,74,0.5); color: #aed581; }
.cond-band-pill.fair      { background: rgba(255,152,0,0.18);  border-color: rgba(255,152,0,0.5);  color: #ffb74d; }
.cond-band-pill.poor      { background: rgba(244,67,54,0.15);  border-color: rgba(244,67,54,0.4);  color: #e57373; }
.cond-band-pill.unknown   { background: rgba(80,80,80,0.18);   border-color: rgba(80,80,80,0.4);   color: #777; }

/* ── Space weather section ── */
#conditions-bar .cond-sw {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 10px;
    border-left: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: flex-start;
}

.cond-sw-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78em;
}

.cond-sw-label {
    color: #666;
    min-width: 60px;
    flex-shrink: 1;
}

.cond-sw-value {
    color: #ccc;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

.cond-sw-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 0.04em;
}
.cond-sw-badge.excellent { background: rgba(76,175,80,0.22);  color: #81c784; border: 1px solid rgba(76,175,80,0.4); }
.cond-sw-badge.good      { background: rgba(139,195,74,0.22); color: #aed581; border: 1px solid rgba(139,195,74,0.4); }
.cond-sw-badge.fair      { background: rgba(255,152,0,0.22);  color: #ffb74d; border: 1px solid rgba(255,152,0,0.4); }
.cond-sw-badge.poor      { background: rgba(244,67,54,0.18);  color: #e57373; border: 1px solid rgba(244,67,54,0.4); }
.cond-sw-badge.unknown   { background: rgba(80,80,80,0.18);   color: #777;    border: 1px solid rgba(80,80,80,0.4); }

/* ── CW spots grid ── */
@media (max-width: 767px) {
    #cond-cw-spots { display: none !important; }
}

#conditions-bar .cond-cw-spots {
    /* Badges must not contribute to the left column's intrinsic width,
       or adding badges pushes .cond-right onto a new row. */
    contain: inline-size;
    /* Fill only the leftover height under the pills — never grow the bar. */
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    border-top: 1px solid #1e1e2e;
    padding: 4px 12px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: flex-start;
    align-content: flex-start;
}

.cond-cw-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.70em;
    white-space: nowrap;
    width: 130px;
    border: 1px solid rgba(80,80,80,0.3);
    background: rgba(40,40,50,0.5);
    color: #888;
    overflow: hidden;
    text-overflow: ellipsis;
}
.cond-cw-badge.new-country {
    border-color: rgba(255,152,0,0.55);
    background: rgba(255,152,0,0.09);
    color: #ffb74d;
}
.cond-cw-badge .ccw-flag  { font-size: 1.1em; line-height: 1; flex-shrink: 0; }
.cond-cw-badge .ccw-call  { font-weight: 700; letter-spacing: 0.02em; overflow: hidden; text-overflow: ellipsis; }
.cond-cw-badge .ccw-band  { color: #7ec8e3; font-size: 0.88em; flex-shrink: 0; }
.cond-cw-badge .ccw-star  { color: #ffb74d; flex-shrink: 0; }

/* ── Voice activity ticker ── */
#conditions-bar .cond-ticker {
    flex: 1 1 100%;
    border-top: 1px solid #1e1e2e;
    overflow: hidden;
    height: 26px;
    position: relative;
    /* visibility toggled via JS: style.display = 'block' / 'none' */
}

@keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(var(--ticker-shift)); }
}

#conditions-bar .cond-ticker-track {
    display: inline-flex;
    align-items: center;
    gap: 0;
    white-space: nowrap;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    will-change: transform;
    /* animation applied entirely via JS once width is known */
}

.cond-ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0 18px;
    font-size: 0.76em;
    color: #aaa;
    border-right: 1px solid #1e1e2e;
    height: 100%;
}

.cond-ticker-item--new {
    background: rgba(255,152,0,0.10);
    border-left: 2px solid rgba(255,152,0,0.55);
    padding-left: 10px; /* compensate for the 2px border so total stays ~18px */
}

.cond-ticker-item--new .cond-ticker-call {
    color: #ffb74d;
}

.cond-ticker-item--new .cond-ticker-new-star {
    color: #ffb74d;
    font-size: 0.85em;
    flex-shrink: 0;
}

.cond-ticker-band {
    font-weight: 700;
    color: #7ec8e3;
    font-size: 0.9em;
    letter-spacing: 0.04em;
}

.cond-ticker-freq {
    color: #888;
    font-variant-numeric: tabular-nums;
}

.cond-ticker-call {
    color: #a0d8a0;
    font-weight: 600;
}

.cond-ticker-flag {
    font-size: 1.1em;
    line-height: 1;
}

.cond-ticker-snr {
    color: #666;
    font-size: 0.88em;
}

/* ── Hardware status section (rotator / ant-switch) ── */
#conditions-bar .cond-hardware {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 10px;
    border-left: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: flex-start;
}

.cond-hw-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78em;
}

.cond-hw-label {
    color: #666;
    min-width: 52px;
    flex-shrink: 1;
}

.cond-hw-value {
    color: #ccc;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.cond-hw-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 0.03em;
    white-space: nowrap;
}
.cond-hw-badge.moving  { background: rgba(255,152,0,0.22);  color: #ffb74d; border: 1px solid rgba(255,152,0,0.4); }
.cond-hw-badge.stopped { background: rgba(80,80,80,0.18);   color: #999;    border: 1px solid rgba(80,80,80,0.4); }
.cond-hw-badge.grounded{ background: rgba(244,67,54,0.18);  color: #e57373; border: 1px solid rgba(244,67,54,0.4); }
.cond-hw-badge.active  { background: rgba(76,175,80,0.18);  color: #81c784; border: 1px solid rgba(76,175,80,0.4); }

.cond-hw-flags {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    font-size: 1em;
    line-height: 1;
}

/* ── Local weather section ── */
#conditions-bar .cond-weather {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 10px;
    border-left: 1px solid #1e1e2e;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    overflow: hidden;
}

.cond-wx-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    object-fit: contain;
}

.cond-wx-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
}

.cond-wx-desc {
    font-size: 0.8em;
    font-weight: 600;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.cond-wx-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.cond-wx-chip {
    font-size: 0.72em;
    color: #999;
    white-space: nowrap;   /* keep each chip on one line but chips wrap between each other */
}
.cond-wx-chip strong {
    color: #ccc;
    font-weight: 600;
}
</style>
</head>
<body>

<div id="topbar">
    <h1>📡 Band Activity <span id="receiver-callsign"></span></h1>
    <div id="receiver-info">
        <span id="receiver-name"></span>
        <span id="receiver-location"></span>
    </div>
    <div id="status-row">
        <div id="status-dot" class="wait"></div>
        <span id="status-text">Connecting…</span>
        <span id="utc-clock"></span>
        <span id="local-clock" style="display:none"></span>
    </div>
    <div id="band-pills"></div>
    <button id="btn-all">All</button>
    <button id="btn-none">None</button>
    <div id="range-controls">
        <label>dB min <input type="number" id="db-min" value="-130" step="5"></label>
        <label>max <input type="number" id="db-max" value="-60" step="5"></label>
    </div>
    <div id="palette-controls">
        <label for="palette-select">Palette</label>
        <select id="palette-select">
            <option value="jet">Jet</option>
            <option value="turbo">Turbo</option>
            <option value="viridis">Viridis</option>
            <option value="plasma">Plasma</option>
            <option value="sonar-green">Sonar Green</option>
            <option value="sonar-orange">Sonar Orange</option>
            <option value="night-vision">Night Vision</option>
        </select>
    </div>
</div>

<div id="grid"></div>
<div id="no-data">No bands selected — use the pills above to choose bands.</div>
<div id="tooltip"></div>

<div id="conditions-bar" style="display:none">
    <div class="cond-body">
        <div class="cond-left">
            <div class="cond-bands" id="cond-bands">
                <!-- band pills injected by JS -->
            </div>
            <div class="cond-cw-spots" id="cond-cw-spots" style="display:none">
                <!-- CW spot badges injected by JS -->
            </div>
        </div>
        <div class="cond-right">
            <div class="cond-hardware" id="cond-hardware" style="display:none">
                <!-- rotator / ant-switch status injected by JS -->
            </div>
            <div class="cond-weather" id="cond-weather" style="display:none">
                <!-- local weather injected by JS -->
            </div>
            <div class="cond-sw" id="cond-sw" style="display:none">
                <!-- space weather rows injected by JS -->
            </div>
        </div>
    </div>
    <div class="cond-ticker" id="cond-ticker" style="display:none">
        <div class="cond-ticker-track" id="cond-ticker-track"></div>
    </div>
</div>

<script>
'use strict';

function _paletteInterpolate(colors, t) {
    const segments = colors.length - 1;
    const segment  = Math.min(Math.floor(t * segments), segments - 1);
    const localT   = t * segments - segment;
    const c1 = colors[segment];
    const c2 = colors[segment + 1];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * localT);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * localT);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * localT);
    return [r, g, b];
}

function buildCMAP(paletteName) {
    const colors = _paletteGetColorScheme(paletteName);
    const c = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
        const [r, g, b] = _paletteInterpolate(colors, i / 255);
        c[i] = 0xFF000000 | (b << 16) | (g << 8) | r; // ABGR for ImageData
    }
    return c;
}

let CMAP = buildCMAP('jet'); // default palette

// ── Global state ──────────────────────────────────────────────────────────────
let bandMeta    = {};   // name → {start, end, center_frequency, bin_count, bin_bandwidth}
let allBands    = [];   // ordered list of band names
let activeBands = new Set(); // currently selected band names
let panels      = {};   // name → BandPanel instance
let sse         = null; // EventSource
let dbMin       = -130;
let dbMax       = -60;
let currentPalette = 'jet'; // active waterfall palette name
let _localTzOffsetMin = null; // receiver timezone offset in minutes (from /api/description)

// ── Bandwidth tracking ────────────────────────────────────────────────────────
let _bpsAccum    = 0;       // bytes accumulated in current 1s window
let _bpsLastTime = 0;       // timestamp of last kbps update
let _bpsCurrent  = null;    // last computed kbps string (null = no data yet)

// ── Audio (MinimalRadio) ──────────────────────────────────────────────────────
let radio        = null;    // MinimalRadio instance (lazy-created on first use)
let audioFreqHz  = null;    // currently tuned frequency (Hz), null = stopped
let audioBandName = null;   // band name of currently playing audio

// Position the shared tooltip, flipping left of cursor when near the right viewport edge.
function _positionTooltip(text, cx, cy) {
    const tip = document.getElementById('tooltip');
    tip.textContent = text;
    tip.style.left  = '-9999px';   // off-screen so we can measure width
    tip.style.top   = '-9999px';
    tip.style.display = 'block';
    const tw = tip.offsetWidth;
    const margin = 12;
    let x = cx + margin;
    if (x + tw > window.innerWidth - 4) {
        x = cx - margin - tw;   // flip to left of cursor
    }
    tip.style.left = `${x}px`;
    tip.style.top  = `${cy - 20}px`;
}

function _getRadio() {
    if (!radio && window.MinimalRadio) {
        radio = new MinimalRadio();
    }
    return radio;
}

// Start audio at a specific frequency (Hz). Switches frequency if already playing.
async function startAudioAt(freqHz, bandName) {
    const r = _getRadio();
    if (!r) { console.warn('MinimalRadio not available'); return; }

    // Remove playing indicator from previous band and force its redraw
    if (audioBandName && audioBandName !== bandName) {
        _setBandPlayingIndicator(audioBandName, false);
        if (panels[audioBandName]) panels[audioBandName].dirty = true;
    }

    audioFreqHz   = freqHz;
    audioBandName = bandName;

    if (r.isPlaying) {
        // Already playing — just retune
        r.changeFrequency(freqHz);
        _setBandPlayingIndicator(bandName, true);
    } else {
        try {
            await r.startPreview(freqHz);
            _setBandPlayingIndicator(bandName, true);
        } catch (err) {
            console.error('Audio start failed:', err);
            audioFreqHz = null; audioBandName = null;
            return;
        }
    }
    // Force immediate redraw so cursor appears right away
    if (panels[bandName]) panels[bandName].dirty = true;
}

async function stopAudio() {
    const r = _getRadio();
    const prevBand = audioBandName;
    if (r) await r.stopPreview();
    if (prevBand) _setBandPlayingIndicator(prevBand, false);
    audioFreqHz = null; audioBandName = null;
    // Force redraw to remove cursor
    if (prevBand && panels[prevBand]) panels[prevBand].dirty = true;
}

function _setBandPlayingIndicator(bandName, playing) {
    if (!bandName) return;
    const panel = panels[bandName];
    if (!panel) return;
    const header = panel.el.querySelector('.band-header');
    if (!header) return;
    let btn = header.querySelector('.band-stop-btn');
    if (playing) {
        if (!btn) {
            btn = document.createElement('button');
            btn.className = 'band-stop-btn';
            btn.title = 'Stop audio';
            btn.textContent = '■ Stop';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                stopAudio();
            });
            header.insertBefore(btn, header.firstChild);
        }
    } else {
        if (btn) btn.remove();
    }
}

// ── BandPanel — one spectrum+waterfall per band ───────────────────────────────
class BandPanel {
    constructor(name, meta) {
        this.name = name;
        this.meta = meta;
        this.bins = null;          // Uint8Array — current decoded state
        this.waterfallRows  = [];  // array of Float32Array (full n bins, normalised 0-1)
        this.waterfallTimes = [];  // array of Date.now() timestamps, parallel to waterfallRows
        this.maxRows = 120;
        this.el = null;
        this.specCanvas = null;
        this.specCtx = null;
        this.wfCanvas = null;
        this.wfCtx = null;
        this.overlayCanvas = null;
        this.overlayCtx = null;
        this.wfImageData = null;
        this.animFrame = null;
        this.dirty = false;        // true when new data arrived since last draw

        // ── Zoom state ──────────────────────────────────────────────────────
        this.zoomStart = 0;        // fraction [0,1] of full bin array
        this.zoomEnd   = 1;

        // ── Drag-to-select / pan state ───────────────────────────────────────
        this._dragStart = null;    // canvas-fraction where drag began
        this._dragLast  = null;    // canvas-fraction at previous mousemove (for pan delta)
        this._dragging  = false;

        // ── Pinch-to-zoom state ──────────────────────────────────────────────
        this._pinchDist0  = null;  // initial finger distance
        this._pinchZoom0  = null;  // {start, end} at pinch start
        this._pinchCenter = null;  // fraction of pinch midpoint

        // ── Double-tap / single-finger pan detection ─────────────────────────
        this._lastTap       = 0;
        this._touchPanLast  = null;  // canvas-fraction of previous touch X (for pan)
        this._touchTapStart = null;  // {x, y, frac} at touchstart — for tap-vs-pan

        // ── Click-vs-drag disambiguation ─────────────────────────────────────
        this._lastClickWasDrag = false;  // set true in onMouseUp after a drag commit

        this._buildDOM();
        this._startRenderLoop();
    }

    _buildDOM() {
        const panel = document.createElement('div');
        panel.className = 'band-panel';
        panel.id = `panel-${this.name}`;

        const startMHz = (this.meta.start / 1e6).toFixed(3);
        const endMHz   = (this.meta.end   / 1e6).toFixed(3);

        panel.innerHTML = `
            <div class="band-header">
                <span class="band-name">${this.name.toUpperCase()}</span>
                <span class="band-freq-range">${startMHz}–${endMHz} MHz</span>
                <div class="band-stats">
                    <span>P5: <span class="val" id="stat-p5-${this.name}">--</span> dB</span>
                    <span>Peak: <span class="val" id="stat-peak-${this.name}">--</span> dB</span>
                </div>
            </div>
            <div class="canvas-stack" id="stack-${this.name}">
                <canvas class="spectrum-canvas" id="spec-${this.name}"></canvas>
                <canvas class="waterfall-canvas" id="wf-${this.name}"></canvas>
                <canvas class="zoom-overlay" id="overlay-${this.name}"></canvas>
                <div class="zoom-badge" id="zoom-badge-${this.name}"></div>
            </div>
            <div class="freq-axis" id="axis-${this.name}"></div>
        `;

        this.el = panel;

        // Append to grid
        document.getElementById('grid').appendChild(panel);

        // Grab canvas refs after DOM insertion
        this.specCanvas    = document.getElementById(`spec-${this.name}`);
        this.wfCanvas      = document.getElementById(`wf-${this.name}`);
        this.overlayCanvas = document.getElementById(`overlay-${this.name}`);
        this.specCtx       = this.specCanvas.getContext('2d');
        this.wfCtx         = this.wfCanvas.getContext('2d');
        this.overlayCtx    = this.overlayCanvas.getContext('2d');

        // Size canvases to their CSS pixel size
        this._resize();
        window.addEventListener('resize', () => this._resize());

        // Tooltip on spectrum hover
        this.specCanvas.addEventListener('mousemove', e => this._onSpecHover(e));
        this.specCanvas.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        // Tooltip on waterfall hover (shows frequency + dB at cursor X)
        this.wfCanvas.addEventListener('mousemove', e => this._onWfHover(e));
        this.wfCanvas.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        // ── Hover crosshair line on overlay ──────────────────────────────────
        const stackEl = document.getElementById(`stack-${this.name}`);
        stackEl.addEventListener('mousemove', (e) => {
            if (this._dragging) return; // don't draw during drag
            const rect = stackEl.getBoundingClientRect();
            const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            this._drawHoverLine(frac);
        });
        stackEl.addEventListener('mouseleave', () => {
            this._clearHoverLine();
        });

        // ── Zoom interaction handlers ────────────────────────────────────────
        this._setupZoomHandlers();

        // Build frequency axis labels
        this._updateAxis();
    }

    _resize() {
        const w = this.specCanvas.offsetWidth;
        if (w === 0) return;
        this.specCanvas.width  = w;
        this.specCanvas.height = this.specCanvas.offsetHeight;
        this.wfCanvas.width    = w;
        this.wfCanvas.height   = this.wfCanvas.offsetHeight;
        // Overlay spans the full stack height (spec + wf)
        const stackH = this.specCanvas.offsetHeight + this.wfCanvas.offsetHeight;
        this.overlayCanvas.width  = w;
        this.overlayCanvas.height = stackH;
        this.overlayCanvas.style.height = stackH + 'px';
        this.wfImageData = this.wfCtx.createImageData(w, 1);
        this.dirty = true;
    }

    // Dynamic frequency axis — rebuilt whenever zoom changes
    _updateAxis() {
        const axis = document.getElementById(`axis-${this.name}`);
        axis.innerHTML = '';
        const startHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
        const endHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
        const spanHz  = endHz - startHz;
        const steps   = 5;
        for (let i = 0; i <= steps; i++) {
            const frac = i / steps;
            const hz   = startHz + frac * spanHz;
            const mhz  = (hz / 1e6).toFixed(3);
            const lbl  = document.createElement('span');
            let cls = 'freq-label';
            if (i === 0)     cls += ' first';
            if (i === steps) cls += ' last';
            lbl.className = cls;
            lbl.style.left = `${frac * 100}%`;
            lbl.textContent = mhz;
            axis.appendChild(lbl);
        }
        // Update zoom badge
        const badge = document.getElementById(`zoom-badge-${this.name}`);
        if (badge) {
            const zoomed = (this.zoomEnd - this.zoomStart) < 0.999;
            badge.style.display = zoomed ? 'block' : 'none';
            if (zoomed) {
                const spanMHz = (spanHz / 1e6).toFixed(3);
                badge.textContent = `${spanMHz} MHz  ×${(1/(this.zoomEnd-this.zoomStart)).toFixed(1)}`;
            }
        }
    }

    // ── Zoom helpers ──────────────────────────────────────────────────────────
    _resetZoom() {
        this.zoomStart = 0;
        this.zoomEnd   = 1;
        this._updateAxis();
        this.dirty = true;
    }

    // Apply a zoom centred on `centreFrac` (fraction of current view) by `factor`
    // factor > 1 = zoom in, factor < 1 = zoom out
    _applyZoom(centreFrac, factor) {
        const span    = this.zoomEnd - this.zoomStart;
        const newSpan = Math.min(1, Math.max(0.01, span / factor));
        // Centre in absolute fraction space
        const absCenter = this.zoomStart + centreFrac * span;
        let newStart = absCenter - centreFrac * newSpan;
        let newEnd   = newStart + newSpan;
        // Clamp to [0,1]
        if (newStart < 0) { newEnd -= newStart; newStart = 0; }
        if (newEnd   > 1) { newStart -= (newEnd - 1); newEnd = 1; }
        newStart = Math.max(0, newStart);
        newEnd   = Math.min(1, newEnd);
        this.zoomStart = newStart;
        this.zoomEnd   = newEnd;
        this._updateAxis();
        this.dirty = true;
    }

    // ── All zoom interaction handlers ─────────────────────────────────────────
    _setupZoomHandlers() {
        const spec    = this.specCanvas;
        const wf      = this.wfCanvas;
        const overlay = this.overlayCanvas;

        // ── Scroll wheel zoom (on spec or wf) ────────────────────────────────
        const onWheel = (e) => {
            e.preventDefault();
            const rect = e.currentTarget.getBoundingClientRect();
            const frac = (e.clientX - rect.left) / rect.width;
            // deltaY > 0 = scroll down = zoom out; < 0 = zoom in
            const factor = e.deltaY < 0 ? 1.4 : 1 / 1.4;
            this._applyZoom(frac, factor);
        };
        spec.addEventListener('wheel', onWheel, { passive: false });
        wf.addEventListener('wheel', onWheel, { passive: false });

        // ── Drag-to-select on overlay ─────────────────────────────────────────
        // The overlay sits over the full stack; we track drag in spec-fraction space.
        // Drag is initiated on mousedown anywhere in the stack.
        const stack = document.getElementById(`stack-${this.name}`);

        // ── Double-click / double-tap to reset zoom ───────────────────────────
        // Listen on the stack so it fires regardless of which child was clicked.
        stack.addEventListener('dblclick', (e) => {
            e.preventDefault();
            this._resetZoom();
        });

        // ── Right-click: reset zoom + stop audio ──────────────────────────────
        stack.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            this._resetZoom();
            if (audioBandName === this.name) stopAudio();
        });

        // ── Single click → tune audio to clicked frequency ────────────────────
        // Fires only for genuine single clicks (not drags, not double-clicks).
        stack.addEventListener('click', (e) => {
            if (e.detail >= 2) return;           // ignore double-click
            if (this._lastClickWasDrag) { this._lastClickWasDrag = false; return; }
            if (!this.bins) return;

            const rect   = stack.getBoundingClientRect();
            const frac   = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            // Map cursor fraction linearly across the visible Hz range (1 Hz resolution)
            const startHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
            const endHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
            const freqHz  = Math.round(startHz + frac * (endHz - startHz));

            startAudioAt(freqHz, this.name);
        });

        const onMouseDown = (e) => {
            if (e.button !== 0) return;
            // Ignore the second click of a double-click — let dblclick handle it
            if (e.detail >= 2) return;
            const rect = stack.getBoundingClientRect();
            this._dragStart = (e.clientX - rect.left) / rect.width;
            this._dragLast  = this._dragStart;
            this._dragging  = false;
            const zoomed = (this.zoomEnd - this.zoomStart) < 0.999;
            overlay.style.pointerEvents = 'auto';
            overlay.style.cursor = zoomed ? 'grab' : 'col-resize';
        };

        const onMouseMove = (e) => {
            if (this._dragStart === null) return;
            const rect = stack.getBoundingClientRect();
            const cur  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            const dist = Math.abs(cur - this._dragStart);
            if (dist > 0.01) this._dragging = true;
            if (!this._dragging) return;

            const zoomed = (this.zoomEnd - this.zoomStart) < 0.999;

            if (zoomed) {
                // ── Pan mode: shift zoom window by delta ──────────────────────
                // Scale delta by zoom span so 1px mouse = 1px content at any zoom level.
                overlay.style.cursor = 'grabbing';
                const span  = this.zoomEnd - this.zoomStart;
                const delta = (cur - this._dragLast) * span;
                let newStart = this.zoomStart - delta;
                let newEnd   = this.zoomEnd   - delta;
                if (newStart < 0) { newEnd -= newStart; newStart = 0; }
                if (newEnd   > 1) { newStart -= (newEnd - 1); newEnd = 1; }
                this.zoomStart = Math.max(0, newStart);
                this.zoomEnd   = Math.min(1, newEnd);
                this._updateAxis();
                this.dirty = true;
                // Clear any selection rect
                this.overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
            } else {
                // ── Zoom-select mode: draw selection rectangle ────────────────
                const oCtx = this.overlayCtx;
                const ow = overlay.width;
                const oh = overlay.height;
                oCtx.clearRect(0, 0, ow, oh);
                const x1 = Math.min(this._dragStart, cur) * ow;
                const x2 = Math.max(this._dragStart, cur) * ow;
                oCtx.fillStyle   = 'rgba(126,200,227,0.12)';
                oCtx.fillRect(x1, 0, x2 - x1, oh);
                oCtx.strokeStyle = 'rgba(126,200,227,0.7)';
                oCtx.lineWidth   = 1;
                oCtx.strokeRect(x1, 0, x2 - x1, oh);
            }
            this._dragLast = cur;
        };

        const onMouseUp = (e) => {
            if (this._dragStart === null) return;
            const rect = stack.getBoundingClientRect();
            const cur  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));

            // Clear overlay
            this.overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
            overlay.style.pointerEvents = 'none';
            overlay.style.cursor = '';

            const zoomed = (this.zoomEnd - this.zoomStart) < 0.999;

            if (this._dragging && Math.abs(cur - this._dragStart) > 0.01) {
                if (!zoomed) {
                    // Commit zoom-to-selection (only at full zoom)
                    const span = this.zoomEnd - this.zoomStart;
                    const a = this.zoomStart + Math.min(this._dragStart, cur) * span;
                    const b = this.zoomStart + Math.max(this._dragStart, cur) * span;
                    this.zoomStart = Math.max(0, a);
                    this.zoomEnd   = Math.min(1, b);
                    this._updateAxis();
                    this.dirty = true;
                }
                // Tell the click handler that this mouseup ended a drag
                this._lastClickWasDrag = true;
            }
            this._dragStart = null;
            this._dragLast  = null;
            this._dragging  = false;
        };

        stack.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup',   onMouseUp);

        // ── Touch: pinch-to-zoom + single-finger pan + double-tap reset ───────
        const onTouchStart = (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                this._touchPanLast = null; // cancel any single-finger pan
                this._touchTapStart = null; // cancel tap tracking
                const t1 = e.touches[0], t2 = e.touches[1];
                this._pinchDist0  = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                this._pinchZoom0  = { start: this.zoomStart, end: this.zoomEnd };
                const rect = spec.getBoundingClientRect();
                const midX = (t1.clientX + t2.clientX) / 2;
                this._pinchCenter = (midX - rect.left) / rect.width;
            } else if (e.touches.length === 1) {
                // Record tap start position for tap-vs-pan disambiguation
                const rect = stack.getBoundingClientRect();
                this._touchTapStart = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY,
                    frac: (e.touches[0].clientX - rect.left) / rect.width,
                };

                // Double-tap detection
                const now = Date.now();
                if (now - this._lastTap < 350) {
                    e.preventDefault();
                    this._resetZoom();
                    this._touchPanLast = null;
                    this._touchTapStart = null;
                } else {
                    // Start single-finger pan tracking (only when zoomed)
                    const zoomed = (this.zoomEnd - this.zoomStart) < 0.999;
                    if (zoomed) {
                        this._touchPanLast = (e.touches[0].clientX - rect.left) / rect.width;
                        e.preventDefault(); // prevent page scroll while panning
                    } else {
                        this._touchPanLast = null;
                    }
                }
                this._lastTap = now;
            }
        };

        const onTouchMove = (e) => {
            if (e.touches.length === 2 && this._pinchDist0 !== null) {
                e.preventDefault();
                const t1 = e.touches[0], t2 = e.touches[1];
                const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                const factor = dist / this._pinchDist0;
                // Apply zoom relative to pinch-start state
                const z0    = this._pinchZoom0;
                const span0 = z0.end - z0.start;
                const newSpan = Math.min(1, Math.max(0.01, span0 / factor));
                const absCenter = z0.start + this._pinchCenter * span0;
                let newStart = absCenter - this._pinchCenter * newSpan;
                let newEnd   = newStart + newSpan;
                if (newStart < 0) { newEnd -= newStart; newStart = 0; }
                if (newEnd   > 1) { newStart -= (newEnd - 1); newEnd = 1; }
                this.zoomStart = Math.max(0, newStart);
                this.zoomEnd   = Math.min(1, newEnd);
                this._updateAxis();
                this.dirty = true;
            } else if (e.touches.length === 1 && this._touchPanLast !== null) {
                // Single-finger pan when zoomed
                // Scale delta by zoom span so 1px touch = 1px content at any zoom level.
                e.preventDefault();
                const rect  = stack.getBoundingClientRect();
                const cur   = (e.touches[0].clientX - rect.left) / rect.width;
                const span  = this.zoomEnd - this.zoomStart;
                const delta = (cur - this._touchPanLast) * span;
                let newStart = this.zoomStart - delta;
                let newEnd   = this.zoomEnd   - delta;
                if (newStart < 0) { newEnd -= newStart; newStart = 0; }
                if (newEnd   > 1) { newStart -= (newEnd - 1); newEnd = 1; }
                this.zoomStart = Math.max(0, newStart);
                this.zoomEnd   = Math.min(1, newEnd);
                this._updateAxis();
                this.dirty = true;
                this._touchPanLast = cur;
            }
        };

        const onTouchEnd = (e) => {
            if (e.touches.length < 2) {
                this._pinchDist0  = null;
                this._pinchZoom0  = null;
                this._pinchCenter = null;
            }
            if (e.touches.length === 0) {
                // Tap-to-audio: fire if finger lifted close to where it landed
                // (i.e. it was a tap, not a pan drag).
                const ts = this._touchTapStart;
                if (ts && this.bins) {
                    const touch = e.changedTouches[0];
                    const dx = touch.clientX - ts.x;
                    const dy = touch.clientY - ts.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 12) { // 12px threshold = tap
                        // Map canvas fraction linearly across the visible Hz range (1 Hz resolution)
                        const startHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
                        const endHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
                        const freqHz  = Math.round(startHz + ts.frac * (endHz - startHz));
                        startAudioAt(freqHz, this.name);
                    }
                }
                this._touchTapStart = null;
                this._touchPanLast  = null;
            }
        };

        stack.addEventListener('touchstart', onTouchStart, { passive: false });
        stack.addEventListener('touchmove',  onTouchMove,  { passive: false });
        stack.addEventListener('touchend',   onTouchEnd);
    }

    // Called by SSE decoder with new float32 dBFS array
    applyFrame(data, flags) {
        const binCount = this.meta.bin_count;

        if (flags === 0x03) {
            // Full uint8 frame
            if (data.length !== binCount) return;
            if (!this.bins || this.bins.length !== binCount) {
                this.bins = new Uint8Array(binCount);
            }
            this.bins.set(data);
        } else if (flags === 0x04) {
            // Delta uint8 frame
            if (!this.bins) return; // need full frame first
            // data is a Uint8Array of [idx_lo, idx_hi, val] triples
            const count = (data[0] | (data[1] << 8));
            for (let i = 0; i < count; i++) {
                const off = 2 + i * 3;
                const idx = data[off] | (data[off+1] << 8);
                const val = data[off+2];
                if (idx < this.bins.length) this.bins[idx] = val;
            }
        } else {
            return;
        }

        this.dirty = true;
    }

    _startRenderLoop() {
        const loop = () => {
            if (this.dirty) {
                this._draw();
                this.dirty = false;
            }
            this.animFrame = requestAnimationFrame(loop);
        };
        this.animFrame = requestAnimationFrame(loop);
    }

    _draw() {
        if (!this.bins) return;
        const w = this.specCanvas.width;
        const h = this.specCanvas.height;
        if (w === 0 || h === 0) return;

        const bins   = this.bins;
        const n      = bins.length;
        const dMin   = dbMin;
        const dMax   = dbMax;
        const dRange = dMax - dMin;

        // ── Zoomed bin range ──────────────────────────────────────────────────
        const zs       = this.zoomStart;
        const ze       = this.zoomEnd;
        const binStart = Math.round(zs * (n - 1));
        const binEnd   = Math.round(ze * (n - 1));
        const zn       = Math.max(2, binEnd - binStart + 1);

        // ── Spectrum line graph ───────────────────────────────────────────────
        const sCtx = this.specCtx;
        sCtx.clearRect(0, 0, w, h);

        // Adaptive grid
        const niceSteps = [5, 10, 20, 25, 50, 100];
        let labelStep = niceSteps[niceSteps.length - 1];
        for (const s of niceSteps) {
            if (dRange / s <= 5) { labelStep = s; break; }
        }
        const minorStep = Math.max(5, labelStep / 2);

        sCtx.font = '10px monospace';
        sCtx.textAlign = 'left';
        sCtx.textBaseline = 'bottom';

        for (let db = Math.ceil(dMin / minorStep) * minorStep; db <= dMax; db += minorStep) {
            const y = h - ((db - dMin) / dRange) * h;
            const isMajor = (db % labelStep === 0);
            sCtx.strokeStyle = isMajor ? '#222233' : '#161622';
            sCtx.lineWidth = 1;
            sCtx.beginPath();
            sCtx.moveTo(0, y);
            sCtx.lineTo(w, y);
            sCtx.stroke();
            if (isMajor && y < h - 2) {
                const label = `${db}`;
                const tw = sCtx.measureText(label).width;
                sCtx.fillStyle = 'rgba(10,10,15,0.65)';
                sCtx.fillRect(2, y - 13, tw + 4, 12);
                sCtx.fillStyle = '#ffffff';
                sCtx.fillText(label, 4, y - 2);
            }
        }

        // Build dBFS values for the full bin array
        const vals = new Float32Array(n);
        for (let i = 0; i < n; i++) vals[i] = bins[i] - 256;

        // Stats from full band
        const sorted = Float32Array.from(vals).sort();
        const p5   = sorted[Math.floor(n * 0.05)];
        const peak = sorted[n - 1];

        // Spectrum fill — zoomed slice
        sCtx.beginPath();
        for (let i = 0; i < zn; i++) {
            const x  = (i / (zn - 1)) * w;
            const db = Math.max(dMin, Math.min(dMax, vals[binStart + i]));
            const y  = h - ((db - dMin) / dRange) * h;
            if (i === 0) sCtx.moveTo(x, y);
            else         sCtx.lineTo(x, y);
        }
        sCtx.lineTo(w, h);
        sCtx.lineTo(0, h);
        sCtx.closePath();
        const grad = sCtx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, 'rgba(126,200,227,0.35)');
        grad.addColorStop(1, 'rgba(126,200,227,0.02)');
        sCtx.fillStyle = grad;
        sCtx.fill();

        // Line on top
        sCtx.beginPath();
        for (let i = 0; i < zn; i++) {
            const x  = (i / (zn - 1)) * w;
            const db = Math.max(dMin, Math.min(dMax, vals[binStart + i]));
            const y  = h - ((db - dMin) / dRange) * h;
            if (i === 0) sCtx.moveTo(x, y);
            else         sCtx.lineTo(x, y);
        }
        sCtx.strokeStyle = '#7ec8e3';
        sCtx.lineWidth = 1.2;
        sCtx.stroke();

        // Update stats
        document.getElementById(`stat-p5-${this.name}`).textContent  = p5.toFixed(1);
        document.getElementById(`stat-peak-${this.name}`).textContent = peak.toFixed(1);

        // ── FT8 frequency highlight ───────────────────────────────────────────
        // Highlight the 3 kHz FT8 window (dial freq → dial+3 kHz, USB) if configured.
        const ft8Hz = this.meta.ft8_frequency;
        if (ft8Hz && ft8Hz > 0) {
            const bw        = this.meta.bin_bandwidth;
            const bandStart = this.meta.start;

            // Bin positions for dial and dial+3 kHz
            const dialBin  = (ft8Hz - bandStart) / bw;
            const endBin   = (ft8Hz + 3000 - bandStart) / bw;

            // Canvas X positions (clamped to visible area)
            const x1 = Math.max(0, ((dialBin - binStart) / (zn - 1)) * w);
            const x2 = Math.min(w, ((endBin  - binStart) / (zn - 1)) * w);

            if (x2 > x1) {
                // Shaded region
                sCtx.save();
                sCtx.fillStyle = 'rgba(76,175,80,0.12)';
                sCtx.fillRect(x1, 0, x2 - x1, h);

                // Dial frequency vertical line
                sCtx.strokeStyle = 'rgba(76,175,80,0.6)';
                sCtx.lineWidth   = 1;
                sCtx.setLineDash([3, 3]);
                sCtx.beginPath();
                sCtx.moveTo(x1, 0);
                sCtx.lineTo(x1, h);
                sCtx.stroke();
                sCtx.setLineDash([]);

                // "FT8" label at top, just right of the dial line
                sCtx.font         = '9px monospace';
                sCtx.textBaseline = 'top';
                sCtx.textAlign    = 'left';
                const label = 'FT8';
                const tw    = sCtx.measureText(label).width;
                const lx    = Math.min(x1 + 3, w - tw - 2);
                sCtx.fillStyle = 'rgba(0,0,0,0.55)';
                sCtx.fillRect(lx - 1, 1, tw + 4, 12);
                sCtx.fillStyle = 'rgba(255,255,255,0.9)';
                sCtx.fillText(label, lx + 1, 2);

                sCtx.restore();
            }
        }

        // ── Waterfall ─────────────────────────────────────────────────────────
        const wfW = this.wfCanvas.width;
        const wfH = this.wfCanvas.height;
        if (wfW === 0 || wfH === 0) return;

        // Store full-resolution normalised row (one float per bin) so any zoom
        // level can be rendered from history without data loss.
        const rowData = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            rowData[i] = Math.max(0, Math.min(1, (vals[i] - dMin) / dRange));
        }
        this.waterfallRows.push(rowData);
        this.waterfallTimes.push(Date.now());
        if (this.waterfallRows.length > this.maxRows) {
            this.waterfallRows.shift();
            this.waterfallTimes.shift();
        }

        // Redraw entire waterfall using the zoomed bin slice
        const wfCtx = this.wfCtx;
        const rows  = this.waterfallRows;
        const nRows = rows.length;

        const imgData = wfCtx.createImageData(wfW, wfH);
        const buf32   = new Uint32Array(imgData.data.buffer);

        for (let r = 0; r < nRows; r++) {
            const srcRow = rows[nRows - 1 - r]; // newest at top
            const yStart = Math.round(r * wfH / this.maxRows);
            const yEnd   = Math.round((r + 1) * wfH / this.maxRows);
            for (let y = yStart; y < yEnd && y < wfH; y++) {
                const base = y * wfW;
                for (let x = 0; x < wfW; x++) {
                    const bi   = binStart + Math.round((x / (wfW - 1)) * (zn - 1));
                    const norm = srcRow[Math.min(bi, n - 1)];
                    buf32[base + x] = CMAP[Math.round(norm * 255)];
                }
            }
        }
        wfCtx.putImageData(imgData, 0, 0);

        // ── Waterfall time axis (left edge) ───────────────────────────────────
        // Draw tick marks at fixed time intervals using stored row timestamps.
        // Positions are interpolated between adjacent rows so ticks glide smoothly
        // rather than jumping by one row-height each time a new row arrives.
        if (nRows > 1 && this.waterfallTimes.length === nRows) {
            const tickStep = 10; // seconds between ticks
            const t0 = this.waterfallTimes[nRows - 1]; // newest row timestamp (top of waterfall)
            wfCtx.save();
            wfCtx.font         = '9px monospace';
            wfCtx.textBaseline = 'middle';
            wfCtx.textAlign    = 'left';

            // Build an array of per-row ages (seconds) relative to t0.
            // rowAge[r] = age of the row at visual position r (0 = top/newest).
            const rowAge = new Float64Array(nRows);
            for (let r = 0; r < nRows; r++) {
                rowAge[r] = (t0 - this.waterfallTimes[nRows - 1 - r]) / 1000;
            }
            // rowAge[0] ≈ 0 (newest), rowAge[nRows-1] = oldest

            // For each tick boundary, interpolate the exact Y pixel between the two
            // adjacent rows that straddle it.  This gives sub-pixel accuracy so the
            // tick glides smoothly as the waterfall scrolls.
            const rowH = wfH / nRows; // height of one row in pixels
            let nextTick = tickStep;
            for (let r = 1; r < nRows && nextTick <= rowAge[nRows - 1] + tickStep; r++) {
                if (rowAge[r] >= nextTick) {
                    // Interpolate between row r-1 and row r
                    const ageA = rowAge[r - 1]; // age at top of row r-1
                    const ageB = rowAge[r];     // age at top of row r
                    const frac = (ageB > ageA) ? (nextTick - ageA) / (ageB - ageA) : 0;
                    // Y at top of row r-1 is (r-1)*rowH; top of row r is r*rowH
                    const y = Math.round((r - 1 + frac) * rowH);

                    // Tick line across full width
                    wfCtx.strokeStyle = 'rgba(255,255,255,0.5)';
                    wfCtx.lineWidth   = 1;
                    wfCtx.beginPath();
                    wfCtx.moveTo(0, y);
                    wfCtx.lineTo(wfW, y);
                    wfCtx.stroke();
                    // Label
                    const label = `${nextTick}s`;
                    const tw = wfCtx.measureText(label).width;
                    wfCtx.fillStyle = 'rgba(0,0,0,0.65)';
                    wfCtx.fillRect(1, y - 6, tw + 4, 12);
                    wfCtx.fillStyle = 'rgba(255,255,255,0.9)';
                    wfCtx.fillText(label, 3, y);
                    nextTick += tickStep;
                }
            }
            wfCtx.restore();
        }

        // ── Audio cursor overlay ──────────────────────────────────────────────
        // Draw carrier line + bandwidth shading on both canvases when this band
        // is the one currently being listened to.
        if (audioBandName === this.name && audioFreqHz !== null && radio && radio.isPlaying) {
            this._drawAudioCursor(sCtx, w, h, true);
            this._drawAudioCursor(wfCtx, wfW, wfH, false);
        }
    }

    // Draw carrier line + bandwidth shading on a canvas context.
    // Uses the same linear Hz→pixel mapping as the click handler.
    _drawAudioCursor(ctx, cw, ch, showLabel = false) {
        // Visible Hz range (matches click/touch/tooltip mapping exactly)
        const viewStartHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
        const viewEndHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
        const viewSpanHz  = viewEndHz - viewStartHz;
        if (viewSpanHz <= 0) return;

        // Carrier position as canvas-fraction using linear Hz mapping
        const carrierFrac = (audioFreqHz - viewStartHz) / viewSpanHz;
        if (carrierFrac < -0.05 || carrierFrac > 1.05) return; // off-screen

        const cx = carrierFrac * cw;

        // Bandwidth edges (Hz offsets from carrier, from MinimalRadio)
        const bwLow  = radio.bandwidthLow  ?? -2850;   // Hz offset (negative = below carrier)
        const bwHigh = radio.bandwidthHigh ??  2850;

        const x1 = Math.max(0, ((audioFreqHz + bwLow  - viewStartHz) / viewSpanHz) * cw);
        const x2 = Math.min(cw, ((audioFreqHz + bwHigh - viewStartHz) / viewSpanHz) * cw);

        // Bandwidth shading
        if (x2 > x1) {
            ctx.fillStyle = 'rgba(229,115,115,0.28)';
            ctx.fillRect(x1, 0, x2 - x1, ch);
        }

        // Carrier line
        ctx.save();
        ctx.strokeStyle = '#e57373';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(cx, 0);
        ctx.lineTo(cx, ch);
        ctx.stroke();

        // Dial frequency label — spectrum canvas only, sits just below the FT8 label
        // (FT8 label occupies y=1..13, this sits at y=15)
        if (showLabel) {
            ctx.font         = '9px monospace';
            ctx.textBaseline = 'top';
            ctx.textAlign    = 'left';
            const dialLabel = (audioFreqHz / 1000).toFixed(1) + ' kHz';
            const dlw = ctx.measureText(dialLabel).width;
            const dlx = (cx + 3 + dlw > cw) ? cx - dlw - 4 : cx + 3;  // flip left if near right edge
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(dlx - 1, 29, dlw + 4, 12);
            ctx.fillStyle = '#e57373';
            ctx.fillText(dialLabel, dlx + 1, 30);
        }

        ctx.restore();
    }

    _drawHoverLine(frac) {
        const ctx = this.overlayCtx;
        const ow  = this.overlayCanvas.width;
        const oh  = this.overlayCanvas.height;
        if (ow === 0 || oh === 0) return;
        ctx.clearRect(0, 0, ow, oh);
        const x = frac * ow;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth   = 1;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, oh);
        ctx.stroke();
        ctx.restore();
    }

    _clearHoverLine() {
        const ctx = this.overlayCtx;
        const ow  = this.overlayCanvas.width;
        const oh  = this.overlayCanvas.height;
        if (ow === 0 || oh === 0) return;
        ctx.clearRect(0, 0, ow, oh);
    }

    _onSpecHover(e) {
        if (!this.bins) return;
        const rect = this.specCanvas.getBoundingClientRect();
        const frac = (e.clientX - rect.left) / rect.width;
        // Frequency: linear interpolation across visible Hz range (1 Hz resolution)
        const startHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
        const endHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
        const hz      = Math.round(startHz + frac * (endHz - startHz));
        // dB: still looked up from the nearest bin
        const n        = this.bins.length;
        const binStart = Math.round(this.zoomStart * (n - 1));
        const binEnd   = Math.round(this.zoomEnd   * (n - 1));
        const zn       = Math.max(2, binEnd - binStart + 1);
        const binIdx   = Math.min(n - 1, Math.max(0, binStart + Math.round(frac * (zn - 1))));
        const db  = this.bins[binIdx] - 256;
        const mhz = (hz / 1e6).toFixed(4);
        _positionTooltip(`${mhz} MHz  ${db.toFixed(1)} dBFS`, e.clientX, e.clientY);
    }

    _onWfHover(e) {
        if (!this.bins) return;
        const rect  = this.wfCanvas.getBoundingClientRect();
        const fracX = (e.clientX - rect.left) / rect.width;
        const fracY = (e.clientY - rect.top)  / rect.height;

        // Frequency: linear interpolation across visible Hz range (1 Hz resolution)
        const startHz = this.meta.start + this.zoomStart * (this.meta.end - this.meta.start);
        const endHz   = this.meta.start + this.zoomEnd   * (this.meta.end - this.meta.start);
        const hz      = Math.round(startHz + fracX * (endHz - startHz));
        const mhz     = (hz / 1e6).toFixed(4);
        // dB: still looked up from the nearest bin
        const n        = this.bins.length;
        const binStart = Math.round(this.zoomStart * (n - 1));
        const binEnd   = Math.round(this.zoomEnd   * (n - 1));
        const zn       = Math.max(2, binEnd - binStart + 1);
        const binIdx   = Math.min(n - 1, Math.max(0, binStart + Math.round(fracX * (zn - 1))));

        // Y → row index within actual stored rows (newest = top = index 0)
        const rows    = this.waterfallRows;
        const times   = this.waterfallTimes;
        const nRows   = rows.length;
        if (nRows === 0) return;
        // Map canvas Y fraction → row index 0 (newest) .. nRows-1 (oldest)
        const rowIdx     = Math.min(nRows - 1, Math.round(fracY * (nRows - 1)));
        const rowDataIdx = nRows - 1 - rowIdx;
        // Age: use actual stored timestamp for accuracy
        const ageSec = Math.round((Date.now() - (times[rowDataIdx] ?? Date.now())) / 1000);
        const ageStr = ageSec <= 0 ? 'now'
                     : ageSec === 1 ? '1 s ago'
                     : `${ageSec} s ago`;
        let dbStr = '--';
        if (rowDataIdx >= 0 && rowDataIdx < nRows) {
            const norm = rows[rowDataIdx][Math.min(binIdx, n - 1)];
            const db   = dbMin + norm * (dbMax - dbMin);
            dbStr = db.toFixed(1) + ' dBFS';
        }

        _positionTooltip(`${mhz} MHz  ${dbStr}  (${ageStr})`, e.clientX, e.clientY);
    }

    destroy() {
        if (this.animFrame) cancelAnimationFrame(this.animFrame);
        if (this.el && this.el.parentNode) this.el.parentNode.removeChild(this.el);
    }
}

// ── SSE binary8 decoder ───────────────────────────────────────────────────────
function decodeSSEEvent(b64data) {
    // base64 → Uint8Array
    const bin = atob(b64data);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

    if (buf.length < 22) return null;
    const magic = String.fromCharCode(buf[0], buf[1], buf[2], buf[3]);
    if (magic !== 'SPEC') return null;

    const flags = buf[5];
    // payload starts at offset 22
    const payload = buf.subarray(22);
    return { flags, payload };
}

// ── SSE connection management ─────────────────────────────────────────────────
function buildSSEUrl() {
    const params = [...activeBands].map(b => `band=${encodeURIComponent(b)}`).join('&');
    return `/api/noisefloor/spectrum/stream${params ? '?' + params : ''}`;
}

// Reconnect state — exponential backoff capped at 30 s
let _sseRetryDelay  = 2000;   // ms, doubles on each failure up to _sseRetryMax
const _sseRetryMax  = 30000;
let _sseRetryTimer  = null;   // pending setTimeout handle
let _sseConnected   = false;  // true once we receive at least one event

function _cancelRetry() {
    if (_sseRetryTimer !== null) {
        clearTimeout(_sseRetryTimer);
        _sseRetryTimer = null;
    }
}

function _scheduleReconnect() {
    _cancelRetry();
    if (activeBands.size === 0) return;
    const delay = _sseRetryDelay;
    setStatus('error', `Connection lost — retrying in ${Math.round(delay / 1000)} s…`);
    _sseRetryTimer = setTimeout(() => {
        _sseRetryTimer = null;
        connectSSE();
    }, delay);
    // Exponential backoff
    _sseRetryDelay = Math.min(_sseRetryMax, _sseRetryDelay * 2);
}

function connectSSE() {
    // Cancel any pending retry
    _cancelRetry();

    // Close existing connection
    if (sse) { sse.close(); sse = null; }

    // Reset bandwidth counters on each (re)connect so stale figures don't persist.
    _bpsAccum = 0; _bpsLastTime = 0; _bpsCurrent = null;
    _sseConnected = false;

    if (activeBands.size === 0) {
        setStatus('wait', 'No bands selected');
        return;
    }

    // Only show "Connecting…" if we weren't already live — avoids a flash
    // when toggling bands while the stream is running.
    if (!_sseConnected) setStatus('wait', 'Connecting…');

    sse = new EventSource(buildSSEUrl());

    // onopen fires as soon as the HTTP connection is established.
    sse.onopen = () => {
        _sseConnected = true;
        _sseRetryDelay = 2000;
        _touchLastEvent();
        _updateStatusText();
    };

    sse.addEventListener('spectrum', e => {
        _touchLastEvent();
        if (!_sseConnected) {
            _sseConnected = true;
            _sseRetryDelay = 2000;
        }

        const band = e.lastEventId;
        const panel = panels[band];
        if (!panel) return;

        const decoded = decodeSSEEvent(e.data);
        if (!decoded) return;

        panel.applyFrame(decoded.payload, decoded.flags);

        // Accumulate bytes for kbps display (updated by the 1s status timer)
        _bpsAccum += e.data.length;
        const now = performance.now();
        if (_bpsLastTime === 0) _bpsLastTime = now;
        const elapsed = now - _bpsLastTime;
        if (elapsed >= 1000) {
            const kbps = (_bpsAccum * 8 / elapsed).toFixed(1); // bits/ms = kbps
            _bpsCurrent = `${kbps} kbps`;
            _bpsAccum = 0;
            _bpsLastTime = now;
        }
    });

    sse.addEventListener('heartbeat', () => {
        _touchLastEvent();
        if (!_sseConnected) {
            _sseConnected = true;
            _sseRetryDelay = 2000;
        }
    });

    sse.onerror = () => {
        // Close immediately — don't let the browser silently retry on its own
        // schedule, which can produce duplicate connections.
        if (sse) { sse.close(); sse = null; }
        _sseConnected = false;
        _scheduleReconnect();
    };
}

// Update the status text once per second from a timer — decoupled from data events
// so the "Live" indicator doesn't flicker when connectSSE() is called mid-stream.
function _updateStatusText() {
    // Always tick the UTC clock regardless of connection state
    const now = new Date();
    const hh = String(now.getUTCHours()).padStart(2, '0');
    const mm = String(now.getUTCMinutes()).padStart(2, '0');
    const ss = String(now.getUTCSeconds()).padStart(2, '0');
    const clockEl = document.getElementById('utc-clock');
    if (clockEl) clockEl.textContent = `${hh}:${mm}:${ss} UTC`;

    // Local time — shown only when we have a timezone offset from the server
    const localEl = document.getElementById('local-clock');
    if (localEl && _localTzOffsetMin !== null) {
        const localMs  = now.getTime() + _localTzOffsetMin * 60 * 1000;
        const localNow = new Date(localMs);
        const lhh = String(localNow.getUTCHours()).padStart(2, '0');
        const lmm = String(localNow.getUTCMinutes()).padStart(2, '0');
        const lss = String(localNow.getUTCSeconds()).padStart(2, '0');
        localEl.textContent = `${lhh}:${lmm}:${lss} Local`;
        localEl.style.display = '';
    }

    if (!sse || sse.readyState === EventSource.CLOSED) return; // error path handles its own text
    if (sse.readyState === EventSource.CONNECTING) {
        setStatus('wait', 'Connecting…');
        return;
    }
    // OPEN
    const kbpsStr = _bpsCurrent ? ` · ${_bpsCurrent}` : '';
    setStatus('live', `Live${kbpsStr}`);
}

let _statusTimer = null;
function _startStatusTimer() {
    if (_statusTimer !== null) return;
    _updateStatusText(); // tick immediately so clock shows at once
    _statusTimer = setInterval(_updateStatusText, 1000);
}

// ── Band selection ────────────────────────────────────────────────────────────
function rebuildPanels() {
    // Remove panels for deselected bands
    for (const name of Object.keys(panels)) {
        if (!activeBands.has(name)) {
            panels[name].destroy();
            delete panels[name];
        }
    }

    // Add panels for newly selected bands
    for (const name of allBands) {
        if (activeBands.has(name) && !panels[name]) {
            panels[name] = new BandPanel(name, bandMeta[name]);
        }
    }

    // Re-order DOM nodes in the grid to match allBands frequency order.
    // appendChild moves an existing node to the end, so iterating allBands
    // in order produces the correct final sequence regardless of prior order.
    const grid = document.getElementById('grid');
    for (const name of allBands) {
        if (panels[name] && panels[name].el) {
            grid.appendChild(panels[name].el);
        }
    }

    // Show/hide no-data message
    document.getElementById('no-data').style.display =
        activeBands.size === 0 ? 'block' : 'none';

    // Reconnect SSE with new band list
    connectSSE();
}

function toggleBand(name) {
    if (activeBands.has(name)) activeBands.delete(name);
    else                        activeBands.add(name);
    updatePills();
    rebuildPanels();
    savePrefs();
}

function updatePills() {
    document.querySelectorAll('.band-pill').forEach(pill => {
        const name = pill.dataset.band;
        pill.classList.toggle('active', activeBands.has(name));
    });
}

function savePrefs() {
    try {
        localStorage.setItem('bandActivity_active', JSON.stringify([...activeBands]));
        localStorage.setItem('bandActivity_dbMin', dbMin);
        localStorage.setItem('bandActivity_dbMax', dbMax);
        localStorage.setItem('bandActivity_palette', currentPalette);

}

function loadPrefs() {
    try {
        const saved = localStorage.getItem('bandActivity_active');
        if (saved) {
            const arr = JSON.parse(saved);
            activeBands = new Set(arr.filter(n => bandMeta[n]));
        }
        const sMin = localStorage.getItem('bandActivity_dbMin');
        const sMax = localStorage.getItem('bandActivity_dbMax');
        if (sMin) { dbMin = parseFloat(sMin); document.getElementById('db-min').value = dbMin; }
        if (sMax) { dbMax = parseFloat(sMax); document.getElementById('db-max').value = dbMax; }

        const sPalette = localStorage.getItem('bandActivity_palette');
        if (sPalette) {
            currentPalette = sPalette;
            CMAP = buildCMAP(currentPalette);
            const sel = document.getElementById('palette-select');
            if (sel) sel.value = currentPalette;
        }

}

// ── Stale-connection watchdog ─────────────────────────────────────────────────
// If no spectrum or heartbeat event arrives within 45 s, force a reconnect.
// The server sends a heartbeat every 30 s, so 45 s gives one missed heartbeat
// of tolerance before we decide the connection is dead.
let _lastEventTime  = 0;
const _STALE_MS     = 45_000;
let _watchdogTimer  = null;

function _touchLastEvent() {
    _lastEventTime = Date.now();
}

// ── Band Conditions panel ─────────────────────────────────────────────────────
// Fetches per-band FT8 SNR (last 10 min) and NOAA space weather every 5 minutes.

const _COND_BANDS_FALLBACK = ['160m','80m','60m','40m','30m','20m','17m','15m','12m','10m','6m'];
let _condTimer = null;

// ── CW Spots (SSE) ───────────────────────────────────────────────────────────
let _cwEnabled      = false;          // set from /api/description
let _cwSSE          = null;           // EventSource instance
let _cwReconnectMs  = 5000;           // backoff: 5 s → 30 s
let _cwRecentSpots  = [];             // ring buffer, newest first, max 50
let _cwSeenCountries = new Map();     // band → Set<country_code>
const _CW_MAX_DISPLAY = 24;
const _CW_RING_SIZE   = 50;

function _cwMakeBadge(spot) {
    const el = document.createElement('span');
    el.className = 'cond-cw-badge' + (spot.isNew ? ' new-country' : '');
    el.title = `${spot.callsign} on ${spot.band} · ${(spot.frequency / 1e6).toFixed(4)} MHz · ${spot.wpm || '?'} WPM`;
    const flag = spot.country_code ? iso2ToFlag(spot.country_code) : '';
    el.innerHTML =
        (flag ? `<span class="ccw-flag">${flag}</span>` : '') +
        `<span class="ccw-call">${_escHtml(spot.callsign)}</span>` +
        `<span class="ccw-band">${_escHtml(spot.band)}</span>` +
        (spot.isNew ? `<span class="ccw-star">★</span>` : '');
    return el;
}

function _renderCWSpots() {
    const el = document.getElementById('cond-cw-spots');
    if (!el) return;
    if (_cwRecentSpots.length === 0) {
        el.style.display = 'none';
        return;
    }
    el.innerHTML = '';
    const shown = _cwRecentSpots.slice(0, _CW_MAX_DISPLAY);
    for (const spot of shown) el.appendChild(_cwMakeBadge(spot));
    el.style.display = 'flex'; // must override inline style="display:none"
    // Newest render first, so drop trailing (oldest) badges until they all
    // fit the fixed height available under the band pills.
    while (el.lastElementChild && el.scrollHeight > el.clientHeight) {
        el.removeChild(el.lastElementChild);
    }
    // No room for even one badge — hide the strip entirely.
    if (!el.firstElementChild) el.style.display = 'none';
}

function _cwHandleSpot(spot) {
    // Determine if this is a new country on this band
    const band = spot.band || '';
    const cc   = (spot.country_code || '').toUpperCase();
    let isNew = false;
    if (cc) {
        if (!_cwSeenCountries.has(band)) _cwSeenCountries.set(band, new Set());
        const seen = _cwSeenCountries.get(band);
        if (!seen.has(cc)) {
            seen.add(cc);
            isNew = true;
        }
    }
    // Prepend to ring buffer
    _cwRecentSpots.unshift({ ...spot, isNew });
    if (_cwRecentSpots.length > _CW_RING_SIZE) _cwRecentSpots.length = _CW_RING_SIZE;
    _renderCWSpots();
    // Update body padding in case bar grew
    const bar = document.getElementById('conditions-bar');
    if (bar && bar.style.display !== 'none') {
        requestAnimationFrame(() => {
            document.body.style.paddingBottom = bar.offsetHeight + 'px';
        });
    }
}

function _startCWSpots() {
    if (_cwSSE) return; // already connected
    // Attempt connection regardless of _cwEnabled — server returns 503 if disabled,
    // which onerror handles with a long backoff so we don't hammer a disabled endpoint.

    function connect() {
        const es = new EventSource('/api/cwskimmer/stream');
        _cwSSE = es;
        let gotMessage = false;

        es.onmessage = (e) => {
            gotMessage = true;
            _cwReconnectMs = 5000; // reset backoff on success
            try {
                const spot = JSON.parse(e.data);
                if (spot.type === 'cw_spot') _cwHandleSpot(spot);
            } catch (_) {}
        };

        // heartbeat events keep the connection alive — treat as success
        es.addEventListener('heartbeat', () => { gotMessage = true; _cwReconnectMs = 5000; });

        es.onerror = () => {
            es.close();
            _cwSSE = null;
            // If we never got a message, the server may have returned 503 —
            // use a longer backoff to avoid hammering a disabled endpoint.
            const delay = gotMessage ? _cwReconnectMs : 30000;
            setTimeout(() => {
                _cwReconnectMs = Math.min(_cwReconnectMs * 2, 30000);
                connect();
            }, delay);
        };
    }

    connect();
}

// Hardware status flags — set from /api/description in init()
let _rotatorEnabled  = false;
let _antSwitchEnabled = false;
let _hwTimer = null;   // separate 30 s poll for hardware (changes more often than weather)

function _snrStatus(snr) {
    if (snr === null || snr === undefined) return 'unknown';
    if (snr < 6)  return 'poor';
    if (snr < 20) return 'fair';
    if (snr < 30) return 'good';
    return 'excellent';
}

function _swPropClass(quality) {
    if (!quality) return 'unknown';
    const q = quality.toLowerCase();
    if (q.includes('excell')) return 'excellent';
    if (q.includes('good'))   return 'good';
    if (q.includes('fair'))   return 'fair';
    if (q.includes('poor') || q.includes('bad')) return 'poor';
    return 'unknown';
}

async function _fetchBandConditions() {
    const now  = new Date();
    const from = new Date(now.getTime() - 10 * 60 * 1000).toISOString();
    const to   = now.toISOString();

    // Use only bands that are actually configured on this server
    const bands = allBands.length > 0 ? allBands : _COND_BANDS_FALLBACK;

    const body = {
        primary: { from, to },
        bands,
        fields: ['ft8_snr'],
        interval: 'minute'
    };

    const resp = await fetch('/api/noisefloor/aggregate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(`aggregate HTTP ${resp.status}`);
    const data = await resp.json();

    // Process: average ft8_snr over the window per band
    const states = {};
    const primary = data.primary || {};
    for (const band of bands) {
        const pts = primary[band];
        if (!pts || pts.length === 0) {
            states[band] = { status: 'unknown', snr: null };
            continue;
        }
        let sum = 0, n = 0;
        for (const pt of pts) {
            const v = pt.values?.ft8_snr;
            if (v !== null && v !== undefined) { sum += v; n++; }
        }
        const snr = n > 0 ? sum / n : null;
        states[band] = { status: _snrStatus(snr), snr };
    }
    return states;
}

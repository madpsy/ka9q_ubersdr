<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Conditions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .chart-wrapper {
            position: relative;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
        }

        .status.error {
            background: rgba(244, 67, 54, 0.3);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.3);
        }

        .legend {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }

        .info-box {
            background: rgba(33, 150, 243, 0.2);
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .info-box strong {
            color: #64B5F6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Band Conditions</h1>
        <div class="subtitle" id="receiver-name">Band Conditions Monitor</div>
        
        <div class="info-box">
            ℹ️ This chart shows a rolling 24-hour window. Data to the <strong>left</strong> of the "Now" marker is from today, data to the <strong>right</strong> is from yesterday.
        </div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="bandStateChart"></canvas>
            </div>
            
            <div class="legend" id="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ef4444;"></div>
                    <span>CLOSED (SNR &lt; 6 dB)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #eab308;"></div>
                    <span>MARGINAL (6-20 dB)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #22c55e;"></div>
                    <span>OPEN (SNR &gt; 20 dB)</span>
                </div>
            </div>
        </div>

        <div id="status" class="status">Loading... <span id="countdown"></span></div>
    </div>

    <script src="chart.umd.min.js"></script>
    <script src="chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="chartjs-plugin-annotation.min.js"></script>
    <script src="bandconditions.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callsign Lookup</title>
    <link rel="stylesheet" href="leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Search bar ─────────────────────────────────────────────────── */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #222;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-bar label {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
        }

        #callsign-input {
            flex: 1;
            max-width: 200px;
            padding: 7px 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
            font-family: monospace;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }

        #callsign-input:focus {
            border-color: #4a9eff;
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2);
        }

        #lookup-btn {
            padding: 7px 18px;
            background: #4a9eff;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #lookup-btn:hover {
            background: #3a8eef;
        }

        #lookup-btn:disabled {
            background: #2a5a8a;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ── Result area ────────────────────────────────────────────────── */
        #result-area {
            padding: 20px 16px;
        }

        /* Loading / error states */
        .state-msg {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }

        .state-msg.error {
            color: #dc3545;
        }

        /* ── Operator card ──────────────────────────────────────────────── */
        .operator-card {
            display: flex;
            gap: 20px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .operator-image-col {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .operator-image {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #444;
            background: #2a2a2a;
            display: block;
            cursor: pointer;
            transition: border-color 0.2s, opacity 0.2s;
        }

        .operator-image:hover {
            border-color: #4a9eff;
            opacity: 0.85;
        }

        /* ── Photo modal ────────────────────────────────────────────────── */
        #photo-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #photo-modal.open {
            display: flex;
        }

        #photo-modal-inner {
            position: relative;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 32px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #photo-modal-img {
            max-width: 100%;
            max-height: calc(100vh - 32px);
            border-radius: 6px;
            border: 2px solid #555;
            display: block;
        }

        #photo-modal-close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 28px;
            height: 28px;
            background: #333;
            border: 2px solid #555;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        #photo-modal-close:hover {
            background: #dc3545;
            border-color: #dc3545;
        }

        .image-placeholder {
            width: 160px;
            height: 160px;
            border-radius: 6px;
            border: 2px solid #333;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 40px;
        }

        .qrz-link {
            font-size: 11px;
            color: #4a9eff;
            text-decoration: none;
        }

        .qrz-link:hover {
            text-decoration: underline;
        }

        .operator-info-col {
            flex: 1;
            min-width: 0;
        }

        .callsign-heading {
            font-size: 28px;
            font-weight: 700;
            color: #ffc107;
            font-family: monospace;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .aliases-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .alias-tag {
            font-size: 13px;
            font-family: monospace;
            color: #4a9eff;
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 4px;
            padding: 2px 7px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .alias-tag:hover {
            background: rgba(74, 158, 255, 0.2);
            border-color: rgba(74, 158, 255, 0.6);
        }

        .operator-name {
            font-size: 16px;
            color: #fff;
            margin-bottom: 12px;
        }

        .rx-distance {
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        .rx-distance .rx-val {
            display: block;
            color: #e0e0e0;
        }

        .rx-distance .rx-lbl {
            display: block;
            color: #888;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 5px 14px;
            font-size: 13px;
        }

        .info-label {
            color: #888;
            white-space: nowrap;
            font-weight: 500;
        }

        .info-value {
            color: #e0e0e0;
            word-break: break-word;
        }

        .info-value.callsign-link {
            color: #4a9eff;
            cursor: pointer;
            text-decoration: underline;
        }

        .info-value.callsign-link:hover {
            color: #6ab8ff;
        }

        /* Divider between sections */
        .section-divider {
            grid-column: 1 / -1;
            border: none;
            border-top: 1px solid #333;
            margin: 6px 0;
        }

        /* ── Location map ───────────────────────────────────────────────── */
        .location-map-wrap {
            max-width: 700px;
            margin: 14px auto 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .map-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            background: #222;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #aaa;
            user-select: none;
        }

        .map-toolbar input[type="checkbox"] {
            accent-color: #4a9eff;
            cursor: pointer;
        }

        .map-toolbar label {
            cursor: pointer;
        }

        #location-map {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
        }

        /* Dark tile filter so the map matches the dark UI */
        #location-map .leaflet-tile {
            filter: brightness(0.7) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
        }

        /* Tighten Leaflet popup padding */
        #location-map .leaflet-popup-content {
            margin: 6px 10px;
        }

        /* Responsive: stack on narrow windows */
        @media (max-width: 480px) {
            .operator-card {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <!-- ── Search bar ──────────────────────────────────────────────────── -->
    <div class="search-bar">
        <label for="callsign-input">Callsign:</label>
        <input type="text" id="callsign-input" placeholder="e.g. W1AW" maxlength="20" autocomplete="off" spellcheck="false" />
        <button id="lookup-btn">Go</button>
    </div>

    <!-- ── Result area ─────────────────────────────────────────────────── -->
    <div id="result-area">
        <div class="state-msg" id="idle-msg">Enter a callsign above and press Go.</div>
    </div>

    <!-- ── Photo modal ────────────────────────────────────────────────── -->
    <div id="photo-modal" role="dialog" aria-modal="true">
        <div id="photo-modal-inner">
            <img id="photo-modal-img" src="" alt="Operator photo" />
            <div id="photo-modal-close" title="Close" aria-label="Close">✕</div>
        </div>
    </div>

    <script src="leaflet.js"></script>
    <script>
    (function () {
        'use strict';

        // ── Helpers ──────────────────────────────────────────────────────

        /** Strip /P, /M, /QRP etc. suffixes and prefixes like EA8/ */
        function normalise(raw) {
            const parts = raw.trim().toUpperCase().split('/');
            // Pick the longest segment (usually the base callsign)
            return parts.reduce((a, b) => (b.length > a.length ? b : a), '');
        }

        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── State ────────────────────────────────────────────────────────

        let currentUUID      = null;
        let leafletMap       = null;   // Leaflet map instance (reused across lookups)
        let leafletMarker    = null;   // callsign marker
        let rxMarker         = null;   // receiver marker
        let geodesicLine     = null;   // polyline between receiver and callsign
        let currentSpotLat   = null;   // lat of the currently displayed callsign
        let currentSpotLon   = null;
        let receiverLat      = null;   // from /api/description receiver.gps.lat
        let receiverLon      = null;
        let receiverCallsign = null;   // from /api/description receiver.callsign

        // Read UUID from URL param (passed by the extension when opening the window)
        const urlParams = new URLSearchParams(window.location.search);
        const urlUUID   = urlParams.get('uuid');
        if (urlUUID) currentUUID = urlUUID;

        // Fetch receiver location from /api/description once on load
        fetch('/api/description')
            .then(r => r.ok ? r.json() : null)
            .then(desc => {
                if (desc && desc.receiver) {
                    const rx = desc.receiver;
                    if (rx.gps && rx.gps.lat && rx.gps.lon) {
                        receiverLat = rx.gps.lat;
                        receiverLon = rx.gps.lon;
                    }
                    if (rx.callsign) receiverCallsign = rx.callsign;
                }
            })
            .catch(() => {}); // silently ignore if unavailable

        // ── DOM refs ─────────────────────────────────────────────────────

        const input      = document.getElementById('callsign-input');
        const btn        = document.getElementById('lookup-btn');
        const resultArea = document.getElementById('result-area');

        // ── Lookup ───────────────────────────────────────────────────────

        async function doLookup(callsign) {
            if (!callsign) return;

            const base = normalise(callsign);
            if (!base) return;

            // Update input to show normalised callsign
            input.value = base;

            // Update window title
            document.title = `Lookup: ${base}`;

            // Update URL so the window can be bookmarked / refreshed
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('callsign', base);
            if (currentUUID) newUrl.searchParams.set('uuid', currentUUID);
            history.replaceState(null, '', newUrl.toString());

            // Destroy any existing map before replacing the DOM
            destroyMap();

            // Show loading state
            resultArea.innerHTML = '<div class="state-msg">Looking up <strong>' + esc(base) + '</strong>…</div>';
            btn.disabled = true;

            try {
                if (!currentUUID) {
                    throw new Error('No session UUID available. Please open this page from the main receiver window.');
                }

                const apiUrl = `/api/lookup?callsign=${encodeURIComponent(base)}&uuid=${encodeURIComponent(currentUUID)}`;
                const resp = await fetch(apiUrl);
                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.error || `HTTP ${resp.status}`);
                }

                renderResult(data, base);
            } catch (err) {
                resultArea.innerHTML = `<div class="state-msg error">⚠ ${esc(err.message)}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        // ── Map helpers ──────────────────────────────────────────────────

        function destroyMap() {
            if (leafletMap) {
                leafletMap.remove();
                leafletMap    = null;
                leafletMarker = null;
                rxMarker      = null;
                geodesicLine  = null;
            }
            currentSpotLat = null;
            currentSpotLon = null;
        }

        /**
         * Calculate great-circle distance (km) and initial bearing (°) from
         * receiver to callsign.  Returns null if receiver coords are unknown.
         */
        function calcDistanceBearing(spotLat, spotLon) {
            if (receiverLat === null || receiverLon === null) return null;
            const toRad = d => d * Math.PI / 180;
            const R = 6371;
            const φ1 = toRad(receiverLat), φ2 = toRad(spotLat);
            const Δφ = toRad(spotLat - receiverLat);
            const Δλ = toRad(spotLon - receiverLon);
            const a = Math.sin(Δφ / 2) ** 2 +
                      Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
            const distKm = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const y = Math.sin(toRad(spotLon - receiverLon)) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(toRad(spotLon - receiverLon));
            const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            return { distKm: Math.round(distKm), bearing: Math.round(bearing) };
        }

        /** Build an array of [lat,lon] points approximating a geodesic arc */
        function geodesicPoints(lat1, lon1, lat2, lon2, steps) {
            const toRad = d => d * Math.PI / 180;
            const toDeg = r => r * 180 / Math.PI;
            const φ1 = toRad(lat1), λ1 = toRad(lon1);
            const φ2 = toRad(lat2), λ2 = toRad(lon2);
            const d = 2 * Math.asin(Math.sqrt(
                Math.sin((φ2 - φ1) / 2) ** 2 +
                Math.cos(φ1) * Math.cos(φ2) * Math.sin((λ2 - λ1) / 2) ** 2
            ));
            if (d === 0) return [[lat1, lon1]];
            const pts = [];
            for (let i = 0; i <= steps; i++) {
                const f = i / steps;
                const A = Math.sin((1 - f) * d) / Math.sin(d);
                const B = Math.sin(f * d) / Math.sin(d);
                const x = A * Math.cos(φ1) * Math.cos(λ1) + B * Math.cos(φ2) * Math.cos(λ2);
                const y = A * Math.cos(φ1) * Math.sin(λ1) + B * Math.cos(φ2) * Math.sin(λ2);
                const z = A * Math.sin(φ1) + B * Math.sin(φ2);
                pts.push([toDeg(Math.atan2(z, Math.sqrt(x * x + y * y))),
                          toDeg(Math.atan2(y, x))]);
            }
            return pts;
        }

        function addReceiverOverlay(showReceiver) {
            if (!leafletMap || !currentSpotLat || !currentSpotLon) return;

            // Remove existing overlay layers
            if (rxMarker)     { leafletMap.removeLayer(rxMarker);     rxMarker = null; }
            if (geodesicLine) { leafletMap.removeLayer(geodesicLine); geodesicLine = null; }

            if (!showReceiver || receiverLat === null || receiverLon === null) {
                // Just zoom to the callsign marker
                leafletMap.setView([currentSpotLat, currentSpotLon], 10);
                return;
            }

            // Receiver marker — green dot
            const rxIcon = L.divIcon({
                className: '',
                html: '<div style="width:14px;height:14px;background:#28a745;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(40,167,69,0.8);"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });
            rxMarker = L.marker([receiverLat, receiverLon], { icon: rxIcon })
                .addTo(leafletMap)
                .bindTooltip(receiverCallsign || 'Receiver', { permanent: false, direction: 'top' });

            // Geodesic arc
            const pts = geodesicPoints(receiverLat, receiverLon, currentSpotLat, currentSpotLon, 64);
            geodesicLine = L.polyline(pts, {
                color: '#4a9eff',
                weight: 2,
                opacity: 0.8,
                dashArray: '5, 5'
            }).addTo(leafletMap);

            // Fit both points — paddingTopLeft reserves space for the popup
            // so it is not clipped at the top of the map after fitBounds
            leafletMap.fitBounds(L.latLngBounds(
                [receiverLat, receiverLon],
                [currentSpotLat, currentSpotLon]
            ).pad(0.15), { paddingTopLeft: [0, 60] });
        }

        function initMap(lat, lon, callsign) {
            currentSpotLat = lat;
            currentSpotLon = lon;

            // The map container is injected into the DOM by renderResult before
            // this is called, so the element exists at this point.
            leafletMap = L.map('location-map', {
                center: [lat, lon],
                zoom: 10,
                zoomControl: true,
                attributionControl: false
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18
            }).addTo(leafletMap);

            // Custom dark-styled callsign marker — red dot
            const icon = L.divIcon({
                className: '',
                html: '<div style="width:14px;height:14px;background:#dc3545;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(220,53,69,0.8);"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });

            // Build popup content — always include distance/bearing if receiver is known
            const db = calcDistanceBearing(lat, lon);
            const popupExtra = db
                ? `<br>${db.distKm.toLocaleString()} km &nbsp;|&nbsp; ${db.bearing}°`
                : '';

            leafletMarker = L.marker([lat, lon], { icon })
                .addTo(leafletMap)
                .bindPopup(`<b>${esc(callsign)}</b>${popupExtra}`, {
                    autoPanPaddingTopLeft: L.point(10, 60)
                })
                .openPopup();

            // Wire up the "Show receiver" checkbox
            const cb = document.getElementById('map-show-receiver');
            if (cb) {
                // Apply current checkbox state immediately
                addReceiverOverlay(cb.checked);
                cb.onchange = () => addReceiverOverlay(cb.checked);
            }
        }

        // ── Render ───────────────────────────────────────────────────────

        function renderResult(d, callsign) {
            // Build name string.
            // Prefer name_fmt (QRZ pre-formatted, e.g. 'Michael "Mike" Sauer').
            // Fallback: assemble from fname + "nickname" + name.
            let fullName = '';
            if (d.name_fmt) {
                fullName = d.name_fmt;
            } else {
                const parts = [];
                if (d.fname)    parts.push(d.fname);
                if (d.nickname) parts.push(`"${d.nickname}"`);
                if (d.name)     parts.push(d.name);
                fullName = parts.join(' ');
            }

            // Build address — addr1 (street) and zip are suppressed server-side; country gets its own row
            const addrParts = [d.addr2, d.state].filter(Boolean);
            const address   = addrParts.join(', ');

            // QRZ profile URL
            const qrzUrl = `https://www.qrz.com/db/${encodeURIComponent(callsign)}`;

            // Image URL — fetched directly by the browser from QRZ
            const imageUrl = d.image || '';

            // ── Build info rows ──────────────────────────────────────────
            const rows = [];

            /** Map QRZ "1"/"0" flag strings to human-readable Yes/No */
            const yesNo = (v) => v === '1' ? 'Yes' : v === '0' ? 'No' : v;

            const addRow = (label, value, isCallsign) => {
                if (!value && value !== 0) return;
                const valClass = isCallsign ? 'info-value callsign-link' : 'info-value';
                const valAttr  = isCallsign ? ` data-callsign="${esc(value)}"` : '';
                rows.push(`<span class="info-label">${esc(label)}</span><span class="${valClass}"${valAttr}>${esc(String(value))}</span>`);
            };

            const addDivider = () => rows.push('<hr class="section-divider">');

            // Licence / class
            addRow('Class',    d.class);
            addRow('Licences', d.licences);
            addRow('Expires',  d.expdate);
            addRow('Trustee',  d.trustee, true);

            if (d.addr2 || d.state || d.country) {
                addDivider();
                if (address) addRow('Location', address);
                addRow('Country', d.country);
            }

            if (d.lat && d.lon) {
                addRow('Lat/Lon', `${d.lat}, ${d.lon}`);
            }
            addRow('Grid',     d.grid);
            addRow('County',   d.county);
            addRow('DXCC',     d.dxcc);
            addRow('CQ Zone',  d.cqzone);
            addRow('ITU Zone', d.ituzone);
            addRow('Time Zone',d.timezone);
            addRow('GMT Offset', d.gmtoffset !== undefined && d.gmtoffset !== '' ? d.gmtoffset : null);

            if (d.url || d.qslmgr) {
                addDivider();
                addRow('Website',  d.url);
                addRow('QSL Mgr',  d.qslmgr); // plain text — not a clickable callsign lookup
            }

            if (d.eqsl || d.mqsl || d.lotw) {
                addDivider();
                addRow('eQSL',    yesNo(d.eqsl));
                addRow('Mail QSL', yesNo(d.mqsl));
                addRow('LoTW',    yesNo(d.lotw));
            }

            // ── Assemble card ────────────────────────────────────────────
            const imageHtml = imageUrl
                ? `<img class="operator-image" id="op-img" src="${esc(imageUrl)}" alt="${esc(callsign)}"
                       onerror="this.style.display='none';document.getElementById('op-placeholder').style.display='flex';"
                       onclick="openPhotoModal(this.src)" />`
                  + `<div class="image-placeholder" id="op-placeholder" style="display:none;">📷</div>`
                : `<div class="image-placeholder" id="op-placeholder">📷</div>`;

            // Map placeholder — only injected when lat/lon are present
            const hasLocation = d.lat && d.lon;
            const mapHtml = hasLocation
                ? `<div class="location-map-wrap">
                       <div class="map-toolbar">
                           <input type="checkbox" id="map-show-receiver" checked />
                           <label for="map-show-receiver">Show receiver &amp; draw path</label>
                       </div>
                       <div id="location-map"></div>
                   </div>`
                : '';

            // Distance / bearing from receiver (shown under photo if receiver coords known)
            // We compute eagerly; if receiverLat is still null (description not yet fetched)
            // we fall back to a placeholder that updates when the map is initialised.
            const rxDb = (d.lat && d.lon) ? calcDistanceBearing(d.lat, d.lon) : null;
            const rxDistHtml = (d.lat && d.lon && rxDb)
                ? `<div class="rx-distance" id="rx-dist-display">
                       <span class="rx-lbl">Distance</span>
                       <span class="rx-val">${rxDb.distKm.toLocaleString()} km</span>
                       <span class="rx-lbl">Bearing</span>
                       <span class="rx-val">${rxDb.bearing}°</span>
                   </div>`
                : (d.lat && d.lon
                    ? `<div class="rx-distance" id="rx-dist-display">—</div>`
                    : '');

            // Build aliases row — QRZ returns a comma-separated string
            const aliasCallsigns = d.aliases
                ? d.aliases.split(',').map(s => s.trim()).filter(Boolean)
                : [];

            const aliasesHtml = aliasCallsigns.length
                ? `<div class="aliases-row">${aliasCallsigns.map(a =>
                    `<span class="alias-tag" data-callsign="${esc(a)}">${esc(a)}</span>`
                  ).join('')}</div>`
                : '';

            resultArea.innerHTML = `
                <div class="operator-card">
                    <div class="operator-image-col">
                        ${imageHtml}
                        ${rxDistHtml}
                        <a class="qrz-link" href="${esc(qrzUrl)}" target="_blank" rel="noopener">View on QRZ.com ↗</a>
                    </div>
                    <div class="operator-info-col">
                        <div class="callsign-heading">${esc(callsign)}</div>
                        ${aliasesHtml}
                        ${fullName ? `<div class="operator-name">${esc(fullName)}</div>` : ''}
                        <div class="info-grid">
                            ${rows.join('\n')}
                        </div>
                    </div>
                </div>
                ${mapHtml}
            `;

            // Wire up alias tags to trigger a new lookup
            resultArea.querySelectorAll('.alias-tag').forEach(el => {
                el.addEventListener('click', () => {
                    const cs = el.getAttribute('data-callsign');
                    if (cs) doLookup(cs);
                });
            });

            // Wire up callsign links (trustee) to trigger a new lookup
            resultArea.querySelectorAll('.callsign-link').forEach(el => {
                el.addEventListener('click', () => {
                    const cs = el.getAttribute('data-callsign');
                    if (cs) doLookup(cs);
                });
            });

            // Initialise Leaflet map after DOM is updated
            if (hasLocation) {
                // Use requestAnimationFrame to ensure the map div is laid out
                requestAnimationFrame(() => {
                    initMap(d.lat, d.lon, callsign);
                    // If description hadn't loaded yet when renderResult ran, fill in now
                    const distEl = document.getElementById('rx-dist-display');
                    if (distEl && distEl.textContent.trim() === '—') {
                        const db2 = calcDistanceBearing(d.lat, d.lon);
                        if (db2) distEl.innerHTML =
                            `<span class="rx-lbl">Distance</span>` +
                            `<span class="rx-val">${db2.distKm.toLocaleString()} km</span>` +
                            `<span class="rx-lbl">Bearing</span>` +
                            `<span class="rx-val">${db2.bearing}°</span>`;
                    }
                });
            }
        }

        // ── Photo modal ──────────────────────────────────────────────────

        const photoModal    = document.getElementById('photo-modal');
        const photoModalImg = document.getElementById('photo-modal-img');
        const photoModalClose = document.getElementById('photo-modal-close');

        // Exposed as a plain function so the inline onclick in the img tag can call it.
        window.openPhotoModal = function (src) {
            photoModalImg.src = src;
            photoModal.classList.add('open');
        };

        function closePhotoModal() {
            photoModal.classList.remove('open');
            photoModalImg.src = '';
        }

        photoModalClose.addEventListener('click', closePhotoModal);

        // Click on the backdrop (outside the image) also closes the modal.
        photoModal.addEventListener('click', (e) => {
            if (e.target === photoModal) closePhotoModal();
        });

        // Escape key closes the modal.
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && photoModal.classList.contains('open')) {
                closePhotoModal();
            }
        });

        // ── Event wiring ─────────────────────────────────────────────────

        btn.addEventListener('click', () => {
            doLookup(input.value.trim());
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLookup(input.value.trim());
        });

        input.addEventListener('input', () => {
            input.value = input.value.toUpperCase();
        });

        // ── Auto-lookup from URL params ───────────────────────────────────

        const urlCallsign = urlParams.get('callsign');
        if (urlCallsign) {
            input.value = urlCallsign.toUpperCase();
            // Defer so the page is fully painted first
            setTimeout(() => doLookup(urlCallsign), 50);
        } else {
            // Focus the input so the user can type immediately
            input.focus();
        }

        // ── Cross-window messaging ────────────────────────────────────────
        // The extension can post a message to update the UUID or trigger a lookup
        // without needing to close and reopen the window.
        window.addEventListener('message', (event) => {
            if (!event.data) return;
            if (event.data.type === 'callsign_lookup') {
                if (event.data.uuid) currentUUID = event.data.uuid;
                if (event.data.callsign) {
                    input.value = event.data.callsign.toUpperCase();
                    doLookup(event.data.callsign);
                }
            }
        });

    })();
    </script>
</body>
</html>

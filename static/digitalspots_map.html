<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Spots Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.5em;
            color: #4a9eff;
            margin: 0;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-connected {
            background: #28a745;
            color: white;
        }

        .status-disconnected {
            background: #dc3545;
            color: white;
        }

        .spot-count {
            font-size: 14px;
            color: #aaa;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            color: #aaa;
            font-weight: 500;
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .filter-select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4a9eff;
        }

        .filter-select:focus {
            border-color: #4a9eff;
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2);
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            max-width: 200px;
        }

        .legend h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #4a9eff;
        }

        .distance-legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            min-width: 220px;
        }

        .distance-legend h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #4a9eff;
        }

        .distance-range {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .distance-bar-container {
            flex: 1;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 0 8px;
            overflow: hidden;
        }

        .distance-bar {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #2d7dd2);
            transition: width 0.3s ease;
        }

        .distance-extremes {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
            font-size: 11px;
            color: #aaa;
        }

        .distance-extreme {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .distance-extreme-label {
            font-weight: 500;
            color: #4a9eff;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .legend-receiver {
            width: 16px;
            height: 16px;
            background: #ff0000;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        /* Custom marker styles */
        .custom-marker {
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .receiver-marker {
            background: #ff0000;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📡 Digital Spots Map</h1>
            <span id="status-badge" class="status-badge status-disconnected">Disconnected</span>
            <span id="spot-count" class="spot-count">0 spots</span>
        </div>
        <div class="header-right">
            <div class="filter-group">
                <label class="filter-label" for="mode-filter">Mode:</label>
                <select id="mode-filter" class="filter-select">
                    <option value="all">All Modes</option>
                    <option value="FT8">FT8</option>
                    <option value="FT4">FT4</option>
                    <option value="WSPR">WSPR</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="age-filter">Max Age:</label>
                <select id="age-filter" class="filter-select">
                    <option value="none">None</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="60">1 hour</option>
                    <option value="180">3 hours</option>
                    <option value="360">6 hours</option>
                    <option value="1440">24 hours</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="band-filter">Band:</label>
                <select id="band-filter" class="filter-select">
                    <option value="all">All Bands</option>
                    <option value="2200m">2200m</option>
                    <option value="630m">630m</option>
                    <option value="160m">160m</option>
                    <option value="80m">80m</option>
                    <option value="60m">60m</option>
                    <option value="40m">40m</option>
                    <option value="30m">30m</option>
                    <option value="20m">20m</option>
                    <option value="17m">17m</option>
                    <option value="15m">15m</option>
                    <option value="12m">12m</option>
                    <option value="10m">10m</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="snr-filter">Min SNR:</label>
                <select id="snr-filter" class="filter-select">
                    <option value="none">None</option>
                    <option value="20">+20 dB</option>
                    <option value="10">+10 dB</option>
                    <option value="0">0 dB</option>
                    <option value="-10">-10 dB</option>
                    <option value="-20">-20 dB</option>
                </select>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-receiver"></div>
            <span>Receiver</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4E79A7;"></div>
            <span>160m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #F28E2B;"></div>
            <span>80m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #E15759;"></div>
            <span>60m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #76B7B2;"></div>
            <span>40m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #59A14F;"></div>
            <span>30m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #EDC948;"></div>
            <span>20m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #B07AA1;"></div>
            <span>17m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #FF9DA7;"></div>
            <span>15m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #9C755F;"></div>
            <span>12m</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #BAB0AC;"></div>
            <span>10m</span>
        </div>
    </div>

    <div class="distance-legend">
        <div id="distance-ranges"></div>
        <div class="distance-extremes" style="border-top: none; padding-top: 0; margin-top: 0;">
            <div class="distance-extreme">
                <span class="distance-extreme-label">Closest:</span>
                <span id="closest-spot">-</span>
            </div>
            <div class="distance-extreme">
                <span class="distance-extreme-label">Farthest:</span>
                <span id="farthest-spot">-</span>
            </div>
        </div>
        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; display: flex; gap: 20px;">
            <div id="top-countries" style="flex: 1;"></div>
            <div id="top-bands" style="flex: 1;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="digitalspots_map.js"></script>
</body>
</html>

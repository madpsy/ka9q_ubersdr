<div class="morse-container">
    <!-- Header -->
    <div class="morse-header">
        <h3>⚡ CW Decoder</h3>
        <div class="morse-stats" id="morse-stats">
            <span class="morse-stat" id="morse-pitch-stat">
                <span class="morse-stat-label">Pitch</span>
                <span class="morse-stat-value" id="morse-pitch-value">---</span>
                <span class="morse-stat-unit">Hz</span>
            </span>
            <span class="morse-stat" id="morse-speed-stat">
                <span class="morse-stat-label">Speed</span>
                <span class="morse-stat-value" id="morse-speed-value">---</span>
                <span class="morse-stat-unit">WPM</span>
            </span>
            <span class="morse-stat" id="morse-conf-stat">
                <span class="morse-stat-label">Quality</span>
                <span class="morse-stat-value morse-conf-value" id="morse-conf-value">---</span>
            </span>
        </div>
        <div class="morse-header-controls">
            <label class="morse-quality-label" for="morse-min-quality">Min quality</label>
            <select id="morse-min-quality" class="morse-quality-select">
                <option value="all">All</option>
                <option value="low">Low+</option>
                <option value="medium">Medium+</option>
                <option value="high">High</option>
            </select>
            <button id="morse-start-btn" class="btn btn-primary">Start</button>
            <button id="morse-clear-btn" class="btn btn-secondary">Clear</button>
            <button id="morse-copy-btn" class="btn btn-secondary">Copy</button>
        </div>
    </div>

    <!-- Decoded text output -->
    <div class="morse-output-area" id="morse-output-area">
        <div class="morse-output-text" id="morse-output-text"></div>
    </div>

    <!-- Status bar -->
    <div class="morse-status-bar">
        <span id="morse-status-text" class="morse-status-text">Ready — press Start to begin decoding</span>
    </div>
</div>

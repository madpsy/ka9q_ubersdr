<div class="whisper-container">

    <!-- Status Bar -->
    <div class="whisper-status-bar">
        <div class="whisper-status-left">
            <span class="whisper-status-label">Status:</span>
            <span id="whisper-status" class="whisper-status-value">Idle</span>
        </div>
        <div class="whisper-status-right">
            <span class="whisper-status-label">Server:</span>
            <span id="whisper-server-status" class="whisper-status-value">Not connected</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="whisper-controls">
        <div class="whisper-control-group">
            <label>
                <input type="checkbox" id="whisper-auto-scroll" checked>
                Auto-scroll
            </label>
        </div>
        <div class="whisper-control-group">
            <label>
                <input type="checkbox" id="whisper-show-timestamps">
                Show timestamps
            </label>
        </div>
        <div class="whisper-control-group">
            <label>
                <input type="checkbox" id="whisper-show-only-incomplete" checked>
                Only show in-progress
            </label>
        </div>
        <div class="whisper-control-group">
            <label>
                <input type="checkbox" id="whisper-hide-incomplete">
                Hide in-progress
            </label>
        </div>
        <div class="whisper-control-group">
            <label>
                Line limit:
                <select id="whisper-line-limit">
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="250">250</option>
                    <option value="unlimited">Unlimited</option>
                </select>
            </label>
        </div>
        <div class="whisper-control-group">
            <label>
                <input type="checkbox" id="whisper-show-floating-window">
                Show modal
            </label>
        </div>
        <div class="whisper-control-group">
            <button id="whisper-start-button" class="whisper-button whisper-button-primary">Start</button>
            <button id="whisper-stop-button" class="whisper-button whisper-button-danger" disabled>Stop</button>
            <button id="whisper-clear-button" class="whisper-button">Clear</button>
        </div>
        <div class="whisper-control-group whisper-last-update">
            <span id="whisper-last-update" class="whisper-last-update-text">--</span>
        </div>
    </div>

    <!-- Transcription Display -->
    <div class="whisper-transcription-container">
        <div class="whisper-transcription-header">
            <div class="whisper-transcription-title">
                <span>Transcription</span>
                <span id="whisper-detected-language" class="whisper-detected-language" style="display: none;"></span>
            </div>
            <div class="whisper-transcription-actions">
                <button id="whisper-tts-toggle" class="whisper-button-small whisper-tts-button" title="Toggle text-to-speech">🔇 TTS</button>
                <select id="whisper-tts-voice" class="whisper-tts-voice-select" title="Select TTS voice" style="display: none;">
                    <option value="">Default Voice</option>
                </select>
                <input type="range" id="whisper-tts-rate" class="whisper-tts-rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" title="Speech rate" style="display: none;">
                <span id="whisper-tts-rate-value" class="whisper-tts-rate-value" style="display: none;">1.0x</span>
                <label class="whisper-tts-mute-sdr-label" style="display: none;">
                    <input type="checkbox" id="whisper-tts-mute-sdr" checked>
                    <span class="whisper-tts-mute-sdr-text">Mute SDR</span>
                </label>
                <span class="whisper-actions-separator"></span>
                <button id="whisper-text-smaller" class="whisper-button-small" title="Decrease text size">Text−</button>
                <button id="whisper-text-larger" class="whisper-button-small" title="Increase text size">Text+</button>
                <button id="whisper-copy-button" class="whisper-button-small" title="Copy to clipboard">📋 Copy</button>
                <button id="whisper-save-button" class="whisper-button-small" title="Save to file">💾 Save</button>
            </div>
        </div>
        <div id="whisper-transcription" class="whisper-transcription"></div>
    </div>

    <!-- Help Section -->
    <div class="whisper-help">
        <div class="whisper-help-text">
            <strong>Speech-to-Text Decoder</strong><br>
            Real-time transcription. Tune to a voice frequency, click Start, and watch the transcription appear.
            Model and language are configured server-side.
        </div>
    </div>
</div>

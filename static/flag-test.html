<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="fonts/fonts.css">
    <title>Flag Emoji Test</title>
    <style>
        body { font-family: 'Twemoji Flags', 'Segoe UI', sans-serif; font-size: 32px; padding: 20px; }
        .row { margin: 10px 0; }
        .label { font-size: 14px; color: #666; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="label">If flags show as coloured images (not two letters), the font is working:</div>
    <div class="row">🇬🇧 🇺🇸 🇩🇪 🇫🇷 🇯🇵 🇦🇺 🇨🇦 🇧🇷 🇮🇳 🇨🇳</div>
    <div class="label">Generated via JS (same as the app):</div>
    <div class="row" id="js-flags"></div>
    <div class="label">Font stack on body:</div>
    <div class="row" id="font-info" style="font-size:14px;color:#333;font-family:monospace"></div>
    <script>
        function iso2ToFlag(code) {
            if (!code || code.length !== 2) return '';
            var c = code.toUpperCase();
            var base = 0x1F1E6 - 0x41;
            try { return String.fromCodePoint(base + c.charCodeAt(0), base + c.charCodeAt(1)); }
            catch (e) { return ''; }
        }
        var codes = ['GB','US','DE','FR','JP','AU','CA','BR','IN','CN','ZA','NG','EG','AR','MX'];
        document.getElementById('js-flags').textContent = codes.map(iso2ToFlag).join(' ');
        document.getElementById('font-info').textContent = 'body font-family: ' + getComputedStyle(document.body).fontFamily;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Map</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, 'Twemoji Flags', sans-serif;
            background: #1a1a1a;
            color: #ecf0f1;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #444;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header .hint {
            font-size: 12px;
            color: #95a5a6;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .controls input[type="text"] {
            background: #1a1a1a;
            border: 1px solid #445;
            border-radius: 3px;
            color: #ecf0f1;
            font-family: inherit;
            font-size: 12px;
            padding: 5px 8px;
            width: 190px;
        }

        .controls input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .controls button {
            background: #3498db;
            border: none;
            border-radius: 3px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            padding: 6px 10px;
        }

        .controls button:hover {
            background: #2980b9;
        }

        .controls label {
            font-size: 12px;
            color: #bdc3c7;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Maidenhead grid overlay.  Labels sit on whatever tile happens to be
           underneath — light desert, dark sea, busy city — so they carry their
           own background rather than relying on a text shadow for contrast. */
        .grid-label {
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1;
            color: #eaf6ff;
            background: rgba(20, 28, 38, 0.78);
            border: 1px solid rgba(52, 152, 219, 0.55);
            border-radius: 3px;
            white-space: nowrap;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .header .hint { display: none; }
        }

        .status {
            font-size: 12px;
            color: #95a5a6;
            white-space: nowrap;
        }

        .status.error {
            color: #e74c3c;
        }

        #map {
            width: 100%;
            height: calc(100vh - 51px);
        }

        .leaflet-container {
            background: #1a1a1a;
        }

        .leaflet-popup-content-wrapper,
        .leaflet-popup-tip {
            background: #2c3e50;
            color: #ecf0f1;
        }

        .leaflet-popup-content {
            margin: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Tooltips are flag + name, so they need the flag font too */
        .leaflet-tooltip {
            font-family: 'Twemoji Flags', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #2c3e50;
            color: #ecf0f1;
            border: 1px solid #445;
            font-size: 13px;
        }

        .leaflet-tooltip-left::before {
            border-left-color: #2c3e50;
        }

        .leaflet-tooltip-right::before {
            border-right-color: #2c3e50;
        }

        /* Flag markers.  Setting a className on a divIcon replaces Leaflet's
           default .leaflet-div-icon, so there is no white box to undo. */
        .flag-marker {
            font-family: 'Twemoji Flags', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 18px;
            line-height: 1;
            text-align: center;
            /* Keeps flags legible against both light land and dark sea tiles */
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.9));
            cursor: pointer;
        }

        /* The click pin — tinted and ringed so it stands out from the 258
           country flags it sits among */
        .flag-marker.click-marker {
            filter: drop-shadow(0 0 3px #3498db) drop-shadow(0 0 2px rgba(0, 0, 0, 0.9));
        }

        .flag-marker.click-marker.no-flag::before {
            background: #3498db;
        }

        /* Fallback for features with no ISO alpha-2 code (e.g. Akrotiri) */
        .flag-marker.no-flag::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            margin: 5px auto;
            border-radius: 50%;
            background: #f39c12;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.9);
        }

        .popup-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .popup-row {
            color: #bdc3c7;
        }

        .popup-row .label {
            color: #7f8c8d;
            display: inline-block;
            min-width: 74px;
        }

        .popup-method {
            margin-top: 6px;
            font-size: 11px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Country Map</h1>
        <span class="hint">Click the map to identify a point · or look up a locator / coordinates</span>
        <div class="controls">
            <input type="text" id="search" placeholder="Locator or lat, lon" title="Maidenhead locator (4/6/8 chars, e.g. IO86ha) or coordinates (e.g. 56.02, -3.375)" autocomplete="off" spellcheck="false">
            <button id="searchBtn" type="button">Look up</button>
            <label><input type="checkbox" id="gridToggle"> Grid</label>
            <span class="status" id="status">Loading…</span>
        </div>
    </div>
    <div id="map"></div>

    <script src="leaflet.js"></script>
    <script>
        const COUNTRY_API = '/api/maidenhead/country';

        let map = null;
        let clickMarker = null;
        let searchLayer = null;   // marker + grid square rectangle for a lookup
        let gridLayer = null;     // Maidenhead grid overlay, off until asked for

        // A locator the server will accept: 4, 6 or 8 characters
        const LOCATOR_RE = /^[A-R]{2}[0-9]{2}(?:[A-X]{2}(?:[0-9]{2})?)?$/i;
        // "lat, lon" or "lat lon", decimal degrees
        const LATLON_RE = /^(-?\d+(?:\.\d+)?)\s*[,\s]\s*(-?\d+(?:\.\d+)?)$/;

        // Size of one grid cell at each precision, in degrees [lon, lat]
        const GRID_LEVELS = [
            [20, 10],           // field       — AA
            [2, 1],             // square      — AA00
            [2 / 24, 1 / 24],   // subsquare   — AA00aa
            [2 / 240, 1 / 240]  // extended    — AA00aa00
        ];

        function normLon(lon) {
            return ((lon + 180) % 360 + 360) % 360 - 180;
        }

        // Locator covering a point.  chars is 4, 6 or 8; subsquare letters are
        // lowercase by convention (the server upper-cases either way).
        function latLonToLocator(lat, lon, chars) {
            chars = chars || 6;
            let x = normLon(lon) + 180;
            let y = Math.min(Math.max(lat, -90), 90) + 90;
            // Keep the poles/dateline inside the last cell rather than one past it
            x = Math.min(x, 359.999999);
            y = Math.min(y, 179.999999);

            const A = 'A'.charCodeAt(0);
            let loc = String.fromCharCode(A + Math.floor(x / 20)) +
                      String.fromCharCode(A + Math.floor(y / 10));
            x %= 20; y %= 10;
            if (chars >= 4) {
                loc += Math.floor(x / 2) + '' + Math.floor(y / 1);
                x %= 2; y %= 1;
            }
            if (chars >= 6) {
                loc += String.fromCharCode(A + 32 + Math.floor(x / (2 / 24))) +
                       String.fromCharCode(A + 32 + Math.floor(y / (1 / 24)));
                x %= (2 / 24); y %= (1 / 24);
            }
            if (chars >= 8) {
                loc += Math.floor(x / (2 / 240)) + '' + Math.floor(y / (1 / 240));
            }
            return loc;
        }


        // Convert an ISO 3166-1 alpha-2 code to its flag emoji (regional indicator pair)
        function countryCodeToFlag(countryCode) {
            if (!countryCode || countryCode.length !== 2) return '';
            const codePoints = countryCode
                .toUpperCase()
                .split('')
                .map(char => 127397 + char.charCodeAt());
            return String.fromCodePoint(...codePoints);
        }

        // Build a marker icon showing the flag itself.  Leaflet's default marker
        // needs images/marker-icon.png and images/marker-shadow.png, which this
        // install does not ship — using a divIcon everywhere avoids the 404s.
        function flagIcon(flag, extraClass) {
            const classes = ['flag-marker'];
            if (!flag) classes.push('no-flag');
            if (extraClass) classes.push(extraClass);
            return L.divIcon({
                className: classes.join(' '),
                html: flag || '',
                iconSize: [22, 18],
                iconAnchor: [11, 9]
            });
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str == null ? '' : String(str);
            return div.innerHTML;
        }

        function setStatus(text, isError) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = isError ? 'status error' : 'status';
        }

        function initMap() {
            map = L.map('map', { worldCopyJump: true }).setView([25, 0], 2);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);

            map.on('click', onMapClick);

            document.getElementById('searchBtn').addEventListener('click', doSearch);
            document.getElementById('search').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') doSearch();
            });
            document.getElementById('gridToggle').addEventListener('change', function (e) {
                if (e.target.checked) {
                    gridLayer = L.layerGroup().addTo(map);
                    map.on('moveend zoomend', drawGrid);
                    drawGrid();
                } else {
                    map.off('moveend zoomend', drawGrid);
                    if (gridLayer) map.removeLayer(gridLayer);
                    gridLayer = null;
                }
            });
        }

        // ---- Maidenhead grid overlay -------------------------------------------------

        // Which precision to draw at this zoom.  Each step is a 10× finer cell, so
        // the thresholds keep cells at a usable size on screen rather than a mesh.
        function gridLevelForZoom(zoom) {
            if (zoom < 4) return 0;   // fields
            if (zoom < 8) return 1;   // squares
            if (zoom < 13) return 2;  // subsquares
            return 3;                 // extended squares
        }

        function drawGrid() {
            if (!gridLayer) return;
            gridLayer.clearLayers();

            const level = gridLevelForZoom(map.getZoom());
            const lonSize = GRID_LEVELS[level][0];
            const latSize = GRID_LEVELS[level][1];
            const chars = [2, 4, 6, 8][level];

            const b = map.getBounds();
            const south = Math.max(-90, b.getSouth());
            const north = Math.min(90, b.getNorth());
            // worldCopyJump lets the view run past ±180; draw at most one extra
            // world either side so panning never turns into an unbounded loop
            const west = Math.max(-540, b.getWest());
            const east = Math.min(540, b.getEast());

            const lon0 = Math.floor((west + 180) / lonSize) * lonSize - 180;
            const lat0 = Math.floor((south + 90) / latSize) * latSize - 90;

            const nLon = Math.ceil((east - lon0) / lonSize) + 1;
            const nLat = Math.ceil((north - lat0) / latSize) + 1;
            if (nLon > 400 || nLat > 400) return; // nothing legible to draw

            const style = { color: '#5dade2', weight: 1, opacity: 0.5, interactive: false };
            for (let i = 0; i <= nLon; i++) {
                const lon = lon0 + i * lonSize;
                gridLayer.addLayer(L.polyline([[south, lon], [north, lon]], style));
            }
            for (let j = 0; j <= nLat; j++) {
                const lat = lat0 + j * latSize;
                if (lat < -90 || lat > 90) continue;
                gridLayer.addLayer(L.polyline([[lat, west], [lat, east]], style));
            }

            // Label size: monospace 11px is ~7px per character, plus the padding
            // and border the badge draws around it
            const labelW = chars * 7 + 10;
            const labelH = 17;

            // Only label when the badge fits inside the cell with room to spare —
            // otherwise the labels collide and the grid becomes unreadable
            const cellPx = map.project([lat0, lon0 + lonSize]).x - map.project([lat0, lon0]).x;
            if (cellPx < labelW + 8) return;

            for (let i = 0; i < nLon; i++) {
                for (let j = 0; j < nLat; j++) {
                    const lon = lon0 + (i + 0.5) * lonSize;
                    const lat = lat0 + (j + 0.5) * latSize;
                    if (lat < -90 || lat > 90) continue;
                    gridLayer.addLayer(L.marker([lat, lon], {
                        interactive: false,
                        icon: L.divIcon({
                            className: 'grid-label',
                            html: latLonToLocator(lat, lon, chars),
                            iconSize: [labelW, labelH],
                            iconAnchor: [labelW / 2, labelH / 2]
                        })
                    }));
                }
            }
        }

        // ---- Search ------------------------------------------------------------------

        // Accepts a Maidenhead locator (4/6/8 chars) or a "lat, lon" pair — both of
        // which the endpoint understands — and shows the answer on the map.
        async function doSearch() {
            const raw = document.getElementById('search').value.trim();
            if (!raw) return;

            let body;
            const latlon = raw.match(LATLON_RE);

            if (LOCATOR_RE.test(raw)) {
                body = { locator: raw, nearest_land: false };
            } else if (latlon) {
                const lat = parseFloat(latlon[1]), lon = parseFloat(latlon[2]);
                if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
                    setStatus('Latitude must be -90..90 and longitude -180..180', true);
                    return;
                }
                body = { lat: lat, lon: lon, nearest_land: false };
            } else {
                setStatus('Enter a locator (IO86ha) or coordinates (56.02, -3.375)', true);
                return;
            }

            setStatus('Looking up…');

            let resp;
            try {
                resp = await fetch(COUNTRY_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            } catch (err) {
                setStatus('Lookup failed: ' + err.message, true);
                return;
            }

            if (resp.status === 429) {
                setStatus('Too fast — one lookup per second. Try again.', true);
                return;
            }
            if (!resp.ok) {
                let msg = 'HTTP ' + resp.status;
                try {
                    const errBody = await resp.json();
                    if (errBody.error) msg = errBody.error;
                } catch (e) { /* non-JSON error body */ }
                setStatus('Lookup failed: ' + msg, true);
                return;
            }

            showSearchResult(await resp.json());
        }

        function showSearchResult(r) {
            // A locator lookup answers with the square's bounds; a coordinate
            // lookup collapses them onto the point itself, so there is nothing
            // to outline.
            const bounds = r.locator
                ? { minLat: r.grid_min_lat, minLon: r.grid_min_lon,
                    maxLat: r.grid_max_lat, maxLon: r.grid_max_lon }
                : null;

            if (searchLayer) map.removeLayer(searchLayer);
            searchLayer = L.layerGroup().addTo(map);

            const pin = r.method === 'open_water' ? '🌊' : countryCodeToFlag(r.iso_a2);
            const marker = L.marker([r.lat, r.lon], { icon: flagIcon(pin, 'click-marker') })
                .bindPopup(renderPopup(r, r.lat, r.lon));
            searchLayer.addLayer(marker);

            if (bounds) {
                searchLayer.addLayer(L.rectangle(
                    [[bounds.minLat, bounds.minLon], [bounds.maxLat, bounds.maxLon]],
                    { color: '#3498db', weight: 2, fillOpacity: 0.08, interactive: false }
                ));
                map.fitBounds([[bounds.minLat, bounds.minLon], [bounds.maxLat, bounds.maxLon]], {
                    padding: [60, 60], maxZoom: 10
                });
            } else {
                map.setView([r.lat, r.lon], Math.max(map.getZoom(), 6));
            }

            marker.openPopup();
            setStatus(r.method === 'open_water'
                ? 'Open water'
                : (r.country || 'Unknown') + ' — ' + latLonToLocator(r.lat, r.lon, 6));
        }

        // Load every country's centre point from the GET endpoint.  The payload is
        // precomputed server-side and cached for a day, so this is a single request.
        async function loadCountries() {
            let resp;
            try {
                resp = await fetch(COUNTRY_API);
            } catch (err) {
                setStatus('Country list unavailable: ' + err.message, true);
                return;
            }

            if (!resp.ok) {
                let msg = 'HTTP ' + resp.status;
                try {
                    const body = await resp.json();
                    if (body.error) msg = body.error;
                } catch (e) { /* non-JSON error body */ }
                setStatus('Country list unavailable: ' + msg, true);
                return;
            }

            const data = await resp.json();
            const countries = data.countries || [];

            for (const c of countries) {
                const flag = countryCodeToFlag(c.iso_a2);
                const label = (flag ? flag + ' ' : '') + c.country;

                // Leaflet stops marker clicks from reaching the map, so a flag
                // click answers from the data we already have — no POST, and no
                // spending the caller's one-per-second budget.
                L.marker([c.lat, c.lon], { icon: flagIcon(flag), title: c.country })
                    .bindTooltip(label, { direction: 'top', offset: [0, -10] })
                    .bindPopup(renderPopup(c, c.lat, c.lon))
                    .addTo(map);
            }

            setStatus(countries.length + ' countries');
        }

        // Identify whatever was clicked via the POST endpoint (point-in-polygon,
        // falling back to nearest land for ocean clicks).
        async function onMapClick(e) {
            // Normalise longitude — worldCopyJump lets the user pan past ±180
            const lat = e.latlng.lat;
            const lon = ((e.latlng.lng + 180) % 360 + 360) % 360 - 180;

            if (clickMarker) {
                map.removeLayer(clickMarker);
            }
            // Starts as a plain dot; becomes the country's flag once we know it
            clickMarker = L.marker([lat, e.latlng.lng], {
                icon: flagIcon('', 'click-marker')
            }).addTo(map);
            clickMarker.bindPopup('Looking up…').openPopup();

            let resp;
            try {
                resp = await fetch(COUNTRY_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // nearest_land:false — on a map, a click in the ocean should
                    // say "open water", not name the nearest coastline
                    body: JSON.stringify({ lat: lat, lon: lon, nearest_land: false })
                });
            } catch (err) {
                clickMarker.setPopupContent('Lookup failed: ' + esc(err.message));
                return;
            }

            // The endpoint allows 1 request per second per IP — clicking faster
            // than that is expected, so say so rather than showing a raw error.
            if (resp.status === 429) {
                clickMarker.setPopupContent('Too fast — one lookup per second. Click again.');
                return;
            }

            if (!resp.ok) {
                let msg = 'HTTP ' + resp.status;
                try {
                    const body = await resp.json();
                    if (body.error) msg = body.error;
                } catch (err) { /* non-JSON error body */ }
                clickMarker.setPopupContent('Lookup failed: ' + esc(msg));
                return;
            }

            const r = await resp.json();
            const pin = r.method === 'open_water' ? '🌊' : countryCodeToFlag(r.iso_a2);
            clickMarker.setIcon(flagIcon(pin, 'click-marker'));
            clickMarker.setPopupContent(renderPopup(r, lat, lon));
        }

        function renderPopup(r, lat, lon) {
            if (r.method === 'open_water') {
                return '<div class="popup-title">🌊 Open water</div>' +
                    '<div class="popup-row">No country at this point</div>' +
                    '<div class="popup-row"><span class="label">Position</span>' +
                    lat.toFixed(4) + ', ' + lon.toFixed(4) + '</div>' +
                    '<div class="popup-row"><span class="label">Locator</span>' +
                    esc(r.locator || latLonToLocator(lat, lon, 8)) + '</div>';
            }

            const flag = countryCodeToFlag(r.iso_a2);
            const iso = [r.iso_a2, r.iso_a3].filter(Boolean).join(' / ');

            let html = '<div class="popup-title">' +
                (flag ? flag + ' ' : '') + esc(r.country || 'Unknown') + '</div>';

            if (r.country_long && r.country_long !== r.country) {
                html += '<div class="popup-row">' + esc(r.country_long) + '</div>';
            }
            if (iso) {
                html += '<div class="popup-row"><span class="label">ISO</span>' + esc(iso) + '</div>';
            }
            if (r.continent) {
                const cont = r.continent_code ? r.continent + ' (' + r.continent_code + ')' : r.continent;
                html += '<div class="popup-row"><span class="label">Continent</span>' + esc(cont) + '</div>';
            }
            if (r.subregion) {
                html += '<div class="popup-row"><span class="label">Subregion</span>' + esc(r.subregion) + '</div>';
            }
            if (r.sovereign && r.sovereign !== r.country) {
                html += '<div class="popup-row"><span class="label">Sovereign</span>' + esc(r.sovereign) + '</div>';
            }
            // Country markers carry no method — their coordinates are the centre
            const posLabel = r.method ? 'Position' : 'Centre';
            html += '<div class="popup-row"><span class="label">' + posLabel + '</span>' +
                lat.toFixed(4) + ', ' + lon.toFixed(4) + '</div>';
            html += '<div class="popup-row"><span class="label">Locator</span>' +
                esc(r.locator || latLonToLocator(lat, lon, 8)) + '</div>';

            if (r.method) {
                let note = r.method;
                if (r.method === 'nearest_land') {
                    note += ' — the click was over water';
                }
                html += '<div class="popup-method">method: ' + esc(note) + '</div>';
            }
            return html;
        }

        initMap();
        loadCountries();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Floor Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        select, button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        select {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
        }

        .status.error {
            background: rgba(244, 67, 54, 0.3);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 5px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metric:last-child {
            border-bottom: none;
        }

        .card.compact-view .metric {
            display: none;
        }

        .metric-label {
            opacity: 0.8;
        }

        .metric-value {
            font-weight: bold;
            font-size: 1.1em;
        }

        .noise-floor {
            color: #4CAF50;
        }

        .signal-peak {
            color: #FF9800;
        }

        .dynamic-range {
            color: #2196F3;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-container h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📡 Noise Floor Monitor</h1>
            <p class="subtitle">Real-time noise floor tracking across amateur radio bands</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="dateSelect">Select Date:</label>
                <select id="dateSelect">
                    <option value="live">Live Data</option>
                </select>
            </div>
            <div class="control-group">
                <label for="bandSelect">Select Band:</label>
                <select id="bandSelect">
                    <option value="all">All Bands</option>
                </select>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <button id="refreshBtn">🔄 Refresh</button>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <button id="allBandsBtn">📻 All Bands</button>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <button id="viewToggleBtn">📊 Compact View</button>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <div class="status" id="status">Ready</div>
            </div>
        </div>

        <div id="liveData">
            <h2 style="margin-bottom: 20px; font-size: 1.8em;">📊 Current Conditions</h2>
            <div class="dashboard" id="dashboard">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading noise floor data...</p>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <h2>📈 Noise Floor Trends (24 Hours)</h2>
            <canvas id="trendChart"></canvas>
            <div class="legend" id="legend"></div>
        </div>

        <div class="chart-container">
            <h2>📊 Dynamic Range Trends (24 Hours)</h2>
            <canvas id="dynamicRangeChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="noisefloor.js"></script>
</body>
</html>

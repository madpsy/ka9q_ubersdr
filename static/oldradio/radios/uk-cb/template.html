<div class="radio-body">
    <div class="radio-header">
        <div class="radio-brand">{{brand}}</div>
        <div class="radio-model">{{model}}</div>
    </div>
    
    <div class="cb-main-body">
        <!-- Left: Display Section -->
        <div class="cb-display">
            <div class="display-screen">
                <button class="band-toggle" id="band-toggle" title="Toggle UK / EU / US band">UK</button>
                <button class="mode-toggle" id="mode-toggle" title="Toggle FM / AM / LSB / USB mode">FM</button>
                <div class="channel-display">
                    <span class="channel-label">CH</span>
                    <span class="channel-number" id="channel-number">19</span>
                </div>
                <div class="frequency-display-cb">
                    <span class="frequency-value-cb" id="frequency-value">27.78125</span>
                    <span class="unit-cb">MHz</span>
                </div>
                <div class="signal-bars">
                    <div class="signal-bar" id="signal-bar-1"></div>
                    <div class="signal-bar" id="signal-bar-2"></div>
                    <div class="signal-bar" id="signal-bar-3"></div>
                    <div class="signal-bar" id="signal-bar-4"></div>
                    <div class="signal-bar" id="signal-bar-5"></div>
                    <div class="signal-bar" id="signal-bar-6"></div>
                    <div class="signal-bar" id="signal-bar-7"></div>
                    <div class="signal-bar" id="signal-bar-8"></div>
                </div>
            </div>
        </div>

        <!-- Center: Speaker / Visualiser -->
        <div class="speaker-grille" id="speaker-grille">
            <div class="grille-pattern" id="grille-pattern"></div>
            <canvas id="visualiser-canvas"></canvas>
        </div>

        <!-- Right: Controls Section -->
        <div class="cb-controls">
            <div class="channel-selector">
                <button class="channel-btn" id="channel-down">
                    <span>▼</span>
                    <span class="btn-label">CHANNEL</span>
                </button>
                <button class="channel-btn scan-btn" id="channel-scan">
                    <span>⟳</span>
                    <span class="btn-label">SCAN</span>
                </button>
                <button class="channel-btn" id="channel-up">
                    <span>▲</span>
                    <span class="btn-label">CHANNEL</span>
                </button>
            </div>

            <div class="knobs-container">
                <div class="volume-control-cb">
                    <div class="volume-label">VOLUME</div>
                    <div class="knob" id="volume-knob">
                        <div class="knob-pointer"></div>
                    </div>
                </div>

                <div class="squelch-control">
                    <div class="squelch-label">SQUELCH</div>
                    <div class="knob" id="squelch-knob">
                        <div class="knob-pointer"></div>
                    </div>
                </div>

                <div class="tune-control">
                    <div class="tune-label" id="tune-label" title="Fine tune — 100 Hz per click, double-click to centre">TUNE</div>
                    <div class="knob" id="tune-knob" title="Fine tune — 100 Hz per click, double-click to centre">
                        <div class="knob-pointer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wideband Spectrogram 0-30 MHz</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);color:#fff;min-height:100vh;padding:20px}
.container{max-width:1500px;margin:0 auto}
header{text-align:center;margin-bottom:20px}
h1{font-size:1.9em;margin-bottom:5px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.subtitle{font-size:.95em;opacity:.8}
.controls{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.controls label{font-size:.88em;opacity:.85;margin-right:4px}
select,button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 11px;font-size:.88em;cursor:pointer}
select option{background:#1e3c72;color:#fff}
button:hover:not(:disabled){background:rgba(255,255,255,.25)}
button:disabled{opacity:.3;cursor:not-allowed}
/* Contrast sliders */
.contrast-wrap{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.contrast-wrap label{white-space:nowrap}
input[type=range].cslider{-webkit-appearance:none;appearance:none;width:110px;height:4px;border-radius:2px;background:rgba(255,255,255,.3);outline:none;cursor:pointer;border:none;padding:0}
input[type=range].cslider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#7df;cursor:pointer}
input[type=range].cslider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#7df;cursor:pointer;border:none}
.cval{font-size:.8em;opacity:.75;min-width:38px;text-align:right}
.status{margin-left:auto;font-size:.78em;opacity:.7;white-space:nowrap}
/* Layout: time axis left, spectrogram right */
.sg-wrap{display:flex;gap:0;user-select:none}
/* Time axis */
#time-axis{width:46px;flex-shrink:0;position:relative;padding-top:0}
.t-label{position:absolute;font-size:.68em;opacity:.75;right:5px;transform:translateY(-50%);white-space:nowrap}
/* Right side — clips zoomed content */
.sg-right{flex:1;min-width:0;overflow:hidden;position:relative}
/* Frequency axis */
#freq-axis{position:relative;height:32px;overflow:visible}
.f-label{position:absolute;font-size:.68em;opacity:.75;transform:translateX(-50%);white-space:nowrap;top:4px}
.f-notch{position:absolute;bottom:0;width:1px;height:8px;background:rgba(255,255,255,.5);transform:translateX(-50%)}
/* Canvas area */
.sg-canvas-wrap{position:relative;width:100%;cursor:crosshair;background:#000;border-radius:0 0 6px 6px}
#img-canvas{display:block;width:100%;height:auto;image-rendering:pixelated}
#overlay-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
/* Legend */
.legend{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.78em;opacity:.8;padding-left:46px}
#legend-canvas{width:200px;height:13px;border-radius:3px}
/* Tooltip */
#tt{position:fixed;background:rgba(8,18,38,.93);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:8px;padding:8px 12px;font-size:.8em;pointer-events:none;display:none;z-index:200;white-space:nowrap;line-height:1.85;box-shadow:0 4px 18px rgba(0,0,0,.45);min-width:175px}
.tt-freq{font-size:1.05em;font-weight:600;color:#7df}
.tt-time{opacity:.82}
.tt-sep{border-top:1px solid rgba(255,255,255,.14);margin:4px 0}
.tt-row{display:flex;justify-content:space-between;gap:14px}
.tt-lbl{opacity:.65}
.tt-val{font-weight:500}
.tt-nd{opacity:.45;font-style:italic}
/* Error / loading */
.error{background:rgba(255,80,80,.2);border:1px solid rgba(255,80,80,.4);border-radius:8px;padding:14px;text-align:center;margin-top:16px}
.loading{text-align:center;padding:40px;opacity:.7;font-size:1.05em}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>&#x1F4E1; Wideband Spectrogram</h1>
  <p class="subtitle" id="subtitle">0 &ndash; 30 MHz &middot; one row per minute &middot; viridis palette</p>
</header>

<div class="controls">
  <button id="prev-btn" onclick="navDate(-1)" title="Previous day (older)" disabled>&#x25C4;</button>
  <div><label for="dsel">Date (UTC):</label><select id="dsel"></select></div>
  <button id="next-btn" onclick="navDate(+1)" title="Next day (newer)" disabled>&#x25BA;</button>
  <div>
    <label for="psel">Palette:</label>
    <select id="psel" onchange="onPaletteChange()">
      <option value="viridis">Viridis</option>
      <option value="plasma">Plasma</option>
      <option value="jet">Jet</option>
    </select>
  </div>
  <div class="contrast-wrap">
    <label for="floor-sl">Floor:</label>
    <input type="range" id="floor-sl" class="cslider" min="-200" max="-20" step="1" value="-130" oninput="onContrastChange()">
    <span class="cval" id="floor-val">-130</span>
  </div>
  <div class="contrast-wrap">
    <label for="ceil-sl">Ceiling:</label>
    <input type="range" id="ceil-sl" class="cslider" min="-150" max="0" step="1" value="-60" oninput="onContrastChange()">
    <span class="cval" id="ceil-val">-60</span>
  </div>
  <button onclick="load()">&#x21BB; Refresh</button>
  <button onclick="resetZoom()" title="Reset zoom (or double-click image)">&#x2B1C; Reset zoom</button>
  <a id="dl-btn" href="#" download style="display:none">
    <button type="button">&#x2B07; Download PNG</button>
  </a>
  <span style="font-size:.75em;opacity:.55">Scroll to zoom &middot; drag to pan &middot; double-click to reset</span>
  <span class="status" id="status">Loading&hellip;</span>
</div>

<div id="err"></div>
<div id="loading" class="loading">Loading spectrogram&hellip;</div>

<div id="view" style="display:none">
  <!-- freq-axis sits ABOVE the sg-wrap, offset by the time-axis width so it aligns with the canvas.
       It is NOT inside sg-right (which has overflow:hidden) so labels are never clipped.
       buildFreqAxis() positions labels in screen-space percentages of #freq-axis width. -->
  <div style="padding-left:46px;position:relative">
    <div id="freq-axis"></div>
  </div>
  <div class="sg-wrap">
    <div id="time-axis"></div>
    <div class="sg-right">
      <!-- zoom-wrap receives the CSS transform (canvas only) -->
      <div id="zoom-wrap" style="transform-origin:0 0">
        <div class="sg-canvas-wrap" id="cwrap">
          <canvas id="img-canvas"></canvas>
        </div>
      </div>
      <!-- Overlay canvas is OUTSIDE zoom-wrap so it doesn't get CSS-scaled. -->
      <canvas id="overlay-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10"></canvas>
    </div>
  </div>
  <div class="legend">
    <span id="lmin">-130 dBFS</span>
    <canvas id="legend-canvas" width="200" height="13"></canvas>
    <span id="lmax">-60 dBFS</span>
    <span style="margin-left:14px;opacity:.45">noise floor &rarr; signal peak</span>
  </div>
</div>
</div>
<div id="tt"></div>

/* Active LUT and inverse map — updated when palette changes */
var V=PALETTES.viridis;
var INV={};
function buildInv(lut){
  INV={};
  for(var i=0;i<lut.length;i++){var c=lut[i],k=((c[0]>>3)<<10)|((c[1]>>3)<<5)|(c[2]>>3);if(!(k in INV))INV[k]=i;}
}
buildInv(V);

function setPalette(name){
  V=PALETTES[name]||PALETTES.viridis;
  buildInv(V);
}

function pxToDb(ctx,px,py,dmin,dmax){
  var d=ctx.getImageData(px,py,1,1).data;
  var r=d[0],g=d[1],b=d[2];
  /* Pure black = no-data sentinel */
  if(r===0&&g===0&&b===0)return null;

  /* Try exact quantised lookup first */
  var k=((r>>3)<<10)|((g>>3)<<5)|(b>>3);
  var idx=INV[k];

  /* If exact lookup fails (PNG compression altered the colour slightly),
     fall back to nearest-neighbour search across the full LUT.
     This is O(256) but only runs on cache miss — acceptable for a tooltip. */
  if(idx===undefined){
    var bestDist=1e9,bestIdx=0;
    for(var i=0;i<V.length;i++){
      var dr=r-V[i][0],dg=g-V[i][1],db2=b-V[i][2];
      var dist=dr*dr+dg*dg+db2*db2;
      if(dist<bestDist){bestDist=dist;bestIdx=i;}
    }
    idx=bestIdx;
  }

  return dmin+(idx/(V.length-1))*(dmax-dmin);
}

  [18068000,18168000,'17m'],[21000000,21450000,'15m'],
  [24890000,24990000,'12m'],[28000000,29700000,'10m']
];
function bandName(hz){for(var i=0;i<BANDS.length;i++)if(hz>=BANDS[i][0]&&hz<=BANDS[i][1])return BANDS[i][2];return null;}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Contrast state ─────────────────────────────────────────────────────── */
/* These track the current floor/ceiling values shown in the sliders.
   They are initialised from the meta response (auto-range) and can be
   overridden by the user dragging the sliders. */
var contrastMin=-130, contrastMax=-60;
var contrastUserChanged=false; /* true once the user has moved a slider */

function getSliderMin(){return parseInt(document.getElementById('floor-sl').value,10);}
function getSliderMax(){return parseInt(document.getElementById('ceil-sl').value,10);}

/* Called whenever either slider moves */
function onContrastChange(){
  var fl=getSliderMin(), ce=getSliderMax();
  /* Enforce floor < ceiling - 5 */
  if(fl>=ce-5){
    /* Clamp whichever slider was just moved */
    var flEl=document.getElementById('floor-sl');
    var ceEl=document.getElementById('ceil-sl');
    if(fl>=ce-5){
      /* Decide which to clamp based on which is closer to the boundary */
      if(fl>contrastMin){ceEl.value=fl+5;ce=fl+5;}
      else{flEl.value=ce-5;fl=ce-5;}
    }
  }
  contrastMin=fl; contrastMax=ce;
  contrastUserChanged=true;
  document.getElementById('floor-val').textContent=fl;
  document.getElementById('ceil-val').textContent=ce;
  /* Update legend labels immediately */
  document.getElementById('lmin').textContent=fl+' dBFS';
  document.getElementById('lmax').textContent=ce+' dBFS';
  /* Re-fetch image with new range (debounced 300 ms) */
  clearTimeout(contrastTimer);
  contrastTimer=setTimeout(function(){bmp=null;load();},300);
}
var contrastTimer=null;

/* Sync sliders to a given min/max (called when meta arrives) */
function syncSliders(mn,mx){
  var flEl=document.getElementById('floor-sl');
  var ceEl=document.getElementById('ceil-sl');
  /* Clamp to slider bounds */
  mn=Math.max(-200,Math.min(-21,Math.round(mn)));
  mx=Math.max(mn+5,Math.min(0,Math.round(mx)));
  flEl.value=mn; ceEl.value=mx;
  contrastMin=mn; contrastMax=mx;
  document.getElementById('floor-val').textContent=mn;
  document.getElementById('ceil-val').textContent=mx;
}

/* ── State ──────────────────────────────────────────────────────────────── */
var meta=null,bmp=null,ictx=null,timer=null;
var availableDates=[]; /* populated from /api/spectrogram/list, newest first */

/* Zoom/pan state */
var zoom={scale:1,tx:0,ty:0,dragging:false,dragStartX:0,dragStartY:0,dragStartTx:0,dragStartTy:0};
var MIN_SCALE=1, MAX_SCALE=20;

function applyZoom(){
  var zw=document.getElementById('zoom-wrap');
  zw.style.transform='translate('+zoom.tx+'px,'+zoom.ty+'px) scale('+zoom.scale+')';
  /* Rebuild freq axis so labels reflect the visible frequency range and density */
  if(meta)buildFreqAxis();
}

function resetZoom(){
  zoom.scale=1; zoom.tx=0; zoom.ty=0;
  applyZoom();
}

function setupZoom(){
  /* Attach wheel to the clipping container (sg-right) so scroll works over freq-axis too */
  var container=document.querySelector('.sg-right');
  var cwrap=document.getElementById('cwrap');

  container.addEventListener('wheel',function(e){
    e.preventDefault();
    var rect=container.getBoundingClientRect();
    /* Cursor position in zoom-wrap's local coordinate space */
    var cx=(e.clientX-rect.left-zoom.tx)/zoom.scale;
    var cy=(e.clientY-rect.top -zoom.ty)/zoom.scale;

    var factor=e.deltaY<0?1.15:1/1.15;
    var newScale=Math.max(MIN_SCALE,Math.min(MAX_SCALE,zoom.scale*factor));
    if(newScale===zoom.scale)return;

    zoom.tx=e.clientX-rect.left - cx*newScale;
    zoom.ty=e.clientY-rect.top  - cy*newScale;
    zoom.scale=newScale;
    clampZoom(rect);
    applyZoom();
  },{passive:false});

  /* Click+drag to pan when zoomed */
  container.addEventListener('mousedown',function(e){
    if(zoom.scale<=1)return;
    zoom.dragging=true;
    zoom.dragStartX=e.clientX; zoom.dragStartY=e.clientY;
    zoom.dragStartTx=zoom.tx;  zoom.dragStartTy=zoom.ty;
    cwrap.style.cursor='grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove',function(e){
    if(!zoom.dragging)return;
    var rect=document.querySelector('.sg-right').getBoundingClientRect();
    zoom.tx=zoom.dragStartTx+(e.clientX-zoom.dragStartX);
    zoom.ty=zoom.dragStartTy+(e.clientY-zoom.dragStartY);
    clampZoom(rect);
    applyZoom();
  });
  window.addEventListener('mouseup',function(){
    if(!zoom.dragging)return;
    zoom.dragging=false;
    document.getElementById('cwrap').style.cursor='crosshair';
  });

  /* Double-click to reset zoom */
  container.addEventListener('dblclick',function(e){
    e.preventDefault();
    resetZoom();
  });
}

function clampZoom(rect){
  var w=rect?rect.width:document.querySelector('.sg-right').getBoundingClientRect().width;
  var h=rect?rect.height:document.querySelector('.sg-right').getBoundingClientRect().height;
  zoom.tx=Math.max(w*(1-zoom.scale),Math.min(0,zoom.tx));
  zoom.ty=Math.max(h*(1-zoom.scale),Math.min(0,zoom.ty));
}

/* ── Init ───────────────────────────────────────────────────────────────── */
(function init(){
  fetch('/api/spectrogram/list')
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){
      if(!data.enabled){showErr('Spectrogram not enabled. Set <code>spectrogram.enabled: true</code> in config.yaml.');return;}
      var sel=document.getElementById('dsel');
      sel.innerHTML='';
      availableDates=[];
      for(var i=0;i<data.available.length;i++){
        var d=data.available[i];
        if(!/^\d{4}-\d{2}-\d{2}$/.test(d))continue; /* sanitise */
        availableDates.push(d);
        var o=document.createElement('option');
        o.value=d; o.textContent=d===(data.today?data.today:'')?d+' (today)':d;
        sel.appendChild(o);
      }
      sel.onchange=function(){updateNavButtons();bmp=null;contrastUserChanged=false;load();};
      updateNavButtons();
      load();
    })
    .catch(function(e){showErr('Failed to load date list: '+escHtml(e.message));});
})();

/* Navigate to the previous (-1=older) or next (+1=newer) date.
   availableDates is newest-first, so newer=lower index, older=higher index. */
function navDate(dir){
  var sel=document.getElementById('dsel');
  var idx=-1;
  for(var i=0;i<availableDates.length;i++){if(availableDates[i]===sel.value){idx=i;break;}}
  if(idx<0)return;
  var newIdx=idx-dir; /* dir=+1 → newer → idx-1; dir=-1 → older → idx+1 */
  if(newIdx<0||newIdx>=availableDates.length)return;
  sel.value=availableDates[newIdx];
  updateNavButtons();
  bmp=null; /* force loading spinner for date change */
  contrastUserChanged=false; /* reset contrast to auto-range for new date */
  load();
}

/* Enable/disable ◄ ► buttons based on current selection */
function updateNavButtons(){
  var sel=document.getElementById('dsel');
  var idx=-1;
  for(var i=0;i<availableDates.length;i++){if(availableDates[i]===sel.value){idx=i;break;}}
  document.getElementById('prev-btn').disabled=(idx<0||idx>=availableDates.length-1);
  document.getElementById('next-btn').disabled=(idx<=0);
}

/* Called when user changes the palette selector */
function onPaletteChange(){
  var psel=document.getElementById('psel');
  psel.dataset.userChanged='1'; /* mark as user-changed so load() doesn't reset it */
  setPalette(psel.value);
  bmp=null; /* force re-fetch with new palette */
  load();
}

function load(){
  clearTimeout(timer);
  document.getElementById('err').innerHTML='';

  var sel=document.getElementById('dsel');
  var ds=sel.value||'';
  if(ds&&!/^\d{4}-\d{2}-\d{2}$/.test(ds)){showErr('Invalid date');return;} /* sanitise */

  var today=new Date().toISOString().slice(0,10);
  var isToday=!ds||ds===today;

  /* Hoist userPalette to load() scope so all .then() callbacks can access it */
  var psel=document.getElementById('psel');
  var userPalette=psel.value||'viridis';

  /* Only show loading spinner if we have no image yet (first load or date change) */
  var hasExisting=bmp!==null;
  if(!hasExisting){
    document.getElementById('loading').style.display='block';
    document.getElementById('view').style.display='none';
  } else {
    setStatus('Refreshing\u2026');
  }

  var murl='/api/spectrogram/meta'+(ds?'?date='+encodeURIComponent(ds):'');

  fetch(murl)
    .then(function(r){if(!r.ok)throw new Error('meta '+r.status);return r.json();})
    .then(function(m){
      meta=m;
      /* On first load (no user change yet), sync selector to backend palette */
      if(!psel.dataset.userChanged){
        psel.value=meta.palette||'viridis';
        userPalette=psel.value;
      }
      setPalette(userPalette);

      /* Sync contrast sliders to the auto-range from meta, but only if the
         user hasn't manually adjusted them (preserve user's choice on refresh) */
      if(!contrastUserChanged){
        syncSliders(meta.db_min, meta.db_max);
      }

      /* Build image URL — meta.image_url already contains ?db_min=&db_max= from
         the backend auto-range. If the user has moved the sliders, override those
         values with the slider values instead. */
      var iurl=meta.image_url;
      if(contrastUserChanged){
        /* Strip any existing db_min/db_max from the URL and replace with slider values */
        iurl=iurl.replace(/[?&]db_min=[^&]*/g,'').replace(/[?&]db_max=[^&]*/g,'');
        /* Clean up any dangling ? or & */
        iurl=iurl.replace(/\?&/,'?').replace(/&&/g,'&').replace(/[?&]$/,'');
        iurl+=(iurl.indexOf('?')>=0?'&':'?')+'db_min='+contrastMin+'&db_max='+contrastMax;
      }
      if(userPalette&&userPalette!==meta.palette){
        iurl+=(iurl.indexOf('?')>=0?'&':'?')+'palette='+encodeURIComponent(userPalette);
      }
      if(isToday){iurl+=(iurl.indexOf('?')>=0?'&':'?')+'_t='+Date.now();}
      return fetch(iurl);
    })
    .then(function(r){if(!r.ok)throw new Error('image '+r.status);return r.blob();})
    .then(function(b){return createImageBitmap(b);})
    .then(function(b){
      /* Swap in new bitmap — render() draws to canvas atomically, no blank frame */
      bmp=b;
      render();
      document.getElementById('loading').style.display='none';
      document.getElementById('view').style.display='block';
      setStatus(meta.date+' \u00b7 '+meta.row_count+'/'+meta.max_rows+' rows'+(meta.complete?' \u00b7 complete':' \u00b7 in progress'));
      /* Update subtitle with actual metadata */
      var startMHz=(meta.start_freq_hz/1e6).toFixed(0);
      var endMHz=(meta.end_freq_hz/1e6).toFixed(0);
      var palNames={viridis:'Viridis',plasma:'Plasma',jet:'Jet'};
      var palName=palNames[userPalette]||userPalette;
      document.getElementById('subtitle').textContent=startMHz+' \u2013 '+endMHz+' MHz \u00b7 one row per minute \u00b7 '+palName+' palette';
      /* Update download button — always use the same URL that was fetched so
         the saved PNG exactly matches what the user sees */
      var dlBtn=document.getElementById('dl-btn');
      var dlUrl=meta.image_url;
      if(contrastUserChanged){
        dlUrl=dlUrl.replace(/[?&]db_min=[^&]*/g,'').replace(/[?&]db_max=[^&]*/g,'');
        dlUrl=dlUrl.replace(/\?&/,'?').replace(/&&/g,'&').replace(/[?&]$/,'');
        dlUrl+=(dlUrl.indexOf('?')>=0?'&':'?')+'db_min='+contrastMin+'&db_max='+contrastMax;
      }
      if(userPalette&&userPalette!==meta.palette){
        dlUrl+=(dlUrl.indexOf('?')>=0?'&':'?')+'palette='+encodeURIComponent(userPalette);
      }
      dlBtn.href=dlUrl;
      dlBtn.download='spectrogram_'+meta.date+'.png';
      dlBtn.style.display='inline';
      if(isToday&&!meta.complete)timer=setTimeout(load,65000);
    })
    .catch(function(e){
      document.getElementById('loading').style.display='none';
      if(bmp)document.getElementById('view').style.display='block'; /* keep existing image on error */
      showErr('Refresh failed: '+escHtml(e.message));
      setStatus('Error');
      if(isToday)timer=setTimeout(load,65000); /* retry on error */
    });
}

/* ── Render ─────────────────────────────────────────────────────────────── */
var zoomSetup=false;
function render(){
  var ic=document.getElementById('img-canvas');
  /* Only reset img-canvas dimensions if they've changed — avoids clearing on auto-refresh */
  var needsResize=(ic.width!==bmp.width||ic.height!==bmp.height);
  if(needsResize){
    ic.width=bmp.width; ic.height=bmp.height;
    /* Size overlay canvas to match its CSS pixel size (it's outside zoom-wrap) */
    var oc=document.getElementById('overlay-canvas');
    var r=oc.getBoundingClientRect();
    oc.width=Math.round(r.width)||ic.width;
    oc.height=Math.round(r.height)||ic.height;
  }
  if(!ictx||needsResize){
    ictx=ic.getContext('2d',{willReadFrequently:true});
  }
  /* Draw new image — single atomic canvas operation, no blank frame */
  ictx.drawImage(bmp,0,0);
  if(needsResize){
    buildFreqAxis(); buildTimeAxis(); buildLegend(); setupHover();
    if(!zoomSetup){setupZoom();zoomSetup=true;}
  } else {
    /* On refresh, only update axes that depend on row count */
    buildTimeAxis(); buildLegend();
  }
}

/* Frequency axis — zoom-aware, rebuilds on every zoom/pan change.
   All ticks are rendered across the full 0–30 MHz range at the appropriate
   density for the current zoom level. Positions are left:X% of the full width.
   The CSS transform on zoom-wrap handles scaling; overflow:hidden on sg-right
   The freq-axis is now OUTSIDE zoom-wrap, so positions must be in screen-space.
   A canvas frequency f maps to screen position:
     screenPct = (f/totalHz * zoom.scale + zoom.tx/containerWidth) * 100%
   Only ticks within [0%, 100%] of the container are visible. */
function buildFreqAxis(){
  var ax=document.getElementById('freq-axis');
  ax.innerHTML='';
  if(!meta)return;

  var totalHz=meta.end_freq_hz; /* 30 MHz */

  /* Get container width for tx conversion (px → fraction) */
  var container=document.querySelector('.sg-right');
  var cw=container?container.getBoundingClientRect().width:800;
  if(cw===0)cw=800;

  /* Convert a canvas frequency fraction [0..1] to screen fraction [0..1] */
  function canvasToScreen(frac){
    return frac*zoom.scale + zoom.tx/cw;
  }

  /* Visible frequency range in canvas fractions */
  var visLeft=Math.max(0,-zoom.tx/(cw*zoom.scale));
  var visRight=Math.min(1,(-zoom.tx+cw)/(cw*zoom.scale));
  var visibleSpanHz=(visRight-visLeft)*totalHz;
  if(visibleSpanHz<=0)visibleSpanHz=totalHz;

  /* Choose tick intervals based on visible span */
  var intervals=[
    {span:25e6, major:5e6,  minor:1e6},
    {span:12e6, major:2e6,  minor:500e3},
    {span:6e6,  major:1e6,  minor:200e3},
    {span:3e6,  major:500e3,minor:100e3},
    {span:1.5e6,major:200e3,minor:50e3},
    {span:600e3,major:100e3,minor:25e3},
    {span:300e3,major:50e3, minor:10e3},
    {span:150e3,major:25e3, minor:5e3},
    {span:0,    major:10e3, minor:2e3}
  ];
  var majorInterval=5e6, minorInterval=1e6;
  for(var ii=0;ii<intervals.length;ii++){
    if(visibleSpanHz>=intervals[ii].span){
      majorInterval=intervals[ii].major;
      minorInterval=intervals[ii].minor;
      break;
    }
  }

  /* Format a frequency value as a label string */
  function fmtHz(hz){
    if(hz>=1e6)return (hz/1e6).toFixed(hz%1e6===0?0:hz%100000===0?1:3)+' MHz';
    if(hz>=1e3)return (hz/1e3).toFixed(hz%1e3===0?0:1)+' kHz';
    return hz+' Hz';
  }

  /* Snap to first tick at or before visible left edge */
  var firstMinor=Math.floor(visLeft*totalHz/minorInterval)*minorInterval;
  var firstMajor=Math.floor(visLeft*totalHz/majorInterval)*majorInterval;

  /* Render minor notches — only those in visible range */
  for(var f=firstMinor;f<=totalHz;f+=minorInterval){
    if(f%majorInterval===0)continue;
    var sc=canvasToScreen(f/totalHz);
    if(sc<0||sc>1)continue;
    var pct=(sc*100)+'%';
    var notch=document.createElement('div');
    notch.className='f-notch';
    notch.style.left=pct;
    notch.style.height='4px';
    notch.style.opacity='0.3';
    ax.appendChild(notch);
  }

  /* Render major notches + labels — only those in visible range */
  for(var f=firstMajor;f<=totalHz;f+=majorInterval){
    var sc=canvasToScreen(f/totalHz);
    if(sc<-0.05||sc>1.05)continue; /* small margin for edge labels */
    var pct=(sc*100)+'%';
    var notch=document.createElement('div');
    notch.className='f-notch'; notch.style.left=pct;
    ax.appendChild(notch);
    var lbl=document.createElement('span');
    lbl.className='f-label'; lbl.style.left=pct;
    lbl.textContent=fmtHz(f);
    ax.appendChild(lbl);
  }
}

/* Time axis with labels every 3 hours */
function buildTimeAxis(){
  var ax=document.getElementById('time-axis');
  ax.innerHTML='';
  if(!meta||meta.row_count===0)return;
  for(var row=0;row<=meta.max_rows;row+=180){
    var pct=(row/meta.max_rows)*100+'%';
    var lbl=document.createElement('span');
    lbl.className='t-label'; lbl.style.top=pct;
    var hh=String(Math.floor(row/60)).padStart(2,'0');
    var mm=String(row%60).padStart(2,'0');
    lbl.textContent=hh+':'+mm;
    ax.appendChild(lbl);
  }
}

/* Legend — uses current slider values for labels */
function buildLegend(){
  var c=document.getElementById('legend-canvas');
  var ctx=c.getContext('2d');
  for(var i=0;i<c.width;i++){
    var idx=Math.min(V.length-1,Math.round((i/c.width)*(V.length-1)));
    var rgb=V[idx];
    if(!rgb)continue;
    ctx.fillStyle='rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';
    ctx.fillRect(i,0,1,c.height);
  }
  document.getElementById('lmin').textContent=contrastMin+' dBFS';
  document.getElementById('lmax').textContent=contrastMax+' dBFS';
}

/* ── Hover crosshair + tooltip ──────────────────────────────────────────── */
function setupHover(){
  /* Attach hover to the sg-right container (covers freq-axis + canvas) */
  var sgRight=document.querySelector('.sg-right');
  var cw=document.getElementById('cwrap');
  var tt=document.getElementById('tt');
  var oc=document.getElementById('overlay-canvas');
  var octx=oc.getContext('2d');

  sgRight.onmousemove=function(e){
    if(!meta||!ictx)return;

    /* Cursor position relative to cwrap (the scaled canvas element).
       getBoundingClientRect() on cwrap gives its screen rect after CSS transform. */
    var cr=cw.getBoundingClientRect();
    /* Is cursor over the canvas area? */
    var overCanvas=(e.clientX>=cr.left&&e.clientX<=cr.right&&e.clientY>=cr.top&&e.clientY<=cr.bottom);

    /* Fraction across the canvas (0..1) — works correctly because getBoundingClientRect
       returns the scaled rect, so dividing by width/height gives the correct fraction */
    var xp=Math.max(0,Math.min(1,(e.clientX-cr.left)/cr.width));
    var yp=Math.max(0,Math.min(1,(e.clientY-cr.top)/cr.height));

    /* Canvas pixel coordinates for pixel read */
    var px=Math.floor(xp*ictx.canvas.width);
    var py=Math.floor(yp*ictx.canvas.height);

    /* Frequency */
    var hz=xp*meta.end_freq_hz;
    var mhz=(hz/1e6).toFixed(4);
    var band=bandName(hz);

    /* Time */
    var row=Math.floor(yp*meta.max_rows);
    var nodata=!overCanvas||row>=meta.row_count;
    var hh=String(Math.floor(row/60)).padStart(2,'0');
    var mm=String(row%60).padStart(2,'0');
    var tstr=hh+':'+mm+' UTC';

    /* Signal level from pixel — use the range that was actually used to render
       the current PNG (slider values if user changed them, else meta auto-range) */
    var sig=null,nf=null,snr=null;
    if(!nodata){
      var ttMin=contrastUserChanged?contrastMin:meta.db_min;
      var ttMax=contrastUserChanged?contrastMax:meta.db_max;
      sig=pxToDb(ictx,px,py,ttMin,ttMax);
      if(meta.rows&&meta.rows[row]){
        var nfv=meta.rows[row].noise_floor;
        if(nfv!==0){nf=nfv;if(sig!==null)snr=sig-nf;}
      }
    }

    /* Build tooltip */
    var h='<div class="tt-freq">'+mhz+' MHz'+(band?' <span style="opacity:.55;font-size:.9em">('+band+')</span>':'')+'</div>';
    h+='<div class="tt-time">'+tstr+'</div>';
    if(nodata){
      h+='<div class="tt-sep"></div><div class="tt-nd">no data yet</div>';
    } else {
      h+='<div class="tt-sep"></div>';
      if(sig!==null)h+='<div class="tt-row"><span class="tt-lbl">Signal</span><span class="tt-val">'+sig.toFixed(1)+' dBFS</span></div>';
      if(nf!==null)h+='<div class="tt-row"><span class="tt-lbl">Noise floor</span><span class="tt-val">'+nf.toFixed(1)+' dBFS</span></div>';
      if(snr!==null){
        var col=snr>20?'#7f7':snr>10?'#ff7':'#fa7';
        h+='<div class="tt-row"><span class="tt-lbl">SNR</span><span class="tt-val" style="color:'+col+'">'+snr.toFixed(1)+' dB</span></div>';
      }
    }
    tt.innerHTML=h;
    tt.style.display='block';

    /* Position tooltip on screen */
    var tw=190,th=130;
    var tx=e.clientX+16,ty=e.clientY-10;
    if(tx+tw>window.innerWidth)tx=e.clientX-tw-8;
    if(ty+th>window.innerHeight)ty=e.clientY-th-8;
    tt.style.left=tx+'px'; tt.style.top=ty+'px';

    /* Crosshair — draw in overlay canvas screen coordinates.
       The overlay canvas covers the full sg-right area.
       Sync its pixel dimensions to its CSS size on every draw to handle resize. */
    var or=oc.getBoundingClientRect();
    if(oc.width!==Math.round(or.width)||oc.height!==Math.round(or.height)){
      oc.width=Math.round(or.width); oc.height=Math.round(or.height);
    }
    /* Cursor position in overlay canvas pixels */
    var ocx=e.clientX-or.left;
    var ocy=e.clientY-or.top;
    octx.clearRect(0,0,oc.width,oc.height);
    if(overCanvas){
      octx.strokeStyle='rgba(255,255,255,.45)';
      octx.lineWidth=1;
      octx.setLineDash([4,4]);
      octx.beginPath();
      octx.moveTo(0,ocy); octx.lineTo(oc.width,ocy);
      octx.moveTo(ocx,0); octx.lineTo(ocx,oc.height);
      octx.stroke();
      octx.setLineDash([]);
      octx.fillStyle='rgba(255,255,255,.75)';
      octx.beginPath();
      octx.arc(ocx,ocy,3,0,Math.PI*2);
      octx.fill();
    }
  };

  sgRight.onmouseleave=function(){
    tt.style.display='none';
    octx.clearRect(0,0,oc.width,oc.height);
  };
}

/* ── Helpers ────────────────────────────────────────────────────────────── */
function setStatus(s){document.getElementById('status').textContent=s;}
function showErr(s){document.getElementById('err').innerHTML='<div class="error">'+s+'</div>';}
</script>
